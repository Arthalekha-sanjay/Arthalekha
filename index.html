const EXPENSE_CATS = [
  'Office Supplies','Travel','Food & Entertainment','Utilities','Rent',
  'Salaries','Marketing','Software / Tools','Equipment','Repairs','Taxes','Other'
];

function Expenses() {
  const {profile, toast} = useApp();
  const fy = (profile && profile.financialYear) || '2025-26';

  const [list,    setList]    = useState(() => expenseDB.getByFY(fy));
  const [showAdd, setShowAdd] = useState(false);
  const [delId,   setDelId]   = useState(null);
  const [form,    setForm]    = useState({
    date: new Date().toISOString().split('T')[0],
    category: 'Office Supplies',
    description: '',
    amount: '',
    gstRate: '18',
    paymentMode: 'UPI',
    notes: '',
  });

  const totalExpense = list.reduce((s,e)=>s+(e.amount||0),0);
  const totalGST     = list.reduce((s,e)=>s+(e.gstAmt||0),0);

  function refresh() { setList(expenseDB.getByFY(fy)); }

  function handleSave() {
    if (!form.amount || isNaN(form.amount) || Number(form.amount)<=0) {
      toast('Enter a valid amount', 'er'); return;
    }
    if (!form.description.trim()) { toast('Enter a description', 'er'); return; }
    const amt    = parseFloat(form.amount);
    const gstAmt = amt * parseFloat(form.gstRate||0) / 100;
    expenseDB.save({
      id: genId(), date: form.date, category: form.category,
      description: form.description.trim(), amount: amt,
      gstRate: parseFloat(form.gstRate||0), gstAmt,
      total: amt + gstAmt, paymentMode: form.paymentMode,
      notes: form.notes.trim(),
    });
    toast('✅ Expense saved');
    refresh();
    setShowAdd(false);
    setForm({ date:new Date().toISOString().split('T')[0], category:'Office Supplies',
      description:'', amount:'', gstRate:'18', paymentMode:'UPI', notes:'' });
  }

  function handleDelete() {
    expenseDB.del(delId);
    toast('Expense deleted');
    setDelId(null);
    refresh();
  }

  const byCategory = list.reduce((acc,e)=>{

          { label:'GST Paid',       value:fmtINR(totalGST),              color:'#7c3aed', bg:'#f5f3ff' },

          <div key={c.label} style={{background:c.bg,border:`1.5px solid ${c.color}22`,borderRadius:12,padding:'12px'}}>

                <div style={{fontWeight:600,fontSize:13,color:'#0d0f1a',marginBottom:2}}>{exp.description}</div>
                <div style={{fontSize:11,color:'#6b7280',display:'flex',flexWrap:'wrap',gap:'4px 10px'}}>
                  <span>📂 {exp.category}</span>
                  <span>📅 {exp.date}</span>
                  <span>💳 {exp.paymentMode}</span>
                  {exp.gstAmt>0 && <span style={{color:'#7c3aed'}}>GST: {fmtINR(exp.gstAmt)}</span>}
                </div>
                {exp.notes && <div style={{fontSize:11,color:'#9ca3af',marginTop:3,fontStyle:'italic'}}>{exp.notes}</div>}
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontFamily:'DM Mono,monospace',fontWeight:700,fontSize:14,color:'#dc2626'}}>{fmtINR(exp.total||exp.amount)}</div>
                <div style={{fontSize:10,color:'#9ca3af'}}>Base: {fmtINR(exp.amount)}</div>
                <button onClick={()=>setDelId(exp.id)}
                  style={{marginTop:4,background:'none',border:'1px solid #fecaca',borderRadius:5,padding:'3px 8px',fontSize:11,color:'#dc2626',cursor:'pointer'}}>
                  🗑 Delete
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Add Expense Modal */}
      {showAdd && (
        <div style={{position:'fixed',inset:0,background:'rgba(13,15,26,0.6)',zIndex:1000,display:'flex',alignItems:'flex-end',justifyContent:'center',padding:0}}>
          <div style={{background:'#faf9f6',borderRadius:'16px 16px 0 0',padding:24,width:'100%',maxWidth:600,maxHeight:'90vh',overflowY:'auto'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <div style={{fontFamily:'Playfair Display,serif',fontSize:18,fontWeight:800}}>Add Expense</div>
              <button onClick={()=>setShowAdd(false)} style={{background:'none',border:'1.5px solid #ddd',borderRadius:'50%',width:32,height:32,cursor:'pointer',fontSize:16}}>×</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
              <div>
                <label style={{display:'block',fontSize:11,fontWeight:700,color:'#555',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>Date *</label>
                <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={inputStyle}/>
              </div>
              <div>
                <label style={{display:'block',fontSize:11,fontWeight:700,color:'#555',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>Category *</label>
                <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={inputStyle}>
                  {EXPENSE_CATS.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{display:'block',fontSize:11,fontWeight:700,color:'#555',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>Description *</label>
              <input value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="What did you spend on?" style={inputStyle}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:12}}>
              <div>
                <label style={{display:'block',fontSize:11,fontWeight:700,color:'#555',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>Amount (₹) *</label>
                <input type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0" style={inputStyle}/>
              </div>
              <div>
                <label style={{display:'block',fontSize:11,fontWeight:700,color:'#555',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>GST Rate (%)</label>
                <select value={form.gstRate} onChange={e=>setForm(f=>({...f,gstRate:e.target.value}))} style={inputStyle}>
                  {['0','5','12','18','28'].map(r=><option key={r} value={r}>{r}%</option>)}
                </select>
              </div>
              <div>
                <label style={{display:'block',fontSize:11,fontWeight:700,color:'#555',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>Payment Mode</label>
                <select value={form.paymentMode} onChange={e=>setForm(f=>({...f,paymentMode:e.target.value}))} style={inputStyle}>
                  {['UPI','Cash','Bank Transfer','Card','Cheque'].map(m=><option key={m}>{m}</option>)}
                </select>
              </div>
            </div>
            {/* Live calculation */}
            {form.amount && !isNaN(form.amount) && Number(form.amount)>0 && (
              <div style={{background:'#f8f6f2',borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:12,display:'flex',justifyContent:'space-between'}}>
                <span>Base: <strong>{fmtINR(parseFloat(form.amount))}</strong></span>
                <span>GST ({form.gstRate}%): <strong>{fmtINR(parseFloat(form.amount)*parseFloat(form.gstRate)/100)}</strong></span>
                <span style={{color:'#dc2626'}}>Total: <strong>{fmtINR(parseFloat(form.amount)*(1+parseFloat(form.gstRate)/100))}</strong></span>
              </div>
            )}
            <div style={{marginBottom:16}}>
              <label style={{display:'block',fontSize:11,fontWeight:700,color:'#555',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>Notes (optional)</label>
              <input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Any additional details..." style={inputStyle}/>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setShowAdd(false)}
                style={{flex:1,padding:'12px',borderRadius:8,border:'1.5px solid #ddd',background:'white',fontFamily:'DM Sans,sans-serif',fontWeight:600,fontSize:14,cursor:'pointer',color:'#333'}}>
                Cancel
              </button>
              <button onClick={handleSave}
                style={{flex:2,padding:'12px',borderRadius:8,border:'none',background:'linear-gradient(135deg,#e85d04,#f97316)',color:'white',fontFamily:'DM Sans,sans-serif',fontWeight:700,fontSize:14,cursor:'pointer',boxShadow:'0 4px 12px rgba(232,93,4,0.25)'}}>
                💾 Save Expense
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Delete Confirm Modal */}
      {delId && (
        <div style={{position:'fixed',inset:0,background:'rgba(13,15,26,0.7)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{background:'white',borderRadius:14,padding:24,maxWidth:300,width:'100%',textAlign:'center'}}>
            <div style={{fontSize:36,marginBottom:10}}>🗑️</div>
            <div style={{fontFamily:'Playfair Display,serif',fontSize:17,fontWeight:800,marginBottom:8}}>Delete Expense?</div>
            <div style={{fontSize:13,color:'#666',marginBottom:20}}>This cannot be undone.</div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setDelId(null)} style={{flex:1,padding:'10px',borderRadius:8,border:'1.5px solid #ddd',background:'white',fontFamily:'DM Sans,sans-serif',fontWeight:600,cursor:'pointer'}}>Cancel</button>
              <button onClick={handleDelete} style={{flex:1,padding:'10px',borderRadius:8,border:'none',background:'#dc2626',color:'white',fontFamily:'DM Sans,sans-serif',fontWeight:700,cursor:'pointer'}}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// AUTH PAGE — Firebase email/password auth
// Exactly like Vyapar/Zoho: just email + password
// ══════════════════════════════════════════════════════
function AuthPage({ onAuth }) {
  const [mode,        setMode]        = useState('splash'); // splash | login | signup
  const [form,        setForm]        = useState({ name:'', email:'', password:'', confirm:'', biz:'' });
  const [errors,      setErrors]      = useState({});
  const [loading,     setLoading]     = useState(false);
  const [showPass,    setShowPass]    = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);
  const [status,      setStatus]      = useState(''); // status message during login

  function set(k,v) { setForm(f=>({...f,[k]:v})); setErrors(e=>({...e,[k]:''})); }

  // ── Sign Up ────────────────────────────────────────
  async function doSignup() {
    const e = {};
    if (!form.name.trim())    e.name     = 'Full name is required';
    if (!form.biz.trim())     e.biz      = 'Business name is required';
    if (!form.email.trim())   e.email    = 'Email is required';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Enter a valid email';
    if (!form.password)       e.password = 'Password is required';
    else if (form.password.length < 6) e.password = 'Minimum 6 characters';
    if (form.password !== form.confirm) e.confirm = 'Passwords do not match';
    setErrors(e);
    if (Object.keys(e).length) return;

    setLoading(true);
    setStatus('Creating your account...');
    try {
      const cred = await fbAuth.createUserWithEmailAndPassword(form.email.trim(), form.password);
      await cred.user.updateProfile({ displayName: form.name.trim() });
      // Save initial profile to Firebase
      const uid = cred.user.uid;
      // ── Scope ALL writes to this new user's UID immediately ──
      setCurrentUID(uid);
      const profile = {
        businessName: form.biz.trim(), ownerName: form.name.trim(),
        email: form.email.trim().toLowerCase(), state: 'Maharashtra',
        invoicePrefix: 'AR', financialYear: '2025-26', mobile: ''
      };
      dbWrite('al_profile', profile);
      setStatus('Saving your data...');
      await FRSYNC.push(uid);
      onAuth({ uid, name: form.name.trim(), email: form.email.trim(), biz: form.biz.trim() });
    } catch(err) {
      setLoading(false);
      setStatus('');
      if (err.code === 'auth/email-already-in-use') setErrors({ email: 'An account with this email already exists.' });
      else if (err.code === 'auth/weak-password')   setErrors({ password: 'Password must be at least 6 characters.' });
      else if (err.code === 'auth/network-request-failed') setErrors({ email: 'No internet connection. Check your network.' });
      else setErrors({ email: err.message });
    }
  }

  // ── Sign In ────────────────────────────────────────
  async function doLogin() {
    const e = {};
    if (!form.email.trim())   e.email    = 'Email is required';
    if (!form.password)       e.password = 'Password is required';
    setErrors(e);
    if (Object.keys(e).length) return;

    setLoading(true);
    setStatus('Signing in...');
    try {
      const cred = await fbAuth.signInWithEmailAndPassword(form.email.trim(), form.password);
      const uid  = cred.user.uid;
      const name = cred.user.displayName || form.email.split('@')[0];
      // ── Scope localStorage to this user BEFORE pulling data ──
      setCurrentUID(uid);
      setStatus('Loading your data...');
      await FRSYNC.pull(uid);
      onAuth({ uid, name, email: cred.user.email });
    } catch(err) {
      setLoading(false);
      setStatus('');
      if (err.code === 'auth/user-not-found')        setErrors({ password: 'No account found with this email.' });
      else if (err.code === 'auth/wrong-password')   setErrors({ password: 'Incorrect password.' });
      else if (err.code === 'auth/invalid-credential') setErrors({ password: 'Incorrect email or password.' });
      else if (err.code === 'auth/too-many-requests') setErrors({ password: 'Too many attempts. Try again in a few minutes.' });
      else if (err.code === 'auth/network-request-failed') setErrors({ password: 'No internet. Check your connection.' });
      else setErrors({ password: err.message });
    }
  }

  // ── Forgot Password ────────────────────────────────
  async function doForgot() {
    if (!form.email.trim()) { setErrors({ email: 'Enter your email first' }); return; }
    setLoading(true);
    try {
      await fbAuth.sendPasswordResetEmail(form.email.trim());
      setLoading(false);
      alert('✅ Password reset email sent to ' + form.email + '\nCheck your inbox.');
      setMode('login');
    } catch(err) {
      setLoading(false);
      setErrors({ email: err.code === 'auth/user-not-found' ? 'No account with this email.' : err.message });
    }
  }

  const inputStyle = {
    width:'100%', padding:'13px 14px', borderRadius:9,
    border:'1.5px solid #e2ddd6', fontFamily:'DM Sans,sans-serif',
    fontSize:14, outline:'none', background:'white', boxSizing:'border-box',
    transition:'border-color 0.15s',
  };
  const labelStyle = {
    display:'block', fontSize:11, fontWeight:700, color:'#374151',
    textTransform:'uppercase', letterSpacing:.6, marginBottom:5
  };

  // ── SPLASH ─────────────────────────────────────────
  if (mode === 'splash') return (
    <div style={{minHeight:'100vh',background:'#0f1123',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',padding:'24px',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:0,left:0,right:0,height:'50%',
        background:'radial-gradient(ellipse at 30% 40%, rgba(204,34,34,0.1) 0%, transparent 60%)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',bottom:0,left:0,right:0,height:'50%',
        background:'radial-gradient(ellipse at 70% 60%, rgba(45,138,45,0.08) 0%, transparent 60%)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',inset:0,
        backgroundImage:'radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px)',
        backgroundSize:'28px 28px',pointerEvents:'none'}}/>
      <div style={{marginBottom:32,textAlign:'center'}}>
        <img src={AL_LOGO} alt="ArthaLekha"
          style={{height:88,objectFit:'contain',animation:'logoIn 0.8s ease-out',
            filter:'drop-shadow(0 8px 24px rgba(204,34,34,0.35))'}}/>
        <div style={{color:'rgba(255,255,255,0.3)',fontSize:11,marginTop:10,letterSpacing:3,textTransform:'uppercase'}}>
          by Arthawise Consultancy
        </div>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center',marginBottom:32,maxWidth:400}}>
        {['📄 GST Invoicing','🧾 GSTR-1 Export','📊 Reports','👥 Customers','☁️ Auto Sync','📱 Mobile Ready'].map(f=>(
          <div key={f} style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',
            borderRadius:20,padding:'6px 14px',color:'rgba(255,255,255,0.65)',fontSize:12,fontWeight:500}}>{f}</div>
        ))}
      </div>
      <div style={{width:'100%',maxWidth:340,display:'flex',flexDirection:'column',gap:12}}>
        <button onClick={()=>setMode('signup')} style={{width:'100%',padding:'15px',borderRadius:10,border:'none',
          cursor:'pointer',background:'linear-gradient(135deg,#cc2222,#e03333)',color:'white',
          fontFamily:'DM Sans,sans-serif',fontSize:15,fontWeight:700,
          boxShadow:'0 4px 24px rgba(204,34,34,0.4)',letterSpacing:0.5}}>
          🚀 Create Free Account
        </button>
        <button onClick={()=>setMode('login')} style={{width:'100%',padding:'15px',borderRadius:10,
          background:'rgba(255,255,255,0.06)',border:'1.5px solid rgba(255,255,255,0.15)',
          color:'white',fontFamily:'DM Sans,sans-serif',fontSize:15,fontWeight:600,cursor:'pointer'}}>
          🔑 Sign In
        </button>
      </div>
      <div style={{color:'rgba(255,255,255,0.2)',fontSize:11,marginTop:28,textAlign:'center',lineHeight:1.9}}>
        Your data syncs automatically · Works on all devices · Free forever
      </div>
      <style>{`@keyframes logoIn{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}`}</style>
    </div>
  );

  // ── LOGIN / SIGNUP SHARED LAYOUT ───────────────────
  const isLogin = mode === 'login';
  return (
    <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{width:'100%',maxWidth:420,background:'white',borderRadius:16,padding:32,
        boxShadow:'0 4px 40px rgba(13,15,26,0.1)',border:'1px solid #e2ddd6'}}>

        <button onClick={()=>{setMode('splash');setErrors({});setStatus('');}}
          style={{background:'none',border:'none',color:'#888',cursor:'pointer',fontSize:13,
            fontFamily:'DM Sans,sans-serif',marginBottom:20,padding:0}}>← Back</button>

        <div style={{marginBottom:24}}>
          <img src={AL_LOGO} alt="ArthaLekha"
            style={{height:40,objectFit:'contain',objectPosition:'left',marginBottom:16}}/>
          <div style={{fontFamily:'Playfair Display,serif',fontSize:24,fontWeight:800,color:'#0d1117',marginBottom:4}}>
            {isLogin ? 'Welcome back 👋' : 'Get started free 🚀'}
          </div>
          <div style={{fontSize:14,color:'#6b7280'}}>
            {isLogin ? 'Sign in to your account' : 'Create your account · Free forever'}
          </div>
        </div>

        {/* Status message */}
        {status && (
          <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:9,
            padding:'12px 16px',fontSize:13,color:'#1e40af',marginBottom:20,
            display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:18}}>⏳</span> {status}
          </div>
        )}

        {/* Name + Biz — signup only */}
        {!isLogin && (
          <>
            <div style={{marginBottom:16}}>
              <label style={labelStyle}>Your Name *</label>
              <input value={form.name} onChange={e=>set('name',e.target.value)}
                placeholder="Sanjay Kumar" style={{...inputStyle,borderColor:errors.name?'#ef4444':'#e2ddd6'}}/>
              {errors.name && <div style={{fontSize:12,color:'#ef4444',marginTop:4}}>{errors.name}</div>}
            </div>
            <div style={{marginBottom:16}}>
              <label style={labelStyle}>Business Name *</label>
              <input value={form.biz} onChange={e=>set('biz',e.target.value)}
                placeholder="ABC Trading Co." style={{...inputStyle,borderColor:errors.biz?'#ef4444':'#e2ddd6'}}/>
              {errors.biz && <div style={{fontSize:12,color:'#ef4444',marginTop:4}}>{errors.biz}</div>}
            </div>
          </>
        )}

        {/* Email */}
        <div style={{marginBottom:16}}>
          <label style={labelStyle}>Email Address *</label>
          <input type="email" value={form.email} onChange={e=>set('email',e.target.value)}
            placeholder="you@gmail.com" autoComplete="email"
            style={{...inputStyle,borderColor:errors.email?'#ef4444':'#e2ddd6'}}/>
          {errors.email && <div style={{fontSize:12,color:'#ef4444',marginTop:4}}>{errors.email}</div>}
        </div>

        {/* Password */}
        <div style={{marginBottom:isLogin?8:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
            <label style={labelStyle}>Password *</label>
            {isLogin && (
              <span onClick={doForgot} style={{fontSize:12,color:'#e85d04',cursor:'pointer',fontWeight:600}}>
                Forgot password?
              </span>
            )}
          </div>
          <div style={{position:'relative'}}>
            <input type={showPass?'text':'password'} value={form.password}
              onChange={e=>set('password',e.target.value)}
              placeholder={isLogin?'Your password':'Min 6 characters'} autoComplete={isLogin?'current-password':'new-password'}
              style={{...inputStyle,borderColor:errors.password?'#ef4444':'#e2ddd6',paddingRight:44}}/>
            <button onClick={()=>setShowPass(v=>!v)}
              style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',
                background:'none',border:'none',cursor:'pointer',fontSize:18,color:'#9ca3af',padding:0}}>
              {showPass?'🙈':'👁'}
            </button>
          </div>
          {errors.password && <div style={{fontSize:12,color:'#ef4444',marginTop:4}}>{errors.password}</div>}
        </div>

        {/* Confirm — signup only */}
        {!isLogin && (
          <div style={{marginBottom:16}}>
            <label style={labelStyle}>Confirm Password *</label>
            <div style={{position:'relative'}}>
              <input type={showConfirm?'text':'password'} value={form.confirm}
                onChange={e=>set('confirm',e.target.value)} placeholder="Re-enter password"
                style={{...inputStyle,borderColor:errors.confirm?'#ef4444':'#e2ddd6',paddingRight:44}}/>
              <button onClick={()=>setShowConfirm(v=>!v)}
                style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',
                  background:'none',border:'none',cursor:'pointer',fontSize:18,color:'#9ca3af',padding:0}}>
                {showConfirm?'🙈':'👁'}
              </button>
            </div>
            {errors.confirm && <div style={{fontSize:12,color:'#ef4444',marginTop:4}}>{errors.confirm}</div>}
          </div>
        )}

        {/* Submit */}
        <button onClick={isLogin?doLogin:doSignup} disabled={loading}
          style={{width:'100%',padding:'14px',borderRadius:9,border:'none',
            cursor:loading?'not-allowed':'pointer',marginTop:8,
            background:loading?'#d1d5db':'linear-gradient(135deg,#e85d04,#f97316)',
            color:'white',fontFamily:'DM Sans,sans-serif',fontSize:15,fontWeight:700,
            boxShadow:loading?'none':'0 4px 16px rgba(232,93,4,0.3)',letterSpacing:0.3}}>
          {loading ? '⏳ Please wait...' : isLogin ? '🔑 Sign In' : '🚀 Create Account'}
        </button>

        {/* Toggle */}
        <div style={{textAlign:'center',marginTop:24,fontSize:13,color:'#6b7280'}}>
          {isLogin ? "Don't have an account? " : "Already have an account? "}
          <span onClick={()=>{setMode(isLogin?'signup':'login');setErrors({});setStatus('');
            setForm(f=>({...f,password:'',confirm:''}));}}
            style={{color:'#e85d04',fontWeight:700,cursor:'pointer'}}>
            {isLogin?'Create one free →':'Sign in →'}
          </span>
        </div>

        <div style={{textAlign:'center',marginTop:20,fontSize:11,color:'#aaa',lineHeight:1.7}}>
          🔒 Your account is secured by Firebase Auth<br/>
          Data syncs automatically across all your devices
        </div>
      </div>
    </div>
  );
}


function App() {
  const [page,        setPage]        = useState('dashboard');
  const [profile,     setProfile]     = useState(null);
  const [toasts,      setToasts]      = useState([]);
  const [currentUser, setCurrentUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true); // show spinner while Firebase checks session

  function toast(msg, type='ok') {
    const id = genId();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  }

  // ── Firebase auth state observer — runs on every page load ──────────
  const [appError, setAppError] = useState(null);

  useEffect(() => {
    let unsub = () => {};
    try {
      unsub = fbAuth.onAuthStateChanged(async (fbUser) => {
        try {
          if (fbUser) {
            // ── Set UID FIRST so all dbRead/dbWrite use this user's scoped keys
            setCurrentUID(fbUser.uid);
            // Pull latest data from Firebase into this user's scoped localStorage
            try { await FRSYNC.pull(fbUser.uid); } catch(e) { console.warn('Pull skipped:', e.message); }
            const p = profileDB.get();
            setProfile(p);
            setCurrentUser({ uid: fbUser.uid, name: fbUser.displayName || fbUser.email.split('@')[0], email: fbUser.email });
          } else {
            // Clear UID on logout so no data leaks
            setCurrentUID(null);
            setCurrentUser(null);
            setProfile(null);
          }
        } catch(e) {
          console.error('Auth state error:', e);
          setAppError(e.message);
        } finally {
          setAuthLoading(false);
        }
      }, (err) => {
        console.error('Auth observer error:', err);
        setAppError(err.message);
        setAuthLoading(false);
      });
    } catch(e) {
      console.error('Firebase init error:', e);
      setAppError('Firebase initialization failed: ' + e.message);
      setAuthLoading(false);
    }
    return () => unsub();
  }, []);

  // ── Auto-save to Firebase 3s after any page change (data mutation) ──
  const [autoSaveUid, setAutoSaveUid] = useState(null);
  useEffect(() => {
    if (currentUser) setAutoSaveUid(currentUser.uid);
  }, [currentUser]);

  function triggerAutoSave() {
    if (autoSaveUid) FRSYNC.autoSave(autoSaveUid);
  }

  // Intercept nav to auto-save when leaving a data screen
  function nav(p) {
    if (['create-invoice','customers','vendors','expenses','profile'].includes(page)) {
      triggerAutoSave();
    }
    if (p === 'sync-push') { doManualSync('push'); return; }
    if (p === 'sync-pull') { doManualSync('pull'); return; }
    setPage(p);
  }

  async function doManualSync(direction) {
    if (!currentUser) return;
    toast(direction==='push'?'☁️ Uploading...':'☁️ Downloading...','ok');
    try {
      if (direction==='push') {
        await FRSYNC.push(currentUser.uid);
        toast('✅ Upload complete!','ok');
      } else {
        await FRSYNC.pull(currentUser.uid);
        setProfile(profileDB.get());
        toast('✅ Download complete!','ok');
      }
    } catch(e) {
      toast('❌ Sync failed: '+e.message,'er');
    }
  }

  function handleAuth(user) {
    // Set UID scope FIRST before reading/writing any data
    setCurrentUID(user.uid);
    setCurrentUser(user);
    setProfile(profileDB.get());
    // Set up profile from signup data if first time
    if (!profileDB.get() && user.biz) {
      const saved = profileDB.save({
        businessName: user.biz, ownerName: user.name, email: user.email,
        state: 'Maharashtra', invoicePrefix: 'AR', financialYear: '2025-26', mobile: ''
      });
      setProfile(saved);
      FRSYNC.autoSave(user.uid);
    }
  }

  const [showLogoutModal, setShowLogoutModal] = useState(false);
  const [showFAB, setShowFAB] = useState(false);
  const [showSearch, setShowSearch] = useState(false);

  // Global keyboard shortcut: Ctrl+K or Cmd+K opens search
  useEffect(() => {
    const handler = e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); setShowSearch(true); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);
  function doLogout() {
    // Push before logout
    if (currentUser) FRSYNC.push(currentUser.uid).catch(()=>{});
    fbAuth.signOut();
    setCurrentUser(null);
    setProfile(null);
    setPage('dashboard');
    setShowLogoutModal(false);
  }

  // ── Error state ──────────────────────────────────────────────────
  if (appError) return (
    <div style={{minHeight:'100vh',background:'#fff5f5',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',padding:24,textAlign:'center'}}>
      <div style={{fontSize:48,marginBottom:16}}>⚠️</div>
      <div style={{fontFamily:'Playfair Display,serif',fontSize:22,fontWeight:800,color:'#dc2626',marginBottom:12}}>
        Something went wrong
      </div>
      <div style={{fontSize:14,color:'#666',marginBottom:8,maxWidth:360,lineHeight:1.7}}>
        {appError}
      </div>
      <div style={{fontSize:13,color:'#999',marginBottom:24,maxWidth:360,lineHeight:1.8,
        background:'#fff',border:'1px solid #fecaca',borderRadius:8,padding:'12px 16px'}}>
        <strong>Common fix:</strong> Go to Firebase Console → Realtime Database → Rules tab → set both <code>read</code> and <code>write</code> to <code>true</code> → Publish
      </div>
      <button onClick={()=>window.location.reload()}
        style={{padding:'12px 28px',borderRadius:9,border:'none',
          background:'linear-gradient(135deg,#e85d04,#f97316)',color:'white',
          fontFamily:'DM Sans,sans-serif',fontWeight:700,fontSize:15,cursor:'pointer'}}>
        🔄 Try Again
      </button>
    </div>
  );

  // ── Loading spinner while Firebase checks session ───────────────────
  if (authLoading) return (
    <div style={{minHeight:'100vh',background:'#0f1123',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',gap:20}}>
      <img src={AL_LOGO} alt="ArthaLekha"
        style={{width:260,objectFit:'contain',filter:'drop-shadow(0 8px 24px rgba(204,41,54,0.4))'}}/>
      <div style={{display:'flex',gap:6,marginTop:8}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{width:8,height:8,borderRadius:'50%',background:'#e85d04',opacity:0.8,
            animation:`bounce 1.2s ease-in-out ${i*0.2}s infinite`}}/>
        ))}
      </div>
      <style>{`@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-12px)}}`}</style>
    </div>
  );

  // ── Not logged in → show auth screen ───────────────────────────────
  if (!currentUser) return <AuthPage onAuth={handleAuth}/>;

  // ── Logged in → show main app ───────────────────────────────────────
  const lastSync = FRSYNC.getLastSync();

  return (
    <Ctx.Provider value={{profile: profile || {businessName:'',ownerName:'',financialYear:'2025-26',state:'Maharashtra',invoicePrefix:'AR'}, setProfile: (p)=>{setProfile(p); triggerAutoSave();}, toast, syncNow: doManualSync}}>
      <div className="shell">
        {/* Sidebar — desktop */}
        <aside className="sidebar">
          <div className="sb-brand" style={{padding:'16px 16px 14px',borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
            <img src={AL_LOGO} alt="ArthaLekha"
              style={{width:'100%',maxWidth:180,height:48,objectFit:'contain',objectPosition:'left center'}}/>
          </div>
          <div className="sb-section" style={{flex:1,overflowY:'auto',padding:'8px 0'}}>
            {getNav(profile).map((item,i) => item.section
              ? <div key={i} className="sb-section-label" style={{padding:'10px 16px 4px',fontSize:9,fontWeight:700,letterSpacing:1.5,color:'rgba(255,255,255,0.3)',textTransform:'uppercase'}}>{item.section}</div>
              : <button key={item.id} className={'nav-item'+(page===item.id?' active':'')}
                  onClick={()=>nav(item.id)}>
                  <span className="ni">{item.icon}</span><span>{item.label}</span>
                </button>
            )}
          </div>
          <div className="sb-footer">
            <div style={{fontSize:11,color:'#9ca3af',textAlign:'center',marginBottom:8,lineHeight:1.6}}>
              {lastSync ? '✅ Synced '+lastSync : '⏳ Not synced yet'}
            </div>
            <button className="nav-item" onClick={()=>setShowLogoutModal(true)}
              style={{color:'#ef4444',width:'100%'}}>
              <span className="mi">🚪</span><span>Sign Out</span>
            </button>
          </div>
        </aside>

        {/* Main area */}
        <div className="main">
          {/* Top bar */}
          <div className="topbar">
            <div className="topbar-title">
              {TITLES[page]||'Dashboard'}
            </div>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              {/* Smart Search */}
              <button onClick={()=>setShowSearch(true)}
                style={{display:'flex',alignItems:'center',gap:8,padding:'7px 14px',borderRadius:8,
                  border:'1px solid #e2ddd6',background:'white',cursor:'pointer',color:'#888',
                  fontFamily:'DM Sans,sans-serif',fontSize:13,minWidth:160}}>
                <span>🔍</span>
                <span style={{flex:1,textAlign:'left'}}>Search...</span>
                <kbd style={{background:'#f3f4f6',border:'1px solid #ddd',borderRadius:4,padding:'1px 5px',fontSize:10,color:'#aaa'}}>⌘K</kbd>
              </button>
              <button onClick={()=>doManualSync('push')}
                style={{padding:'7px 14px',borderRadius:8,border:'1px solid #e2ddd6',background:'white',
                  fontFamily:'DM Sans,sans-serif',fontWeight:600,fontSize:13,cursor:'pointer',
                  display:'flex',alignItems:'center',gap:5,color:'#374151'}}>
                ☁️↑
              </button>
              <button onClick={()=>doManualSync('pull')}
                style={{padding:'7px 14px',borderRadius:8,border:'1px solid #e2ddd6',background:'white',
                  fontFamily:'DM Sans,sans-serif',fontWeight:600,fontSize:13,cursor:'pointer',color:'#374151'}}>
                ☁️↓
              </button>
              <div onClick={()=>setShowLogoutModal(true)}
                style={{width:36,height:36,borderRadius:'50%',background:'linear-gradient(135deg,#e85d04,#f97316)',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:13,fontWeight:700,color:'white',cursor:'pointer'}}>
                {currentUser.name?currentUser.name[0].toUpperCase():'U'}
              </div>
            </div>
          </div>

          <div className="page">
            {page==='dashboard'       && <Dashboard nav={nav}/>}
            {page==='create-invoice'  && <CreateInvoice nav={p=>{triggerAutoSave();nav(p);}}/>}
            {page==='history'         && <History nav={nav}/>}
            {page==='pending-bills'   && <PendingBills nav={nav}/>}
            {page==='customers'       && <Customers/>}
            {page==='vendors'         && <Vendors/>}
            {page==='expenses'        && <Expenses/>}
            {page==='reports'         && <Reports/>}
            {page==='gst-summary'     && <GSTSummary/>}
            {page==='gstr1'           && <GSTR1/>}
            {page==='profile'         && <Profile/>}
            {page==='inventory'       && <Inventory/>}
            {page==='purchases'       && <Purchases/>}
            {page==='credit-notes'    && <CreditNotes/>}
            {page==='debit-notes'     && <DebitNotes/>}
            {page==='bank-entries'    && <BankEntries/>}
            {page==='ledger'          && <Ledger/>}
          </div>
        </div>

        {/* Mobile Bottom Nav */}
        <nav className="mob-nav">
          <div className="mob-nav-inner">
            {getMobNav(profile).map(item=>(
              <button key={item.id} className={'mob-btn'+(page===item.id?' active':'')}
                onClick={()=>nav(item.id)}>
                <span className="ni">{item.icon}</span>{item.label}
              </button>
            ))}
            <button className="mob-btn" onClick={()=>setShowLogoutModal(true)}
              style={{color:'#f97316',borderLeft:'1px solid rgba(255,255,255,0.1)',minWidth:64}}>
              <span className="mi">🚪</span>Logout
            </button>
          </div>
        </nav>

        {/* Mobile FAB — Quick Create */}
        <button onClick={()=>setShowFAB(f=>!f)} style={{
          display:'none', position:'fixed', bottom:72, right:16, zIndex:600,
          width:52, height:52, borderRadius:'50%', background:'var(--saffron)', color:'white',
          border:'none', fontSize:26, fontWeight:700, boxShadow:'0 4px 16px rgba(204,34,34,.4)',
          cursor:'pointer', alignItems:'center', justifyContent:'center',
          lineHeight:1, fontFamily:'DM Sans,sans-serif',
        }} className="mob-fab">
          {showFAB ? '×' : '+'}
        </button>

        {/* FAB quick-actions sheet */}
        {showFAB && (
          <div style={{position:'fixed',inset:0,zIndex:590}} onClick={()=>setShowFAB(false)}>
            <div className="mob-fab-sheet" onClick={e=>e.stopPropagation()} style={{
              position:'fixed', bottom:132, right:12, background:'white',
              borderRadius:14, boxShadow:'0 8px 32px rgba(0,0,0,0.18)',
              padding:'10px 0', minWidth:190, zIndex:700,
            }}>
              <div style={{padding:'6px 16px 10px',fontSize:10,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:1}}>Quick Create</div>
              {[
                {icon:'📄',label:'New Invoice',page:'create-invoice',color:'#e85d04'},
                {icon:'📝',label:'Credit Note',page:'credit-notes',color:'#1e40af'},
                {icon:'🛒',label:'New Purchase',page:'purchases',color:'#0d9488'},
                {icon:'📋',label:'Debit Note',page:'debit-notes',color:'#d97706'},
                {icon:'💸',label:'New Expense',page:'expenses',color:'#dc2626'},
                {icon:'⏳',label:'Pending Bills',page:'pending-bills',color:'#7c3aed'},
                {icon:'🏦',label:'Bank Entry',page:'bank-entries',color:'#065f46'},
              ].map(a=>(
                <button key={a.page} onClick={()=>{nav(a.page);setShowFAB(false);}}
                  style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'10px 18px',
                    border:'none',background:'none',cursor:'pointer',textAlign:'left',
                    fontFamily:'DM Sans,sans-serif',fontSize:13,fontWeight:600,color:a.color}}>
                  <span style={{fontSize:18,width:24,textAlign:'center'}}>{a.icon}</span>{a.label}
                </button>
              ))}
            </div>
          </div>
        )}
      </div>

      <Toasts list={toasts}/>
      {showSearch && <SmartSearch onNav={p=>setPage(p)} onClose={()=>setShowSearch(false)}/>}

      {/* Logout Modal */}
      {showLogoutModal && (
        <div style={{position:'fixed',inset:0,background:'rgba(13,15,26,0.7)',zIndex:9999,
          display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{background:'white',borderRadius:16,padding:28,maxWidth:320,width:'100%',textAlign:'center',
            boxShadow:'0 12px 40px rgba(0,0,0,0.25)'}}>
            <div style={{fontSize:40,marginBottom:12}}>🚪</div>
            <div style={{fontFamily:'Playfair Display,serif',fontSize:20,fontWeight:800,marginBottom:8}}>Sign Out?</div>
            <div style={{fontSize:13,color:'#666',marginBottom:24,lineHeight:1.7}}>
              Signed in as<br/>
              <strong>{currentUser.name}</strong><br/>
              <span style={{fontSize:12,color:'#9ca3af'}}>{currentUser.email}</span>
            </div>
            <div style={{fontSize:12,color:'#9ca3af',marginBottom:20,background:'#f8f6f2',borderRadius:8,padding:'8px 12px'}}>
              Your data is saved to cloud automatically ✅
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setShowLogoutModal(false)}
                style={{flex:1,padding:'11px',borderRadius:8,border:'1.5px solid #ddd',background:'white',
                  fontFamily:'DM Sans,sans-serif',fontWeight:600,fontSize:14,cursor:'pointer',color:'#333'}}>
                Cancel
              </button>
              <button onClick={doLogout}
                style={{flex:1,padding:'11px',borderRadius:8,border:'none',
                  background:'linear-gradient(135deg,#e85d04,#f97316)',color:'white',
                  fontFamily:'DM Sans,sans-serif',fontWeight:700,fontSize:14,cursor:'pointer'}}>
                🚪 Sign Out
              </button>
            </div>
          </div>
        </div>
      )}
    </Ctx.Provider>
  );
}


// Error Boundary — catches any render crash and shows helpful message
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(e) { return { hasError: true, error: e }; }
  componentDidCatch(e, info) { console.error('App crash:', e, info); }
  render() {
    if (this.state.hasError) return (
      <div style={{minHeight:'100vh',background:'#fff5f5',display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',padding:24,textAlign:'center',fontFamily:'DM Sans,sans-serif'}}>
        <div style={{fontSize:48,marginBottom:16}}>💥</div>
        <div style={{fontSize:22,fontWeight:800,color:'#dc2626',marginBottom:12}}>App crashed</div>
        <div style={{fontSize:13,color:'#666',marginBottom:8,maxWidth:380,lineHeight:1.8,
          background:'white',border:'1px solid #fecaca',borderRadius:10,padding:'14px 18px'}}>
          <strong>Error:</strong> {this.state.error && this.state.error.message}<br/><br/>
          <strong>Most common fix:</strong><br/>
          Firebase Console → Realtime Database → <strong>Rules</strong> tab → change both <code>read</code> and <code>write</code> to <code>true</code> → click <strong>Publish</strong>
        </div>
        <button onClick={()=>window.location.reload()}
          style={{marginTop:20,padding:'12px 28px',borderRadius:9,border:'none',
            background:'#e85d04',color:'white',fontFamily:'DM Sans,sans-serif',
            fontWeight:700,fontSize:15,cursor:'pointer'}}>
          🔄 Reload App
        </button>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>



<script>
// ── PWA: Inline Manifest ─────────────────────────────────────
(function(){
  const manifest = {
    name: "Arthalekha GST",
    short_name: "Arthalekha",
    description: "GST Accounting & Invoicing for Indian SMBs",
    start_url: "./",
    display: "standalone",
    background_color: "#faf9f6",
    theme_color: "#e85d04",
    orientation: "portrait-primary",
    icons: [
      { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23e85d04'/><text y='.9em' font-size='65' x='15'>📒</text></svg>", sizes: "192x192", type: "image/svg+xml" },
      { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23e85d04'/><text y='.9em' font-size='65' x='15'>📒</text></svg>", sizes: "512x512", type: "image/svg+xml" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);

  // Register inline service worker for offline support
  if ('serviceWorker' in navigator) {
    const swCode = `
const CACHE = 'arthalekha-v1';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      const fresh = fetch(e.request).then(res => {
        if(res.ok){ const c=res.clone(); caches.open(CACHE).then(cache=>cache.put(e.request,c)); }
        return res;
      }).catch(()=>cached);
      return cached || fresh;
    })
  );
});`;
    const swBlob = new Blob([swCode], {type:'text/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
  }
})();
</script>
