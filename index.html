// GSTR-1 EXPORT
// ═══════════════════════════════════════
function GSTR1() {
  const {profile, toast} = useApp();

  // ── Period config ────────────────────────────────────────────────────
  const MONTHS = [
    {idx:0,label:'April',    mm:'04'},{idx:1,label:'May',      mm:'05'},
    {idx:2,label:'June',     mm:'06'},{idx:3,label:'July',     mm:'07'},
    {idx:4,label:'August',   mm:'08'},{idx:5,label:'September',mm:'09'},
    {idx:6,label:'October',  mm:'10'},{idx:7,label:'November', mm:'11'},
    {idx:8,label:'December', mm:'12'},{idx:9,label:'January',  mm:'01'},
    {idx:10,label:'February',mm:'02'},{idx:11,label:'March',   mm:'03'},
  ];
  const QUARTERS = [
    {idx:0,label:'Q1 — Apr to Jun',months:[3,4,5],  fp:'06'},
    {idx:1,label:'Q2 — Jul to Sep',months:[6,7,8],  fp:'09'},
    {idx:2,label:'Q3 — Oct to Dec',months:[9,10,11],fp:'12'},
    {idx:3,label:'Q4 — Jan to Mar',months:[0,1,2],  fp:'03'},
  ];

  const currentMonth = new Date().getMonth(); // 0=Jan … 11=Dec
  // Map JS month to FY month index (Apr=0 … Mar=11)
  const fyMonthIdx = currentMonth >= 3 ? currentMonth - 3 : currentMonth + 9;
  const currentQtr = Math.floor(fyMonthIdx / 3);

  const [fy,        setFY]       = useState(profile?.financialYear || '2025-26');
  const [mode,      setMode]     = useState('monthly');   // 'monthly' | 'quarterly'
  const [selMonth,  setSelMonth] = useState(fyMonthIdx);
  const [selQtr,    setSelQtr]   = useState(currentQtr);
  const [preview,   setPreview]  = useState(null);

  // ── Filter invoices by selected period ───────────────────────────────
  function getDateRange() {
    const startYear = parseInt(fy.split('-')[0]);
    if (mode === 'monthly') {
      const m   = MONTHS[selMonth];
      const yr  = parseInt(m.mm) <= 3 ? startYear + 1 : startYear;
      const mon = parseInt(m.mm) - 1;
      const s   = new Date(yr, mon, 1);
      const e   = new Date(yr, mon + 1, 0, 23, 59, 59);
      return {s, e, fp: m.mm + String(yr).slice(2)};
    } else {
      const q = QUARTERS[selQtr];
      const monthNums = q.months; // JS month numbers (0-based)
      const s = new Date(monthNums[0] >= 3 ? startYear : startYear+1, monthNums[0], 1);
      const e = new Date(monthNums[2] >= 3 ? startYear : startYear+1, monthNums[2]+1, 0, 23,59,59);
      return {s, e, fp: q.fp + String(monthNums[2] < 3 ? startYear+1 : startYear).slice(2)};
    }
  }

  const {s: periodStart, e: periodEnd, fp: filingPeriod} = getDateRange();

  const allInvs  = invoiceDB.getAll().filter(inv => {
    const d = new Date(inv.invoiceDate || inv.date);
    return d >= periodStart && d <= periodEnd;
  });
  const b2bInvs = allInvs.filter(i => i.customer?.gstn);
  const b2cInvs = allInvs.filter(i => !i.customer?.gstn);
  const totalAmt = allInvs.reduce((s,i) => s + (i.total||i.totalAmount||0), 0);
  const totalGST = allInvs.reduce((s,i) => s + (i.cgst||0)+(i.sgst||0)+(i.igst||0), 0);

  // ── Build GSTR-1 JSON ─────────────────────────────────────────────────
  function buildJSON() {
    const b2b = [];
    b2bInvs.forEach(inv => {
      const existing = b2b.find(b => b.ctin === inv.customer.gstn);
      const obj = {
        inum: inv.invoiceNumber,
        idt:  new Date(inv.invoiceDate||inv.date).toLocaleDateString('en-GB').replace(/\//g,'-'),
        val:  inv.total || inv.totalAmount || 0,
        pos:  inv.customer.state || '',
        rchrg:'N', inv_typ:'R',
        itms: (inv.items||[]).map((item,i) => ({
          num: i+1,
          itm_det: {
            rt:    parseFloat(item.gstRate) || 0,
            txval: parseFloat(((item.quantity||0)*(item.rate||0)).toFixed(2)),
            iamt:  (inv.igst||0)>0 ? parseFloat(((item.quantity||0)*(item.rate||0)*(item.gstRate||0)/100).toFixed(2)) : 0,
            camt:  (inv.cgst||0)>0 ? parseFloat(((item.quantity||0)*(item.rate||0)*(item.gstRate||0)/200).toFixed(2)) : 0,
            samt:  (inv.sgst||0)>0 ? parseFloat(((item.quantity||0)*(item.rate||0)*(item.gstRate||0)/200).toFixed(2)) : 0,
            csamt: 0,
          }
        }))
      };
      if (existing) existing.inv.push(obj);
      else b2b.push({ctin: inv.customer.gstn, inv:[obj]});
    });
    const b2cs = b2cInvs.map(inv => ({
      sply_tp: (inv.igst||0) > 0 ? 'INTER' : 'INTRA',
      pos:  inv.customer?.state || '',
      typ:  'OE',
      txval: inv.taxable || inv.taxableValue || 0,
      rt:   inv.items?.length ? parseFloat(inv.items[0].gstRate)||18 : 18,
      iamt: inv.igst || 0,
      camt: inv.cgst || 0,
      samt: inv.sgst || 0,
      csamt:0,
    }));
    return {
      gstin:  profile?.gstn || '',
      fp:     filingPeriod,
      gt:     totalAmt,
      cur_gt: totalAmt,
      b2b, b2cs,
    };
  }

  function download() {
    if (!profile?.gstn) { toast('Add your GSTIN in Business Profile first','er'); return; }
    if (allInvs.length === 0) { toast('No invoices found for this period','er'); return; }
    const json = buildJSON();
    const blob = new Blob([JSON.stringify(json,null,2)], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const periodLabel = mode==='monthly'
      ? MONTHS[selMonth].label+'_'+fy
      : QUARTERS[selQtr].label.replace(/ — /,'_').replace(/ to /,'-')+'_'+fy;
    a.href = url;
    a.download = 'GSTR1_'+(profile.gstn)+'_'+periodLabel+'.json';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{URL.revokeObjectURL(url); a.remove();}, 500);
    toast('✅ GSTR-1 JSON downloaded!','ok');
  }

  const periodName = mode==='monthly'
    ? MONTHS[selMonth].label + ' ' + (parseInt(MONTHS[selMonth].mm)<=3 ? parseInt(fy)+1 : parseInt(fy))
    : QUARTERS[selQtr].label + ' · ' + fy;

  const inp = {padding:'9px 13px',borderRadius:8,border:'1.5px solid var(--border)',
    fontFamily:'DM Sans,sans-serif',fontSize:13,background:'white',outline:'none',cursor:'pointer'};

  return (
    <div style={{maxWidth:860,margin:'0 auto'}}>

      {/* ── Header ── */}
      <div style={{background:'white',borderRadius:14,border:'1px solid var(--border)',
        padding:20,marginBottom:20,boxShadow:'0 2px 12px rgba(15,17,35,0.06)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          flexWrap:'wrap',gap:12,marginBottom:16}}>
          <div>
            <div style={{fontFamily:'Playfair Display,serif',fontSize:19,fontWeight:800,color:'var(--text)'}}>
              GSTR-1 Export
            </div>
            <div style={{fontSize:13,color:'var(--muted)',marginTop:2}}>
              GST portal compatible JSON · {periodName}
            </div>
          </div>
          <select value={fy} onChange={e=>{setFY(e.target.value);setPreview(null);}}
            style={{...inp,fontWeight:600,color:'var(--text)'}}>
            {FYS.map(y=><option key={y}>{y}</option>)}
          </select>
        </div>

        {/* ── Monthly / Quarterly toggle ── */}
        <div style={{display:'flex',gap:0,background:'var(--dim)',borderRadius:10,padding:4,
          width:'fit-content',marginBottom:16}}>
          {['monthly','quarterly'].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setPreview(null);}}
              style={{padding:'8px 22px',borderRadius:8,border:'none',cursor:'pointer',
                fontFamily:'DM Sans,sans-serif',fontWeight:600,fontSize:13,
                background: mode===m ? 'var(--saffron)' : 'transparent',
                color:      mode===m ? 'white' : 'var(--muted)',
                transition:'all 0.15s',textTransform:'capitalize'}}>
              {m==='monthly' ? '📅 Monthly' : '📆 Quarterly'}
            </button>
          ))}
        </div>

        {/* ── Period selector ── */}
        {mode==='monthly' ? (
          <div>
            <div style={{fontSize:11,fontWeight:700,color:'#6b7280',textTransform:'uppercase',
              letterSpacing:.6,marginBottom:8}}>Select Month</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
              {MONTHS.map((m,i)=>{
                const yr  = parseInt(m.mm)<=3 ? parseInt(fy)+1 : parseInt(fy);
                const invCount = invoiceDB.getAll().filter(inv=>{
                  const d=new Date(inv.invoiceDate||inv.date);
                  return d.getMonth()+1===parseInt(m.mm) && d.getFullYear()===yr;
                }).length;
                return (
                  <button key={i} onClick={()=>{setSelMonth(i);setPreview(null);}}
                    style={{padding:'10px 6px',borderRadius:9,border:'1.5px solid',cursor:'pointer',
                      fontFamily:'DM Sans,sans-serif',fontSize:12,fontWeight:600,
                      textAlign:'center',transition:'all 0.15s',
                      borderColor: selMonth===i ? 'var(--saffron)' : 'var(--border)',
                      background:  selMonth===i ? 'rgba(204,34,34,0.06)' : 'var(--dim)',
                      color:       selMonth===i ? 'var(--saffron)' : 'var(--text)'}}>
                    {m.label.slice(0,3)}
                    <div style={{fontSize:10,fontWeight:400,color:selMonth===i?'var(--saffron)':'var(--muted)',marginTop:2}}>
                      {invCount > 0 ? invCount+' inv' : '—'}
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        ) : (
          <div>
            <div style={{fontSize:11,fontWeight:700,color:'#6b7280',textTransform:'uppercase',
              letterSpacing:.6,marginBottom:8}}>Select Quarter</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10}}>
              {QUARTERS.map((q,i)=>{
                const qInvs = invoiceDB.getAll().filter(inv=>{
                  const d=new Date(inv.invoiceDate||inv.date);
                  const mo=d.getMonth(); // 0-based JS month
                  return q.months.includes(mo) && d.getFullYear()>= parseInt(fy) && d.getFullYear()<=parseInt(fy)+1;
                }).length;
                return (
                  <button key={i} onClick={()=>{setSelQtr(i);setPreview(null);}}
                    style={{padding:'14px 16px',borderRadius:10,border:'1.5px solid',cursor:'pointer',
                      fontFamily:'DM Sans,sans-serif',textAlign:'left',transition:'all 0.15s',
                      borderColor: selQtr===i ? 'var(--saffron)' : 'var(--border)',
                      background:  selQtr===i ? 'rgba(204,34,34,0.06)' : 'var(--dim)',}}>
                    <div style={{fontWeight:700,fontSize:14,
                      color: selQtr===i?'var(--saffron)':'var(--text)'}}>
                      {q.label.split(' — ')[0]}
                    </div>
                    <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>
                      {q.label.split(' — ')[1]}
                    </div>

          <div className="fg"><label className="fl">Item Code / SKU</label><input className="fc mono" value={f.code} onChange={set('code')} placeholder="AUTO"/></div>
          <div className="fg"><label className="fl">HSN Code</label><input className="fc mono" value={f.hsnCode} onChange={set('hsnCode')} placeholder="e.g. 1006"/></div>

function BulkInventoryImport({onClose, onImported}) {
  const {toast} = useApp();
  const [rows, setRows] = useState([]);
  const [step, setStep] = useState(1); // 1=upload, 2=preview

  function handleFile(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(ev.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        if (data.length < 2) { toast('File is empty','er'); return; }
        const headers = data[0].map(h=>String(h).trim().toLowerCase());
        const parsed = data.slice(1).filter(r=>r.some(c=>c!=='')).map((r,i) => {
          const get = (...keys) => { for(const k of keys){ const idx=headers.findIndex(h=>h.includes(k)); if(idx>=0) return r[idx]||''; } return ''; };
          return {
            id: genId(),
            name: String(get('name','item','product')).trim(),
            code: String(get('code','sku','item code')).trim(),
            hsnCode: String(get('hsn')).trim(),
            category: String(get('category','cat')).trim() || 'Trading Goods',
            unit: String(get('unit')).trim().toUpperCase() || 'NOS',
            purchaseRate: parseFloat(get('purchase','buy','cost')) || 0,
            saleRate: parseFloat(get('sale','sell','price','rate')) || 0,
            gstRate: parseFloat(get('gst','tax')) || 18,
            openingStock: parseFloat(get('opening','stock','qty','quantity')) || 0,
            currentStock: parseFloat(get('current stock','current')) || parseFloat(get('opening','stock','qty','quantity')) || 0,
            minStock: parseFloat(get('min','minimum','reorder')) || 0,
            createdAt: new Date().toISOString(),
          };
        }).filter(r=>r.name);
        setRows(parsed); setStep(2);
      } catch(err) { toast('Could not read file. Use .xlsx or .xls','er'); }
    };
    reader.readAsBinaryString(file);
  }

  function doImport() {
    rows.forEach(r => inventoryDB.save(r));
    toast(`✅ ${rows.length} items imported successfully`,'ok');
    onImported(); onClose();
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(13,15,26,0.65)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:'white',borderRadius:14,padding:24,maxWidth:700,width:'100%',maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style={{fontFamily:'Playfair Display,serif',fontSize:18,fontWeight:800}}>📦 Bulk Import Inventory</div>
          <button onClick={onClose} style={{background:'none',border:'1.5px solid #ddd',borderRadius:'50%',width:30,height:30,cursor:'pointer'}}>×</button>
        </div>
        {step===1 && (
          <div>
            <div style={{background:'#f0f9ff',border:'1px dashed #38bdf8',borderRadius:10,padding:20,marginBottom:16,textAlign:'center'}}>
              <div style={{fontSize:32,marginBottom:8}}>📄</div>
              <div style={{fontWeight:600,marginBottom:6}}>Upload Excel File (.xlsx / .xls)</div>
              <div style={{fontSize:12,color:'#666',marginBottom:14}}>Columns: Item Name, Code, HSN, Category, Unit, Purchase Rate, Sale Rate, GST%, Opening Stock</div>
              <input type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{display:'block',margin:'0 auto'}}/>
            </div>
            <div style={{background:'#fffbeb',border:'1px solid #fcd34d',borderRadius:8,padding:12,fontSize:12,color:'#92400e'}}>
              <strong>Template columns:</strong> Item Name | Code | HSN | Category | Unit | Purchase Rate | Sale Rate | GST% | Opening Stock | Min Stock
            </div>
          </div>
        )}
        {step===2 && (
          <div>
            <div style={{marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontWeight:600,color:'#166534'}}>✅ {rows.length} items ready to import</span>
              <button className="btn btn-outline btn-sm" onClick={()=>setStep(1)}>← Change File</button>
            </div>
            <div style={{overflowX:'auto',maxHeight:350,border:'1px solid #eee',borderRadius:8}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead><tr style={{background:'#0d0f1a',color:'white'}}>
                  {['#','Name','Code','Category','Unit','Purchase ₹','Sale ₹','GST%','Opening Qty'].map(h=><th key={h} style={{padding:'7px 10px',textAlign:'left',whiteSpace:'nowrap'}}>{h}</th>)}
                </tr></thead>
                <tbody>{rows.map((r,i)=>(
                  <tr key={i} style={{borderBottom:'1px solid #eee',background:i%2?'#fafafa':'white'}}>
                    <td style={{padding:'6px 10px',color:'#888'}}>{i+1}</td>
                    <td style={{padding:'6px 10px',fontWeight:600}}>{r.name}</td>
                    <td style={{padding:'6px 10px',fontFamily:'monospace'}}>{r.code}</td>
                    <td style={{padding:'6px 10px'}}>{r.category}</td>
                    <td style={{padding:'6px 10px'}}>{r.unit}</td>
                    <td style={{padding:'6px 10px',textAlign:'right'}}>₹{r.purchaseRate}</td>
                    <td style={{padding:'6px 10px',textAlign:'right'}}>₹{r.saleRate}</td>
                    <td style={{padding:'6px 10px',textAlign:'right'}}>{r.gstRate}%</td>
                    <td style={{padding:'6px 10px',textAlign:'right'}}>{r.openingStock}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
            <div style={{display:'flex',gap:10,marginTop:16}}>
              <button className="btn btn-outline" style={{flex:1}} onClick={onClose}>Cancel</button>
              <button className="btn" style={{flex:2,background:'#166534',color:'white',border:'none'}} onClick={doImport}>📦 Import {rows.length} Items</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Inventory() {
  const {profile, toast} = useApp();
  const [items, setItems] = useState(inventoryDB.getAll());
  const [search, setSearch] = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [delId, setDelId] = useState(null);

  function refresh() { setItems(inventoryDB.getAll()); }

  function handleSave(item) {
    inventoryDB.save(item);
    toast(editing ? 'Item updated' : 'Item added','ok');
    setShowAdd(false); setEditing(null); refresh();
  }

  const filtered = items.filter(i =>
    !search || i.name.toLowerCase().includes(search.toLowerCase()) ||
    (i.code||'').toLowerCase().includes(search.toLowerCase()) ||
    (i.hsnCode||'').includes(search)
  );

  const lowStock = items.filter(i => (i.currentStock||0) <= (i.minStock||0) && (i.minStock||0)>0).length;

  return (
    <div>
      <div className="sec-hdr">
        <div>
          <div className="sec-title">📦 Inventory</div>
          <div className="sec-sub">{items.length} items &nbsp;{lowStock>0 && <span style={{background:'#fef2f2',color:'#dc2626',border:'1px solid #fca5a5',borderRadius:4,padding:'2px 8px',fontSize:11,fontWeight:700}}>⚠️ {lowStock} Low Stock</span>}</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-outline btn-sm" onClick={()=>setShowImport(true)}>📄 Bulk Import</button>

        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:12,marginBottom:20}}>
        {[
          {label:'Total Items',val:items.length,icon:'📦',color:'#1e40af'},
          {label:'Total Stock Value',val:fmtINR(items.reduce((s,i)=>s+(i.currentStock||0)*(i.purchaseRate||0),0)),icon:'💰',color:'#166534'},
          {label:'Low Stock',val:lowStock,icon:'⚠️',color:'#b45309'},
          {label:'Out of Stock',val:items.filter(i=>(i.currentStock||0)<=0).length,icon:'🚫',color:'#dc2626'},
        ].map(c=>(
          <div key={c.label} style={{background:'white',border:'1.5px solid #eee',borderRadius:10,padding:'14px 16px'}}>

        <input className="fc" value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search by name, code, HSN..." style={{maxWidth:340}}/>
      </div>

      <div style={{background:'white',border:'1.5px solid #eee',borderRadius:12,overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead><tr style={{background:'#0d0f1a',color:'rgba(255,255,255,0.9)'}}>
              {['Item','Code','Category','Purchase ₹','Sale ₹','GST','Stock','Value','Status',''].map(h=>(
                <th key={h} style={{padding:'9px 10px',textAlign:['Purchase ₹','Sale ₹','Stock','Value'].includes(h)?'right':'left',fontSize:10,textTransform:'uppercase',letterSpacing:0.8,whiteSpace:'nowrap'}}>{h}</th>

                    <td style={{padding:'9px 10px',textAlign:'right'}}>{fmtINR(item.purchaseRate||0)}</td>
                    <td style={{padding:'9px 10px',textAlign:'right'}}>{fmtINR(item.saleRate||0)}</td>
                    <td style={{padding:'9px 10px',textAlign:'center'}}><span style={{background:'#f0fdf4',color:'#166534',border:'1px solid #bbf7d0',borderRadius:4,padding:'2px 6px',fontSize:11,fontFamily:'monospace'}}>{item.gstRate||0}%</span></td>
                    <td style={{padding:'9px 10px',textAlign:'right',fontWeight:700,color:isOut?'#dc2626':isLow?'#d97706':'#166534'}}>{item.currentStock||0} {item.unit}</td>
                    <td style={{padding:'9px 10px',textAlign:'right',fontSize:12}}>{fmtINR(stockVal)}</td>
                    <td style={{padding:'9px 10px'}}>
                      {isOut ? <span style={{background:'#fef2f2',color:'#dc2626',borderRadius:4,padding:'2px 7px',fontSize:11,fontWeight:700}}>Out</span>
                             : isLow ? <span style={{background:'#fffbeb',color:'#d97706',borderRadius:4,padding:'2px 7px',fontSize:11,fontWeight:700}}>Low</span>
                             : <span style={{background:'#f0fdf4',color:'#166534',borderRadius:4,padding:'2px 7px',fontSize:11,fontWeight:700}}>OK</span>}
                    </td>
                    <td style={{padding:'9px 10px'}}>
                      <div style={{display:'flex',gap:5}}>
                        <button className="btn btn-outline btn-sm" onClick={()=>{setEditing(item);setShowAdd(true);}}>✏️</button>
                        <button className="btn btn-outline btn-sm" style={{color:'#dc2626',borderColor:'#fca5a5'}} onClick={()=>setDelId(item.id)}>🗑</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {(showAdd || editing) && (
        <InventoryItemModal
          initial={editing}
          onSave={handleSave}
          onClose={()=>{setShowAdd(false);setEditing(null);}}
        />
      )}
      {showImport && (
        <BulkInventoryImport onClose={()=>setShowImport(false)} onImported={refresh}/>
      )}
      {delId && (
        <div style={{position:'fixed',inset:0,background:'rgba(13,15,26,0.6)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{background:'white',borderRadius:14,padding:24,maxWidth:320,textAlign:'center'}}>
            <div style={{fontSize:36,marginBottom:8}}>🗑️</div>
            <div style={{fontWeight:700,marginBottom:8}}>Delete item?</div>
            <div style={{fontSize:13,color:'#666',marginBottom:18}}>This will permanently remove the inventory item.</div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-outline" style={{flex:1}} onClick={()=>setDelId(null)}>Cancel</button>
              <button className="btn" style={{flex:1,background:'#dc2626',color:'white',border:'none'}} onClick={()=>{inventoryDB.del(delId);toast('Item deleted');setDelId(null);refresh();}}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const newPurchItem = () => ({id:genId(),description:'',quantity:'1',rate:'',gstRate:'18',unit:'NOS'});

function CreatePurchase({onSave, onCancel, initial}) {
  const {profile, toast} = useApp();
  const fy  = (profile&&profile.financialYear)||'2025-26';
  const prefix = (profile&&profile.prefix)||'PO';
  const vends = vendorDB.getAll().filter(v=>v.isActive!==false);
  const invItems = inventoryDB.getAll();
  const applyGST = !!(profile&&profile.gstn);

  const [vend, setVend]   = useState(initial ? vends.find(v=>v.id===initial.vendorId)||null : null);
  const [items, setItems] = useState(initial ? initial.items : [newPurchItem()]);
  const [date, setDate]   = useState(initial ? initial.date : new Date().toISOString().split('T')[0]);
  const [notes, setNotes] = useState(initial ? initial.notes||'' : '');
  const [discount, setDiscount] = useState(initial ? initial.discount||'' : '');
  const [billNo, setBillNo] = useState(initial ? initial.vendorBillNo||'' : '');
  const [payStatus, setPayStatus] = useState(initial ? initial.paymentStatus||'Unpaid' : 'Unpaid');

  const totals = calcTotals(items.map(i=>({...i,gstRate:applyGST?i.gstRate:0})), true, parseFloat(discount)||0);

  function setItem(id,k,v) { setItems(p=>p.map(i=>i.id===id?{...i,[k]:v}:i)); }
  function addItem() { setItems(p=>[...p, newPurchItem()]); }
  function removeItem(id) { if(items.length>1) setItems(p=>p.filter(i=>i.id!==id)); }

  function handleSave() {
    if (!vend) { toast('Select a vendor','er'); return; }
    if (!items.every(i=>i.description&&i.rate)) { toast('Fill all item details','er'); return; }
    const purchNum = initial ? initial.purchaseNumber : counterDB.next('PUR', fy);
    const rec = {
      ...(initial||{}),
      purchaseNumber: purchNum, vendorId:vend.id, vendorName:vend.name, vendorGSTN:vend.gstn||'',
      date, items, discount:parseFloat(discount)||0, vendorBillNo:billNo, paymentStatus:payStatus,
      notes, financialYear:fy, applyGST, ...totals,
    };
    // Update inventory stock for each item
    if (!initial) {
      items.forEach(it => {
        const match = invItems.find(x => x.name.toLowerCase()===it.description.toLowerCase());
        if (match) inventoryDB.adjustStock(match.id, parseFloat(it.quantity)||0, +1);
      });
    }
    onSave(rec);
  }

  return (
    <div>
      <div className="sec-hdr">
        <div>
          <div className="sec-title">{initial?'Edit Purchase':'New Purchase'}</div>
          <div className="sec-sub">Purchase Invoice / Bill Entry</div>
        </div>
        <button className="btn btn-outline" onClick={onCancel}>← Back</button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:14,marginBottom:16}}>
        <div className="card" style={{padding:16}}>
          <div style={{fontWeight:700,marginBottom:12,fontSize:13}}>📋 Purchase Details</div>
          <div className="fg"><label className="fl">Vendor *</label>
            <select className="fc" value={vend?vend.id:''} onChange={e=>setVend(vends.find(v=>v.id===e.target.value)||null)}>
              <option value="">-- Select Vendor --</option>
              {vends.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}
            </select></div>
          {vend && <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:6,padding:'8px 10px',fontSize:11,marginTop:4}}>
            {vend.gstn && <div>GSTN: <strong>{vend.gstn}</strong></div>}
            {vend.phone && <div>📞 {vend.phone}</div>}
          </div>}
          <div className="fg" style={{marginTop:8}}><label className="fl">Vendor Bill No</label><input className="fc mono" value={billNo} onChange={e=>setBillNo(e.target.value)} placeholder="Vendor's invoice no."/></div>
          <div className="fg"><label className="fl">Date</label><input className="fc" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div className="fg"><label className="fl">Payment Status</label>
            <select className="fc" value={payStatus} onChange={e=>setPayStatus(e.target.value)}>
              {['Unpaid','Paid','Partial','Credit'].map(s=><option key={s}>{s}</option>)}
            </select></div>
        </div>
        <div className="card" style={{padding:16}}>
          <div style={{fontWeight:700,marginBottom:12,fontSize:13}}>💡 Summary</div>
          <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #eee',fontSize:13}}><span>Taxable Amount</span><span style={{fontFamily:'DM Mono,monospace'}}>{fmtINR(totals.taxable)}</span></div>
          {applyGST && <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #eee',fontSize:13}}><span>GST</span><span style={{fontFamily:'DM Mono,monospace'}}>{fmtINR((totals.cgst||0)*2||(totals.igst||0))}</span></div>}
          {(parseFloat(discount)||0)>0 && <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #eee',fontSize:13,color:'#166534'}}><span>Discount</span><span>−{fmtINR(parseFloat(discount)||0)}</span></div>}
          <div style={{display:'flex',justifyContent:'space-between',padding:'10px 0',fontSize:16,fontWeight:800}}><span>Total</span><span style={{color:'var(--saffron)',fontFamily:'DM Mono,monospace'}}>{fmtINR(totals.total)}</span></div>

        </div>
      </div>

      {/* Items Table */}
      <div className="card" style={{padding:16,marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:12,fontSize:13}}>📦 Purchase Items</div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead><tr style={{background:'#f8f8f8'}}>
              {['#','Item Description','Unit','Qty','Rate (₹)',applyGST?'GST%':'','Amount (₹)',''].map((h,i)=>h&&(
                <th key={i} style={{padding:'7px 8px',textAlign:['Qty','Rate (₹)','Amount (₹)'].includes(h)?'right':'left',fontSize:10,textTransform:'uppercase',color:'#888',letterSpacing:0.7,borderBottom:'2px solid #eee'}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {items.map((it,idx)=>{
                const tv=(parseFloat(it.quantity)||0)*(parseFloat(it.rate)||0);
                return (
                  <tr key={it.id} style={{borderBottom:'1px solid #f5f5f5'}}>
                    <td style={{padding:'6px 8px',color:'#888',width:28}}>{idx+1}</td>
                    <td style={{padding:'4px 6px',minWidth:160}}>
                      <input className="fc" style={{margin:0,padding:'5px 8px',fontSize:12}} value={it.description} onChange={e=>setItem(it.id,'description',e.target.value)} placeholder="Item / service name"
                        list={`inv-list-${it.id}`}/>
                      <datalist id={`inv-list-${it.id}`}>{invItems.map(i=><option key={i.id} value={i.name}/>)}</datalist>
                    </td>
                    <td style={{padding:'4px 6px',width:70}}>
                      <select className="fc" style={{margin:0,padding:'5px',fontSize:11}} value={it.unit} onChange={e=>setItem(it.id,'unit',e.target.value)}>

                    <td style={{padding:'4px 6px',width:90}}><input className="fc" style={{margin:0,padding:'5px 8px',fontSize:12,textAlign:'right'}} type="number" value={it.rate} onChange={e=>setItem(it.id,'rate',e.target.value)}/></td>
                    {applyGST && <td style={{padding:'4px 6px',width:70}}>
                      <select className="fc" style={{margin:0,padding:'5px',fontSize:11}} value={it.gstRate} onChange={e=>setItem(it.id,'gstRate',e.target.value)}>

      <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
        <button className="btn btn-outline" onClick={onCancel}>Cancel</button>
        <button className="btn" style={{background:'var(--saffron)',color:'white',border:'none',padding:'11px 28px',fontWeight:700,borderRadius:'var(--r2)',cursor:'pointer',fontSize:14}} onClick={handleSave}>{initial?'Update Purchase':'Save Purchase'}</button>

  );
}

function Purchases() {
  const {profile, toast} = useApp();
  const fy = (profile&&profile.financialYear)||'2025-26';
  const [list, setList]       = useState([...purchaseDB.getByFY(fy)].reverse());
  const [creating, setCreating] = useState(false);
  const [editing, setEditing]  = useState(null);
  const [delId, setDelId]      = useState(null);
  const [search, setSearch]    = useState('');

  function refresh() { setList([...purchaseDB.getByFY(fy)].reverse()); }

  function handleSave(rec) {
    if (editing) { purchaseDB.update(rec); toast('Purchase updated','ok'); setEditing(null); }
    else { purchaseDB.save(rec); toast('Purchase saved','ok'); setCreating(false); }
    refresh();
  }

  if (creating || editing) {
    return <CreatePurchase initial={editing} onSave={handleSave} onCancel={()=>{setCreating(false);setEditing(null);}}/>;
  }

  const filtered = list.filter(p => !search ||
    (p.purchaseNumber||'').toLowerCase().includes(search.toLowerCase()) ||
    (p.vendorName||'').toLowerCase().includes(search.toLowerCase()));

  const totalPurch = filtered.reduce((s,p)=>s+(p.total||0),0);
  const totalGST   = filtered.reduce((s,p)=>s+((p.cgst||0)+(p.sgst||0)+(p.igst||0)),0);

          <div key={c.label} style={{background:'white',border:'1.5px solid #eee',borderRadius:10,padding:'14px 16px'}}>
            <div style={{fontSize:20,fontWeight:800,color:c.color,fontFamily:'DM Mono,monospace'}}>{c.val}</div>
            <div style={{fontSize:11,color:'#888',marginTop:2}}>{c.label}</div>

      <div style={{background:'white',border:'1.5px solid #eee',borderRadius:12,overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead><tr style={{background:'#0d0f1a',color:'rgba(255,255,255,0.9)'}}>

                <th key={h} style={{padding:'9px 10px',textAlign:['Amount','GST'].includes(h)?'right':'left',fontSize:10,textTransform:'uppercase',letterSpacing:0.8}}>{h}</th>

              {filtered.map(p=>{
                const gst = (p.cgst||0)+(p.sgst||0)+(p.igst||0);
                const stColor = p.paymentStatus==='Paid'?{bg:'#f0fdf4',c:'#166534'}:p.paymentStatus==='Unpaid'?{bg:'#fef2f2',c:'#dc2626'}:{bg:'#fffbeb',c:'#d97706'};

                  <tr key={p.id} style={{borderBottom:'1px solid #f0f0f0'}}>
                    <td style={{padding:'10px'}}>{p.date ? new Date(p.date).toLocaleDateString('en-IN') : '—'}</td>

                    <td style={{padding:'10px',fontSize:11,color:'#666'}}>{p.vendorBillNo||'—'}</td>
                    <td style={{padding:'10px',textAlign:'right',fontFamily:'DM Mono,monospace',fontWeight:700}}>{fmtINR(p.total||0)}</td>

                    <td style={{padding:'10px'}}><span style={{background:stColor.bg,color:stColor.c,borderRadius:4,padding:'2px 8px',fontSize:11,fontWeight:700}}>{p.paymentStatus}</span></td>

            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-outline" style={{flex:1}} onClick={()=>setDelId(null)}>Cancel</button>
              <button className="btn" style={{flex:1,background:'#dc2626',color:'white',border:'none'}} onClick={()=>{purchaseDB.del(delId);toast('Deleted');setDelId(null);refresh();}}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// CREDIT NOTE
// ═══════════════════════════════════════════════════════════════════════
function CreditNotes() {
  const {profile, toast} = useApp();
  const fy = (profile&&profile.financialYear)||'2025-26';
  const applyGST = !!(profile&&profile.gstn);
  const intra = false; // default intra; will compute per customer
  const [list, setList] = useState([...creditNoteDB.getByFY(fy)].reverse());
  const [showForm, setShowForm] = useState(false);
  const [delId, setDelId] = useState(null);
  const [viewItem, setViewItem] = useState(null);
  const custs = customerDB.getActive();
  const invs  = invoiceDB.getAll();
  const blankItem = () => ({id:genId(),description:'',hsnCode:'',unit:'NOS',quantity:'1',rate:'',gstRate:'18'});
  const blankF = () => ({
    date:new Date().toISOString().split('T')[0], customerId:'', againstInvoice:'',
    narration:'', voucherType:'Sales Return', items:[blankItem()],
  });
  const [f, setF] = useState(blankF());
  const setField = k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const setCustomer = e => setF(p=>({...p, customerId:e.target.value, againstInvoice:''}));

  const custInvoices = React.useMemo(() => {
    if (!f.customerId) return invs;
    const cust = custs.find(c=>c.id===f.customerId);
    return invs.filter(i=> i.customerId===f.customerId || (cust && i.customerName===cust.name));
  }, [f.customerId, invs, custs]);

  function updateItem(id,k,v) { setF(p=>({...p,items:p.items.map(i=>i.id===id?{...i,[k]:v}:i)})); }
  function addItem() { setF(p=>({...p,items:[...p.items,blankItem()]})); }
  function removeItem(id) { setF(p=>({...p,items:p.items.filter(i=>i.id!==id)})); }

  const cnTotals = React.useMemo(() => {
    const cust = custs.find(c=>c.id===f.customerId);
    const isI  = applyGST && cust ? isIntraState(profile&&profile.gstn, cust.gstn, cust.state) : true;
    return calcTotals(f.items, isI, 0);
  }, [f.items, f.customerId, applyGST]);

  function refresh() { setList([...creditNoteDB.getByFY(fy)].reverse()); }

  function handleSave() {
    if (!f.customerId) { toast('Select customer','er'); return; }
    if (!f.items.some(i=>i.description.trim())) { toast('Enter at least one item','er'); return; }
    const cust = custs.find(c=>c.id===f.customerId);
    const cnNum = counterDB.next('CN', fy);
    const isI  = applyGST && cust ? isIntraState(profile&&profile.gstn, cust.gstn, cust.state) : true;
    const tots = calcTotals(f.items, isI, 0);
    const savedItems = f.items.filter(i=>i.description.trim()).map(i=>({
      ...i, quantity:parseFloat(i.quantity)||1, rate:parseFloat(i.rate)||0,
      gstRate:applyGST?parseFloat(i.gstRate)||0:0,
    }));
    creditNoteDB.save({
      creditNoteNumber:cnNum, customerId:f.customerId, customerName:cust?.name||'',
      date:f.date, againstInvoice:f.againstInvoice, narration:f.narration,
      voucherType:f.voucherType||'Sales Return',
      items:savedItems, taxable:tots.taxable,
      cgst:tots.cgst, sgst:tots.sgst, igst:tots.igst,
      total:tots.total, applyGST, financialYear:fy,
    });
    // Knock-off against invoice
    if (f.againstInvoice) {
      const inv = invs.find(i=>i.invoiceNumber===f.againstInvoice);
      if (inv) {
        const paid = (inv.amountPaid||0) + tots.total;
        const outstanding = Math.max(0,(inv.total||0)-paid);
        invoiceDB.update({...inv, amountPaid:paid, paymentStatus: outstanding<=0?'Paid':paid>0?'Partial':'Unpaid'});
      }
    }
    toast('Credit Note '+cnNum+' created','ok');
    setShowForm(false); setF(blankF()); refresh();
  }

  const total = list.reduce((s,c)=>s+(c.total||0),0);
  const VOUCHER_TYPES = ['Sales Return','Price Adjustment','Discount','Damaged Goods','Other'];

  return (
    <div>
      <div className="sec-hdr">
        <div>
          <div className="sec-title">📝 Credit Notes</div>

function DebitNotes() {
  const {profile, toast} = useApp();
  const fy = (profile&&profile.financialYear)||'2025-26';
  const applyGST = !!(profile&&profile.gstn);
  const [list, setList] = useState([...debitNoteDB.getByFY(fy)].reverse());
  const [showForm, setShowForm] = useState(false);
  const [delId, setDelId] = useState(null);
  const [viewItem, setViewItem] = useState(null);
  const vends = vendorDB.getAll().filter(v=>v.isActive!==false);
  const purcs = purchaseDB.getAll();
  const blankItem = () => ({id:genId(),description:'',hsnCode:'',unit:'NOS',quantity:'1',rate:'',gstRate:'18'});
  const blankF = () => ({
    date:new Date().toISOString().split('T')[0], vendorId:'', againstPurchase:'',
    narration:'', voucherType:'Purchase Return', items:[blankItem()],
  });
  const [f, setF] = useState(blankF());
  const setField = k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const setVendor = e => setF(p=>({...p, vendorId:e.target.value, againstPurchase:''}));

  const vendPurchases = React.useMemo(() => {
    if (!f.vendorId) return purcs;
    const vend = vends.find(v=>v.id===f.vendorId);
    return purcs.filter(p=> p.vendorId===f.vendorId || (vend && p.vendorName===vend.name));
  }, [f.vendorId, purcs, vends]);

  function updateItem(id,k,v) { setF(p=>({...p,items:p.items.map(i=>i.id===id?{...i,[k]:v}:i)})); }
  function addItem() { setF(p=>({...p,items:[...p.items,blankItem()]})); }
  function removeItem(id) { setF(p=>({...p,items:p.items.filter(i=>i.id!==id)})); }

  const dnTotals = React.useMemo(() => calcTotals(f.items, true, 0), [f.items]);

  function refresh() { setList([...debitNoteDB.getByFY(fy)].reverse()); }

  function handleSave() {
    if (!f.vendorId) { toast('Select vendor','er'); return; }
    if (!f.items.some(i=>i.description.trim())) { toast('Enter at least one item','er'); return; }
    const vend = vends.find(v=>v.id===f.vendorId);
    const dnNum = counterDB.next('DN', fy);
    const tots = calcTotals(f.items, true, 0);
    const savedItems = f.items.filter(i=>i.description.trim()).map(i=>({
      ...i, quantity:parseFloat(i.quantity)||1, rate:parseFloat(i.rate)||0,
      gstRate:applyGST?parseFloat(i.gstRate)||0:0,
    }));
    debitNoteDB.save({
      debitNoteNumber:dnNum, vendorId:f.vendorId, vendorName:vend?.name||'',
      date:f.date, againstPurchase:f.againstPurchase, narration:f.narration,
      voucherType:f.voucherType||'Purchase Return',
      items:savedItems, taxable:tots.taxable,
      cgst:tots.cgst, sgst:tots.sgst, igst:tots.igst,
      total:tots.total, applyGST, financialYear:fy,
    });
    toast('Debit Note '+dnNum+' created','ok');
    setShowForm(false); setF(blankF()); refresh();

const BANK_TYPES = ['Receipt','Payment','Contra','Journal'];
const BANK_ACCOUNTS = ['Cash','Bank - Primary','Bank - Secondary','Petty Cash'];

function BankEntries() {
  const {profile, toast} = useApp();

  const [f, setF] = useState(blank);
  const set = k=>e=>setF(p=>({...p,[k]:e.target.value}));

  function refresh() { setList([...bankDB.getByFY(fy)].reverse()); }

  function handleSave() {
    if (!f.amount || parseFloat(f.amount)<=0) { toast('Enter amount','er'); return; }
    if (!f.narration.trim()) { toast('Enter narration','er'); return; }

          {BANK_TYPES.map(t=><option key={t}>{t}</option>)}

        <select className="fc" style={{width:'auto'}} value={filterAcc} onChange={e=>setFilterAcc(e.target.value)}>

// BULK SALES IMPORT
// ═══════════════════════════════════════════════════════════════════════
function BulkSalesImport({onClose, onImported}) {
  const {profile, toast} = useApp();
  const fy  = (profile&&profile.financialYear)||'2025-26';
  const pfx = (profile&&profile.prefix)||'INV';
  const applyGST = !!(profile&&profile.gstn);
  const [rows, setRows] = useState([]);
  const [step, setStep] = useState(1);
  const [importing, setImporting] = useState(false);

  function handleFile(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(ev.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        if (data.length < 2) { toast('File is empty','er'); return; }
        const headers = data[0].map(h=>String(h).trim().toLowerCase());
        const get = (row,...keys) => { for(const k of keys){ const idx=headers.findIndex(h=>h.includes(k)); if(idx>=0&&row[idx]!==undefined&&row[idx]!=='') return row[idx]; } return ''; };
        const parsed = [];
        // Group by invoice number — each row is an item
        const grouped = {};
        data.slice(1).filter(r=>r.some(c=>c!=='')).forEach(row => {
          const invNo = String(get(row,'invoice','inv no','bill no','number')||'').trim() || ('AUTO-'+(Date.now()));
          if (!grouped[invNo]) {
            grouped[invNo] = {
              invoiceNumber: invNo,
              customerName: String(get(row,'customer','party','buyer','client')||'').trim(),
              customerGSTN: String(get(row,'gstin','gstn','customer gst')||'').trim(),
              date: String(get(row,'date','invoice date')||new Date().toISOString().split('T')[0]).trim(),
              items: [],
            };
          }
          const desc = String(get(row,'description','item','product','particulars','goods')||'').trim();
          const qty  = parseFloat(get(row,'qty','quantity','nos')||1)||1;
          const rate = parseFloat(get(row,'rate','price','unit price','amount')||0)||0;
          const gst  = parseFloat(get(row,'gst','gst%','gst rate','tax')||18)||18;
          if (desc) grouped[invNo].items.push({id:genId(),description:desc,quantity:qty,rate,gstRate:gst,unit:'NOS'});
        });
        const result = Object.values(grouped).filter(g=>g.items.length>0).map(g=>{
          const t = calcTotals(g.items.map(i=>({...i,gstRate:applyGST?i.gstRate:0})), true, 0);
          return {...g, ...t, applyGST, financialYear:fy};
        });
        setRows(result); setStep(2);
      } catch(err) { toast('Could not read file. Use .xlsx or .xls','er'); console.error(err); }
    };
    reader.readAsBinaryString(file);
  }

  function doImport() {
    setImporting(true);
    rows.forEach(row => {
      let invNum = row.invoiceNumber;
      if (!invNum || invNum.startsWith('AUTO-')) invNum = counterDB.next(pfx, fy);
      // Find or create customer
      let custId = '';
      if (row.customerName) {
        let cust = customerDB.getAll().find(c=>c.name.toLowerCase()===row.customerName.toLowerCase());
        if (!cust) cust = customerDB.save({name:row.customerName, gstn:row.customerGSTN||'', isActive:true});
        custId = cust.id;
      }
      invoiceDB.save({invoiceNumber:invNum, customerId:custId, customerName:row.customerName,
        customerGSTN:row.customerGSTN||'', date:row.date, items:row.items,
        taxable:row.taxable, cgst:row.cgst, sgst:row.sgst, igst:row.igst,
        total:row.total, applyGST, financialYear:fy, discount:0});
    });
    toast(`✅ ${rows.length} invoices imported`,'ok');
    setImporting(false); onImported(); onClose();
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(13,15,26,0.65)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:'white',borderRadius:14,padding:24,maxWidth:780,width:'100%',maxHeight:'92vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style={{fontFamily:'Playfair Display,serif',fontSize:18,fontWeight:800}}>📊 Bulk Sales Import</div>
          <button onClick={onClose} style={{background:'none',border:'1.5px solid #ddd',borderRadius:'50%',width:30,height:30,cursor:'pointer'}}>×</button>
        </div>

        {step===1 && (
          <div>
            <div style={{background:'#f0f9ff',border:'1px dashed #38bdf8',borderRadius:10,padding:20,marginBottom:14,textAlign:'center'}}>
              <div style={{fontSize:32,marginBottom:8}}>📤</div>
              <div style={{fontWeight:600,marginBottom:6}}>Upload Sales Excel File</div>
              <div style={{fontSize:12,color:'#666',marginBottom:14}}>Each row = one invoice line item</div>
              <input type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{display:'block',margin:'0 auto'}}/>
            </div>
            <div style={{background:'#fffbeb',border:'1px solid #fcd34d',borderRadius:8,padding:12,fontSize:12}}>
              <strong>Expected columns (flexible — partial match):</strong><br/>
              Invoice No | Date | Customer Name | GSTIN | Description | Qty | Rate | GST% | Unit<br/>
              <span style={{color:'#92400e',marginTop:4,display:'block'}}>Multiple rows with same Invoice No will be merged as items of one invoice.</span>
            </div>
          </div>
        )}

        {step===2 && (
          <div>
            <div style={{marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontWeight:600,color:'#166534'}}>✅ {rows.length} invoices ready to import ({rows.reduce((s,r)=>s+r.items.length,0)} line items)</span>
              <button className="btn btn-outline btn-sm" onClick={()=>setStep(1)}>← Change File</button>
            </div>
            <div style={{overflowX:'auto',maxHeight:380,border:'1px solid #eee',borderRadius:8}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead><tr style={{background:'#0d0f1a',color:'white',position:'sticky',top:0}}>
                  {['#','Inv No','Date','Customer','Items','Taxable','GST','Total'].map(h=>(
                    <th key={h} style={{padding:'7px 10px',textAlign:['Taxable','GST','Total'].includes(h)?'right':'left',whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>{rows.map((r,i)=>(
                  <tr key={i} style={{borderBottom:'1px solid #eee',background:i%2?'#fafafa':'white'}}>
                    <td style={{padding:'6px 10px',color:'#888'}}>{i+1}</td>
                    <td style={{padding:'6px 10px',fontFamily:'monospace',fontWeight:600}}>{r.invoiceNumber.startsWith('AUTO-')?<span style={{color:'#888',fontStyle:'italic'}}>Auto</span>:r.invoiceNumber}</td>
                    <td style={{padding:'6px 10px',whiteSpace:'nowrap'}}>{r.date}</td>
                    <td style={{padding:'6px 10px'}}>{r.customerName||<span style={{color:'#aaa'}}>—</span>}</td>
                    <td style={{padding:'6px 10px'}}>{r.items.length} item{r.items.length!==1?'s':''}</td>
                    <td style={{padding:'6px 10px',textAlign:'right'}}>{fmtINR(r.taxable||0)}</td>
                    <td style={{padding:'6px 10px',textAlign:'right'}}>{fmtINR((r.cgst||0)+(r.sgst||0)+(r.igst||0))}</td>
                    <td style={{padding:'6px 10px',textAlign:'right',fontWeight:700}}>{fmtINR(r.total||0)}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
            <div style={{display:'flex',gap:10,marginTop:16}}>
              <button className="btn btn-outline" style={{flex:1}} onClick={onClose}>Cancel</button>
              <button className="btn" style={{flex:2,background:'#166534',color:'white',border:'none',opacity:importing?0.7:1}} onClick={doImport} disabled={importing}>
                {importing ? '⏳ Importing...' : `📊 Import ${rows.length} Invoices`}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// LEDGER
// ═══════════════════════════════════════════════════════════════════════
function Ledger() {
  const {profile} = useApp();
  const fy = (profile&&profile.financialYear)||'2025-26';
  const [partyType, setPartyType] = useState('Customer');
  const [partyId, setPartyId]     = useState('');
  const [showImport, setShowImport] = useState(false);

  const custs = customerDB.getActive();
  const vends = vendorDB.getAll().filter(v=>v.isActive!==false);
  const parties = partyType==='Customer' ? custs : vends;

  const selectedParty = parties.find(p=>p.id===partyId);

  // Build ledger entries for selected party
  const entries = React.useMemo(() => {
    if (!partyId) return [];
    const [s,e] = fyRange(fy);
    // Parse date safely — treat YYYY-MM-DD as local date, not UTC
    const parseDate = d => {
      if (!d) return new Date(0);
      if (typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)) {
        const [y,m,day] = d.split('-').map(Number);
        return new Date(y, m-1, day);
      }
      return new Date(d);
    };
    const inRange = d => { const dt=parseDate(d); return dt>=s && dt<=e; };
    const rows = [];

    if (partyType==='Customer') {
      // Sales invoices — Debit (amount receivable)
      invoiceDB.getAll().filter(i=>{
        const dateOk = inRange(i.date||i.invoiceDate);
        const partyOk = i.customerId===partyId || i.customerName===selectedParty?.name;
        return dateOk && partyOk;
      }).forEach(i=>{
        rows.push({date:i.date||i.invoiceDate,type:'Sales Invoice',ref:i.invoiceNumber,debit:i.total||0,credit:0,narration:'Sales Invoice — '+(i.customerName||'')});
      });
      // Credit notes
      creditNoteDB.getAll().filter(c=>c.customerId===partyId&&inRange(c.date)).forEach(cn=>{
        rows.push({date:cn.date,type:'Credit Note',ref:cn.creditNoteNumber,debit:0,credit:cn.total||0,narration:cn.reason});
      });
      // Bank receipts
      bankDB.getAll().filter(b=>b.partyId===partyId&&b.type==='Receipt'&&inRange(b.date)).forEach(b=>{
        rows.push({date:b.date,type:'Receipt',ref:b.refNo||b.chequeNo||'',debit:0,credit:b.amount||0,narration:b.narration});
      });
    } else {
      // Purchase invoices — Credit (amount payable)
      purchaseDB.getAll().filter(p=>(p.vendorId===partyId||p.vendorName===selectedParty?.name)&&inRange(p.date)).forEach(p=>{
        rows.push({date:p.date,type:'Purchase',ref:p.purchaseNumber,debit:0,credit:p.total||0,narration:`Bill: ${p.vendorBillNo||'—'}`});
      });
      // Debit notes
      debitNoteDB.getAll().filter(d=>d.vendorId===partyId&&inRange(d.date)).forEach(dn=>{
        rows.push({date:dn.date,type:'Debit Note',ref:dn.debitNoteNumber,debit:dn.total||0,credit:0,narration:dn.reason});
      });
      // Bank payments
      bankDB.getAll().filter(b=>b.partyId===partyId&&b.type==='Payment'&&inRange(b.date)).forEach(b=>{
        rows.push({date:b.date,type:'Payment',ref:b.refNo||b.chequeNo||'',debit:b.amount||0,credit:0,narration:b.narration});
      });
    }

    rows.sort((a,b)=>parseDate(a.date)-parseDate(b.date));

    // Add running balance
    let balance = 0;
    return rows.map(r => {
      balance += (r.debit||0) - (r.credit||0);
      return {...r, balance};
    });
  }, [partyId, partyType, fy, selectedParty]);

  const totalDebit  = entries.reduce((s,e)=>s+(e.debit||0),0);
  const totalCredit = entries.reduce((s,e)=>s+(e.credit||0),0);
  const closingBal  = totalDebit - totalCredit;

  function printLedger() {
    if (!selectedParty || entries.length===0) return;
    const biz = dbRead('al_profile')||{};
    const rows = entries.map(e=>`
      <tr>
        <td>${new Date(e.date).toLocaleDateString('en-IN')}</td>
        <td>${e.type}</td>
        <td>${e.ref||'—'}</td>
        <td>${e.narration||''}</td>
        <td style="text-align:right">${e.debit>0?'₹'+e.debit.toLocaleString('en-IN',{minimumFractionDigits:2}):''}</td>
        <td style="text-align:right">${e.credit>0?'₹'+e.credit.toLocaleString('en-IN',{minimumFractionDigits:2}):''}</td>
        <td style="text-align:right;font-weight:700;color:${e.balance>=0?'#166534':'#dc2626'}">₹${Math.abs(e.balance).toLocaleString('en-IN',{minimumFractionDigits:2})} ${e.balance>=0?'Dr':'Cr'}</td>
      </tr>`).join('');
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Ledger - ${selectedParty.name}</title>
      <style>body{font-family:Arial,sans-serif;font-size:12px;color:#0d0f1a;padding:20px}
      h2{margin:0 0 4px}p{margin:0 0 16px;color:#555;font-size:11px}
      table{width:100%;border-collapse:collapse}thead th{background:#0d0f1a;color:white;padding:8px;font-size:10px;text-transform:uppercase;text-align:left}
      tbody td{padding:7px;border-bottom:1px solid #eee;font-size:11px}
      tfoot td{padding:8px;font-weight:700;border-top:2px solid #0d0f1a}
      @page{size:A4;margin:10mm}@media print{body{padding:0}}</style></head>
      <body><h2>Account Ledger — ${selectedParty.name}</h2>
      <p>${biz.name||''} &nbsp;|&nbsp; FY ${fy} &nbsp;|&nbsp; ${partyType}</p>
      <table><thead><tr><th>Date</th><th>Type</th><th>Reference</th><th>Narration</th><th style="text-align:right">Debit (₹)</th><th style="text-align:right">Credit (₹)</th><th style="text-align:right">Balance</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td colspan="4">Closing Balance</td><td style="text-align:right">₹${totalDebit.toLocaleString('en-IN',{minimumFractionDigits:2})}</td><td style="text-align:right">₹${totalCredit.toLocaleString('en-IN',{minimumFractionDigits:2})}</td><td style="text-align:right;color:${closingBal>=0?'#166534':'#dc2626'}">₹${Math.abs(closingBal).toLocaleString('en-IN',{minimumFractionDigits:2})} ${closingBal>=0?'Dr':'Cr'}</td></tr></tfoot>
      </table></body></html>`;
    printInvoiceHTML(html);
  }

  return (
    <div>
      <div className="sec-hdr">
        <div>
          <div className="sec-title">📒 Ledger</div>
          <div className="sec-sub">Party-wise account statement · FY {fy}</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-outline btn-sm" onClick={()=>setShowImport(true)}>📊 Bulk Import Sales</button>
          {selectedParty && entries.length>0 && (
            <button className="btn btn-sm" style={{background:'#1e40af',color:'white',border:'none',borderRadius:'var(--r2)',padding:'9px 14px',fontWeight:600,cursor:'pointer'}} onClick={printLedger}>🖨️ Print Ledger</button>
          )}
        </div>
      </div>

      {/* Filters */}
      <div style={{background:'white',border:'1.5px solid #eee',borderRadius:12,padding:16,marginBottom:16}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div className="fg"><label className="fl">Party Type</label>
            <select className="fc" value={partyType} onChange={e=>{setPartyType(e.target.value);setPartyId('');}}>
              <option value="Customer">Customer</option>
              <option value="Vendor">Vendor</option>
            </select></div>
          <div className="fg"><label className="fl">Select Party</label>
            <select className="fc" value={partyId} onChange={e=>setPartyId(e.target.value)}>
              <option value="">-- Select {partyType} --</option>
              {parties.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select></div>
        </div>
      </div>

      {!partyId && (
        <div style={{textAlign:'center',padding:'60px 20px',color:'#aaa',background:'white',border:'1.5px solid #eee',borderRadius:12}}>
          <div style={{fontSize:48,marginBottom:12}}>📒</div>
          <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>Select a party to view ledger</div>
          <div style={{fontSize:13}}>Choose a customer or vendor from the dropdowns above</div>
        </div>
      )}

      {partyId && (
        <>
          {/* Party Info + Summary */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:12,marginBottom:16}}>
            {[
              {label:'Total Debit',val:fmtINR(totalDebit),color:'#1e40af'},
              {label:'Total Credit',val:fmtINR(totalCredit),color:'#166534'},
              {label:closingBal>=0?'Amount Receivable':'Amount Payable',val:fmtINR(Math.abs(closingBal)),color:closingBal>=0?'#dc2626':'#166534'},
              {label:'Transactions',val:entries.length,color:'#374151'},
            ].map(c=>(
              <div key={c.label} style={{background:'white',border:'1.5px solid #eee',borderRadius:10,padding:'14px 16px'}}>
                <div style={{fontSize:18,fontWeight:800,color:c.color,fontFamily:'DM Mono,monospace'}}>{c.val}</div>
                <div style={{fontSize:11,color:'#888',marginTop:2}}>{c.label}</div>
              </div>
            ))}
          </div>

          {entries.length===0 ? (
            <div style={{textAlign:'center',padding:'40px',color:'#aaa',background:'white',border:'1.5px solid #eee',borderRadius:12}}>
              <div style={{fontSize:32}}>📭</div>
              <div style={{marginTop:8}}>No transactions found for {selectedParty?.name} in FY {fy}</div>
            </div>
          ) : (
            <div style={{background:'white',border:'1.5px solid #eee',borderRadius:12,overflow:'hidden'}}>
              <div style={{padding:'12px 16px',borderBottom:'1px solid #eee',fontWeight:700,fontSize:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span>📒 {selectedParty?.name}</span>
                <span style={{fontSize:12,fontWeight:400,color:'#888'}}>{selectedParty?.gstn ? 'GSTIN: '+selectedParty.gstn : ''}</span>
              </div>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                  <thead><tr style={{background:'#f8f8f8'}}>
                    {['Date','Type','Reference','Narration','Debit (₹)','Credit (₹)','Balance'].map(h=>(
                      <th key={h} style={{padding:'8px 10px',textAlign:['Debit (₹)','Credit (₹)','Balance'].includes(h)?'right':'left',fontSize:10,textTransform:'uppercase',letterSpacing:0.7,color:'#666',borderBottom:'2px solid #eee'}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {entries.map((e,i)=>(
                      <tr key={i} style={{borderBottom:'1px solid #f5f5f5',background:i%2?'#fafafa':'white'}}>
                        <td style={{padding:'9px 10px',whiteSpace:'nowrap'}}>{new Date(e.date).toLocaleDateString('en-IN')}</td>
                        <td style={{padding:'9px 10px'}}><span style={{background:'#f0f4ff',color:'#1e40af',borderRadius:4,padding:'2px 7px',fontSize:11,fontWeight:600,whiteSpace:'nowrap'}}>{e.type}</span></td>
                        <td style={{padding:'9px 10px',fontFamily:'DM Mono,monospace',fontSize:11,color:'#555'}}>{e.ref||'—'}</td>
                        <td style={{padding:'9px 10px',fontSize:12,maxWidth:200}}>{e.narration}</td>
                        <td style={{padding:'9px 10px',textAlign:'right',fontFamily:'DM Mono,monospace',color:'#1e40af'}}>{e.debit>0?fmtINR(e.debit):''}</td>
                        <td style={{padding:'9px 10px',textAlign:'right',fontFamily:'DM Mono,monospace',color:'#166534'}}>{e.credit>0?fmtINR(e.credit):''}</td>
                        <td style={{padding:'9px 10px',textAlign:'right',fontFamily:'DM Mono,monospace',fontWeight:700,color:e.balance>=0?'#dc2626':'#166534'}}>
                          {fmtINR(Math.abs(e.balance))} <span style={{fontSize:10}}>{e.balance>=0?'Dr':'Cr'}</span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                  <tfoot>
                    <tr style={{background:'#0d0f1a',color:'white'}}>
                      <td colSpan={4} style={{padding:'10px',fontWeight:700,fontSize:13}}>Closing Balance</td>
                      <td style={{padding:'10px',textAlign:'right',fontFamily:'DM Mono,monospace',fontWeight:700}}>{fmtINR(totalDebit)}</td>
                      <td style={{padding:'10px',textAlign:'right',fontFamily:'DM Mono,monospace',fontWeight:700}}>{fmtINR(totalCredit)}</td>
                      <td style={{padding:'10px',textAlign:'right',fontFamily:'DM Mono,monospace',fontWeight:700,color:closingBal>=0?'#fbbf24':'#86efac'}}>
                        {fmtINR(Math.abs(closingBal))} {closingBal>=0?'Dr':'Cr'}
                      </td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          )}
        </>
      )}

      {showImport && (
        <BulkSalesImport onClose={()=>setShowImport(false)} onImported={()=>{}}/>
      )}
    </div>
  );
}

// SMART SEARCH
// ═══════════════════════════════════════════════════════════════════════
function SmartSearch({onNav, onClose}) {
  const {profile} = useApp();
  const [q, setQ] = useState('');
  const inputRef = React.useRef(null);

  useEffect(() => {
    setTimeout(() => inputRef.current && inputRef.current.focus(), 80);
  }, []);

  // Close on Escape
  useEffect(() => {
    const handler = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  const results = React.useMemo(() => {
    const term = q.trim().toLowerCase();
    if (!term || term.length < 1) return [];
    const res = [];

    // ── Invoices ──
    invoiceDB.getAll().filter(i =>
      (i.invoiceNumber||'').toLowerCase().includes(term) ||
      (i.customerName||'').toLowerCase().includes(term) ||
      String(i.total||'').includes(term)
    ).slice(0,5).forEach(i => res.push({
      type:'Invoice', icon:'📄',
      title: i.invoiceNumber,
      sub: `${i.customerName||'—'} · ₹${fmtINR(i.total||0)}`,
      date: i.date||i.invoiceDate,
      action: () => { onNav('history'); onClose(); },
      color:'#1e40af',
    }));

    // ── Customers ──
    customerDB.getActive().filter(c =>
      (c.name||'').toLowerCase().includes(term) ||
      (c.gstn||'').toLowerCase().includes(term) ||
      (c.mobile||'').includes(term)
    ).slice(0,4).forEach(c => res.push({
      type:'Customer', icon:'👥',
      title: c.name,
      sub: `${c.gstn ? 'GSTIN: '+c.gstn : ''}${c.mobile ? ' · '+c.mobile : ''}`,
      date: null,
      action: () => { onNav('customers'); onClose(); },
      color:'#166534',
    }));

    // ── Vendors ──
    vendorDB.getAll().filter(v =>
      v.isActive!==false && (
        (v.name||'').toLowerCase().includes(term) ||
        (v.gstn||'').toLowerCase().includes(term)
      )
    ).slice(0,3).forEach(v => res.push({
      type:'Vendor', icon:'🏪',
      title: v.name,
      sub: v.gstn ? 'GSTIN: '+v.gstn : v.mobile||'',
      date: null,
      action: () => { onNav('vendors'); onClose(); },
      color:'#7e22ce',
    }));

    // ── Purchases ──
    purchaseDB.getAll().filter(p =>
      (p.purchaseNumber||'').toLowerCase().includes(term) ||
      (p.vendorName||'').toLowerCase().includes(term) ||
      (p.vendorBillNo||'').toLowerCase().includes(term)
    ).slice(0,3).forEach(p => res.push({
      type:'Purchase', icon:'🛒',
      title: p.purchaseNumber,
      sub: `${p.vendorName||'—'} · ₹${fmtINR(p.total||0)}`,
      date: p.date,
      action: () => { onNav('purchases'); onClose(); },
      color:'#b45309',
    }));

    // ── Inventory ──
    const bizType = profile && profile.businessType;
    if (bizType !== 'Service Provider') {
      inventoryDB.getAll().filter(i =>
        (i.name||'').toLowerCase().includes(term) ||
        (i.code||'').toLowerCase().includes(term) ||
        (i.hsnCode||'').includes(term)
      ).slice(0,4).forEach(i => res.push({
        type:'Inventory', icon:'📦',
        title: i.name,
        sub: `Stock: ${i.currentStock||0} ${i.unit} · ₹${fmtINR(i.saleRate||0)}`,
        date: null,
        action: () => { onNav('inventory'); onClose(); },
        color:'#0f766e',
      }));
    }

    // ── Expenses ──
    expenseDB.getAll().filter(e =>
      (e.description||'').toLowerCase().includes(term) ||
      (e.category||'').toLowerCase().includes(term)
    ).slice(0,3).forEach(e => res.push({
      type:'Expense', icon:'💸',
      title: e.description,
      sub: `${e.category} · ₹${fmtINR(e.amount||0)}`,
      date: e.date,
      action: () => { onNav('expenses'); onClose(); },
      color:'#dc2626',
    }));

    // ── Pages ──
    const pages = [
      {id:'dashboard',label:'Dashboard',icon:'🏠'},
      {id:'create-invoice',label:'New Invoice',icon:'📄'},
      {id:'history',label:'Invoice History',icon:'📋'},
      {id:'purchases',label:'Purchases',icon:'🛒'},
      {id:'inventory',label:'Inventory',icon:'📦'},
      {id:'credit-notes',label:'Credit Notes',icon:'📝'},
      {id:'debit-notes',label:'Debit Notes',icon:'📋'},
      {id:'bank-entries',label:'Bank & Cash',icon:'🏦'},
      {id:'ledger',label:'Ledger',icon:'📒'},
      {id:'reports',label:'Sales Report',icon:'📊'},
      {id:'gst-summary',label:'GST Summary',icon:'🧾'},
      {id:'gstr1',label:'GSTR-1 Export',icon:'📤'},
      {id:'customers',label:'Customers',icon:'👥'},
      {id:'vendors',label:'Vendors',icon:'🏪'},
      {id:'expenses',label:'Expenses',icon:'💸'},
      {id:'profile',label:'Business Profile',icon:'🏢'},
    ];
    pages.filter(p => p.label.toLowerCase().includes(term)).slice(0,3).forEach(p => res.push({
      type:'Page', icon:p.icon,
      title: p.label,
      sub: 'Go to page',
      date: null,
      action: () => { onNav(p.id); onClose(); },
      color:'#374151',
    }));

    return res.slice(0, 12);
  }, [q, profile]);

  const isEmpty = q.trim().length > 0 && results.length === 0;

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(13,15,26,0.6)',zIndex:9999,display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:80,padding:'80px 16px 0'}}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{background:'white',borderRadius:16,width:'100%',maxWidth:600,boxShadow:'0 20px 60px rgba(0,0,0,0.25)',overflow:'hidden'}}>
        {/* Search Input */}
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'14px 18px',borderBottom:'1.5px solid #f0f0f0'}}>
          <span style={{fontSize:20,flexShrink:0}}>🔍</span>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)}
            placeholder="Search invoices, customers, vendors, items, pages..."
            style={{flex:1,border:'none',outline:'none',fontSize:15,fontFamily:'DM Sans,sans-serif',background:'transparent',color:'#0d0f1a'}}/>
          {q && <button onClick={()=>setQ('')} style={{background:'none',border:'none',cursor:'pointer',color:'#aaa',fontSize:18,padding:'0 4px'}}>×</button>}

// PENDING BILLS
// ═══════════════════════════════════════════════════════════════════════
function PendingBills({nav}) {
  const {profile, toast} = useApp();
  const fy = (profile&&profile.financialYear)||'2025-26';
  const [invs, setInvs] = useState(invoiceDB.getAll());
  const [filterStatus, setFilterStatus] = useState('All');
  const [receiveModal, setReceiveModal] = useState(null); // invoice object
  const [recAmt, setRecAmt] = useState('');
  const [recDate, setRecDate] = useState(new Date().toISOString().split('T')[0]);
  const [recMode, setRecMode] = useState('Bank');
  const allCNs = creditNoteDB.getAll();

  function getOutstanding(inv) {
    const knocked = allCNs.filter(c=>c.againstInvoice===inv.invoiceNumber).reduce((s,c)=>s+(c.total||0),0);
    return Math.max(0, (inv.total||0) - (inv.amountPaid||0) - knocked);
  }

  function getDueStatus(inv) {
    const os = getOutstanding(inv);
    if (os <= 0) return 'Paid';
    if (!inv.creditPeriod || inv.creditPeriod==='Immediate') return 'Due';
    const days = parseInt(inv.creditPeriod)||0;
    const invDate = new Date(inv.invoiceDate||inv.date);
    const dueDate = new Date(invDate);
    dueDate.setDate(dueDate.getDate() + days);
    const today = new Date();
    return dueDate < today ? 'Overdue' : 'Due';
  }

  const pending = React.useMemo(() => {
    return invs.filter(i => getOutstanding(i) > 0).sort((a,b)=>new Date(a.invoiceDate||a.date)-new Date(b.invoiceDate||b.date));
  }, [invs, allCNs]);

  const filtered = filterStatus==='All' ? pending : pending.filter(i=>getDueStatus(i)===filterStatus);
  const totalPending = pending.reduce((s,i)=>s+getOutstanding(i), 0);
  const totalOverdue = pending.filter(i=>getDueStatus(i)==='Overdue').reduce((s,i)=>s+getOutstanding(i), 0);

  function refresh() { setInvs(invoiceDB.getAll()); }

  function receivePayment() {
    const amt = parseFloat(recAmt);
    if (!amt || amt <= 0) { toast('Enter valid amount','er'); return; }
    const inv = receiveModal;
    const os  = getOutstanding(inv);
    const newPaid = (inv.amountPaid||0) + Math.min(amt, os);
    const newOS   = Math.max(0, os - amt);
    const newStatus = newOS <= 0 ? 'Paid' : newPaid > 0 ? 'Partial' : 'Unpaid';
    // Update invoice
    invoiceDB.update({...inv, amountPaid: newPaid, paymentStatus: newStatus});
    // Record bank entry
    bankDB.save({
      id: genId(), date: recDate, type:'Receipt', account: recMode,
      partyType:'Customer', partyId: inv.customerId||'',
      partyName: inv.customerName||(inv.customer&&inv.customer.name)||'',
      amount: Math.min(amt, os), refNo: inv.invoiceNumber,
      narration:`Receipt against ${inv.invoiceNumber}`, financialYear:fy,
    });
    toast('Payment of '+fmtINR(Math.min(amt,os))+' recorded ✅','ok');
    setReceiveModal(null); setRecAmt(''); refresh();
  }

  const statusColor = s => s==='Overdue'?{bg:'#fef2f2',c:'#dc2626'}:s==='Due'?{bg:'#fffbeb',c:'#d97706'}:{bg:'#f0fdf4',c:'#166534'};

  return (
    <div>
      <div className="sec-hdr">
        <div>
          <div className="sec-title">⏳ Pending Bills</div>
          <div className="sec-sub">{pending.length} bills · {fmtINR(totalPending)} outstanding</div>
        </div>
        <button className="btn btn-outline" onClick={()=>nav('create-invoice')}>+ New Invoice</button>
      </div>

      {/* Summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}}>
        {[
          {label:'Total Outstanding',value:fmtINR(totalPending),color:'#dc2626',bg:'#fef2f2',icon:'💰'},
          {label:'Overdue',value:fmtINR(totalOverdue),color:'#d97706',bg:'#fffbeb',icon:'⚠️'},
          {label:'No. of Bills',value:String(pending.length),color:'#1e40af',bg:'#eff6ff',icon:'📋'},
        ].map(c=>(
          <div key={c.label} style={{background:c.bg,border:`1.5px solid ${c.color}22`,borderRadius:10,padding:'12px 14px'}}>
            <div style={{fontSize:18,marginBottom:4}}>{c.icon}</div>
            <div style={{fontWeight:800,fontSize:16,color:c.color,fontFamily:'DM Mono,monospace'}}>{c.value}</div>
            <div style={{fontSize:11,color:'#6b7280',marginTop:2}}>{c.label}</div>
          </div>
        ))}
      </div>

      {/* Filter tabs */}
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {['All','Due','Overdue'].map(s=>(
          <button key={s} onClick={()=>setFilterStatus(s)}
            style={{padding:'6px 14px',borderRadius:20,border:'1.5px solid',fontSize:12,fontWeight:600,cursor:'pointer',
              borderColor:filterStatus===s?'#dc2626':'#ddd',
              background:filterStatus===s?'#dc2626':'white',
              color:filterStatus===s?'white':'#555'}}>
            {s}
          </button>
        ))}
      </div>

      <div style={{background:'white',border:'1.5px solid #eee',borderRadius:12,overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,minWidth:640}}>
          <thead><tr style={{background:'#0d0f1a',color:'rgba(255,255,255,.9)'}}>
            {['Invoice No','Customer','Date','Credit','Invoice Amt','Paid','Outstanding','Status','Action'].map(h=>(
              <th key={h} style={{padding:'9px 10px',textAlign:['Invoice Amt','Paid','Outstanding'].includes(h)?'right':'left',fontSize:10,textTransform:'uppercase',letterSpacing:.6,whiteSpace:'nowrap'}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={9} style={{padding:40,textAlign:'center',color:'#aaa'}}><div style={{fontSize:32}}>✅</div><div>No pending bills!</div></td></tr>}
            {filtered.map(inv=>{
              const os = getOutstanding(inv);
              const ds = getDueStatus(inv);
              const sc = statusColor(ds);
              const custName = inv.customerName||(inv.customer&&(typeof inv.customer==='string'?inv.customer:inv.customer.name))||'—';
              return (
                <tr key={inv.id} style={{borderBottom:'1px solid #f5f5f5'}}>
                  <td style={{padding:'10px',fontFamily:'DM Mono,monospace',fontSize:12,fontWeight:700,color:'#1e40af',whiteSpace:'nowrap'}}>{inv.invoiceNumber}</td>
                  <td style={{padding:'10px',fontWeight:500,whiteSpace:'nowrap'}}>{custName}</td>
                  <td style={{padding:'10px',fontSize:12,color:'#555',whiteSpace:'nowrap'}}>{inv.invoiceDate||inv.date}</td>
                  <td style={{padding:'10px',fontSize:11,color:'#777'}}>{inv.creditPeriod||'—'}</td>
                  <td style={{padding:'10px',textAlign:'right',fontFamily:'DM Mono,monospace'}}>{fmtINR(inv.total||0)}</td>
                  <td style={{padding:'10px',textAlign:'right',fontFamily:'DM Mono,monospace',color:'#166534'}}>{fmtINR(inv.amountPaid||0)}</td>
                  <td style={{padding:'10px',textAlign:'right',fontFamily:'DM Mono,monospace',fontWeight:700,color:'#dc2626'}}>{fmtINR(os)}</td>
                  <td style={{padding:'10px'}}><span style={{background:sc.bg,color:sc.c,borderRadius:4,padding:'3px 8px',fontSize:11,fontWeight:700}}>{ds}</span></td>
                  <td style={{padding:'10px',whiteSpace:'nowrap'}}>
                    <button className="btn btn-sm" style={{background:'#166534',color:'white',border:'none',borderRadius:6,padding:'5px 10px',fontSize:11,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}
                      onClick={()=>{setReceiveModal(inv);setRecAmt(String(os));}}>
                      💰 Receive
                    </button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Receive Payment Modal */}
      {receiveModal && (
        <div style={{position:'fixed',inset:0,background:'rgba(13,15,26,0.65)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{background:'white',borderRadius:14,padding:24,maxWidth:400,width:'100%'}}>
            <div style={{fontFamily:'Playfair Display,serif',fontSize:17,fontWeight:800,marginBottom:4}}>💰 Receive Payment</div>
            <div style={{fontSize:12,color:'#666',marginBottom:16}}>{receiveModal.invoiceNumber} · Outstanding: <strong style={{color:'#dc2626'}}>{fmtINR(getOutstanding(receiveModal))}</strong></div>
            <div className="fg" style={{marginBottom:10}}><label className="fl">Date</label><input className="fc" type="date" value={recDate} onChange={e=>setRecDate(e.target.value)}/></div>
            <div className="fg" style={{marginBottom:10}}><label className="fl">Amount Received (₹)</label><input className="fc" type="number" value={recAmt} onChange={e=>setRecAmt(e.target.value)} placeholder="0.00"/></div>
            <div className="fg" style={{marginBottom:16}}><label className="fl">Payment Mode</label>
              <select className="fc" value={recMode} onChange={e=>setRecMode(e.target.value)}>
                {['Bank','Cash','UPI','Cheque','NEFT/RTGS'].map(m=><option key={m}>{m}</option>)}
              </select></div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-outline" style={{flex:1}} onClick={()=>setReceiveModal(null)}>Cancel</button>
              <button className="btn" style={{flex:2,background:'#166534',color:'white',border:'none'}} onClick={receivePayment}>✅ Confirm Receipt</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
