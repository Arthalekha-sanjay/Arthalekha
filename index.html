<style>
:root{
  --ink:#0f1123;--ink2:#3d4060;--paper:#faf9f6;--warm:#f4f1eb;
  --saffron:#cc2222;--saffron2:#e03333;--gold:#2d8a2d;
  --green:#2d8a2d;--red:#cc2222;--blue:#2d8a2d;
  --border:#e2ddd6;--border2:#c8c2b8;
  --surface:#ffffff;--dim:#f8f6f2;
  --sh:0 1px 3px rgba(15,17,35,.08);
  --sh2:0 4px 16px rgba(13,15,26,.10);
  --sh3:0 12px 40px rgba(13,15,26,.14);
  --r:10px;--r2:6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body,#root{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.6;}

/* LAYOUT */
.shell{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:240px;min-width:240px;background:var(--ink);display:flex;flex-direction:column;overflow:hidden;position:relative;}
.sidebar::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(232,93,4,.15) 0%,transparent 70%);pointer-events:none;}
.sb-brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:1px;}
.sb-logo span{color:var(--saffron);}
.sb-tag{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
.sb-section{padding:12px 12px 4px;}
.sb-section-label{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase;padding:0 8px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r2);cursor:pointer;color:rgba(255,255,255,.6);font-size:13px;font-weight:500;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
.nav-item.active{background:var(--saffron);color:#fff;}
.nav-item .ni{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.sb-footer{margin-top:auto;padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;color:rgba(255,255,255,.25);}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;}
.page{flex:1;overflow-y:auto;padding:24px 28px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;text-decoration:none;}
.btn-primary{background:var(--saffron);color:white;}
.btn-primary:hover{background:#c84b00;transform:translateY(-1px);box-shadow:0 4px 12px rgba(232,93,4,.35);}
.btn-secondary{background:var(--ink);color:white;}
.btn-secondary:hover{background:#222440;}
.btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--border2);}
.btn-outline:hover{border-color:var(--ink);background:var(--dim);}
.btn-danger{background:var(--red);color:white;}
.btn-danger:hover{background:#dc2626;}
.btn-sm{padding:6px 12px;font-size:12px;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--sh);}
.card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;margin-bottom:16px;color:var(--ink);display:flex;align-items:center;gap:8px;}

/* FORM */
.fg{margin-bottom:16px;}
.fl{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.fl .req{color:var(--saffron);}
.fc{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:var(--surface);transition:border-color .15s,box-shadow .15s;outline:none;}
.fc:focus{border-color:var(--saffron);box-shadow:0 0 0 3px rgba(232,93,4,.12);}
.fc.err{border-color:var(--red);}
select.fc{cursor:pointer;}
.fe{font-size:11px;color:var(--red);margin-top:4px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}

/* TABLE */
.tw{overflow-x:auto;}
table.dt{width:100%;border-collapse:collapse;font-size:13px;}
.dt thead th{background:var(--dim);color:var(--ink2);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:10px 12px;border-bottom:2px solid var(--border);text-align:left;white-space:nowrap;}
.dt tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
.dt tbody tr:hover{background:var(--dim);}
.dt tbody td{padding:12px;color:var(--ink);}
.tr{text-align:right;}
.tc{text-align:center;}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.b-green{background:#d1fae5;color:#065f46;}
.b-blue{background:#dbeafe;color:#1e40af;}
.b-red{background:#fee2e2;color:#991b1b;}
.b-gray{background:var(--dim);color:var(--ink2);}
.b-yellow{background:#fef3c7;color:#92400e;}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;height:3px;width:100%;}
.sc-orange::after{background:var(--saffron);}
.sc-green::after{background:var(--green);}
.sc-blue::after{background:var(--blue);}
.sc-gold::after{background:var(--gold);}
.stat-label{font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.8px;font-weight:600;}
.stat-val{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin:4px 0;color:var(--ink);}
.stat-sub{font-size:11px;color:var(--ink2);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(13,15,26,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.modal{background:var(--surface);border-radius:14px;padding:28px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--sh3);}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.modal-x{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ink2);transition:all .15s;font-family:'DM Sans',sans-serif;}
.modal-x:hover{background:var(--dim);}

/* ITEMS TABLE */
.it{width:100%;border-collapse:collapse;}
.it th{background:var(--ink);color:rgba(255,255,255,.8);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:8px;text-align:left;}
.it td{padding:4px;border-bottom:1px solid var(--border);}
.it input,.it select{width:100%;padding:7px 8px;border:1.5px solid transparent;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:12px;background:var(--dim);outline:none;transition:border-color .15s;}
.it input:focus,.it select:focus{border-color:var(--saffron);background:white;}

/* SUMMARY PANEL */
.inv-sum{background:var(--ink);color:white;border-radius:var(--r);padding:18px 20px;}
.sum-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;}
.sum-row.tot{border-top:1px solid rgba(255,255,255,.2);margin-top:8px;padding-top:10px;font-size:17px;font-weight:700;}
.sum-row .lbl{color:rgba(255,255,255,.7);}
.sum-row .amt{font-family:'DM Mono',monospace;}

/* TOAST */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--ink);color:white;padding:12px 18px;border-radius:var(--r2);font-size:13px;box-shadow:var(--sh3);display:flex;align-items:center;gap:8px;min-width:260px;animation:slideIn .2s ease;}
.toast.ok{background:#065f46;}
.toast.er{background:#991b1b;}
@keyframes slideIn{from{transform:translateX(110%);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* MISC */
.empty{text-align:center;padding:60px 20px;color:var(--ink2);}
.empty .ei{font-size:48px;margin-bottom:12px;}
.empty h3{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:6px;color:var(--ink);}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.sec-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.sec-sub{font-size:12px;color:var(--ink2);margin-top:2px;}
.divider{height:1px;background:var(--border);margin:20px 0;}
.tag{display:inline-flex;padding:2px 8px;background:var(--dim);border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:'DM Mono',monospace;color:var(--ink2);}
.mono{font-family:'DM Mono',monospace;}
.gst-badge{display:inline-flex;align-items:center;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:4px;padding:2px 8px;font-family:'DM Mono',monospace;font-size:11px;color:#15803d;}
.info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:var(--r2);padding:12px 14px;font-size:12px;color:#1e40af;display:flex;align-items:flex-start;gap:8px;}
.mb16{margin-bottom:16px;}
.mb20{margin-bottom:20px;}
.flex-c{display:flex;align-items:center;gap:8px;}
.flex-b{display:flex;align-items:center;justify-content:space-between;}

/* MOBILE NAV */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--ink);border-top:1px solid rgba(255,255,255,.1);z-index:500;padding-bottom:env(safe-area-inset-bottom);}
.mob-nav-inner{display:flex;overflow-x:auto;scrollbar-width:none;}
.mob-nav-inner::-webkit-scrollbar{display:none;}
.mob-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 14px;min-width:58px;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.45);font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;transition:color .15s;}
.mob-btn .mi,.mob-btn .ni{font-size:20px;}
.mob-btn.active{color:var(--saffron);}

/* PRINT */
@media print{
  body>*{display:none!important;}
  #al-po{display:block!important;position:fixed!important;inset:0!important;background:white!important;z-index:99999!important;}
  #al-po iframe{width:100%!important;height:100%!important;border:none!important;}
}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none;}
  .mob-nav{display:block;}
  .mob-fab{display:flex!important;}
  .page{padding:16px 14px 84px;}
  .topbar{padding:0 16px;height:52px;}
  .topbar-title{font-size:16px;}
  .stat-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .stat-val{font-size:18px!important;}
  .fr2,.fr3{grid-template-columns:1fr;}
  .overlay{align-items:flex-end;padding:0;}
  .modal{border-radius:20px 20px 0 0;max-height:92vh;max-width:100vw;width:100%;margin:0;padding:20px 16px;}
  .sec-hdr{flex-direction:column;align-items:flex-start;gap:10px;}
  .card{padding:16px;}
}
@media(min-width:769px) and (max-width:900px){
  .sidebar{width:56px;min-width:56px;}
  .sb-tag,.nav-item span,.sb-section-label,.sb-footer{display:none;}
  .sb-logo{font-size:16px;}
  .nav-item{justify-content:center;padding:10px;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  .fr2,.fr3{grid-template-columns:1fr;}
}

/* AUTH */
.auth-left-panel{display:flex!important;}
@media(max-width:640px){
  .auth-left-panel{display:none!important;}
  .auth-right-panel{width:100%!important;min-height:100vh!important;padding:32px 24px!important;}
}

/* SYNC */
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:600px){ .hide-sm{display:none!important;} }

// ── Per-user localStorage scoping ─────────────────────────────────────
// All data keys are suffixed with the logged-in user's UID
// so two users on the same device never share data
let _currentUID = null;
function setCurrentUID(uid) { _currentUID = uid; }
function _scopedKey(k) {
  // Global keys (not user-specific)
  if (k === 'al_last_sync') return k;
  return _currentUID ? k + '__' + _currentUID : k;
}
const dbRead  = k => { try { const d = localStorage.getItem(_scopedKey(k)); return d ? JSON.parse(d) : null; } catch { return null; } };
const dbWrite = (k,v) => { try { localStorage.setItem(_scopedKey(k), JSON.stringify(v)); } catch(e) { console.error(e); } };
function clearUserData() {
  // Remove all scoped keys for current user
  if (!_currentUID) return;
  const suffix = '__' + _currentUID;
  Object.keys(localStorage).filter(k => k.endsWith(suffix)).forEach(k => localStorage.removeItem(k));
}

// ── One-time data migration — fixes objects stored as field values ────────
(function migrateData() {
  try {
    const invs = dbRead('al_invoices');
    if (!invs || !Array.isArray(invs)) return;
    let changed = false;
    const fixed = invs.map(function(inv) {
      const i = Object.assign({}, inv);
      // Fix customerName stored as object {name:'SBT',gstn:'...'}
      if (i.customerName !== null && typeof i.customerName === 'object') {
        i.customerName = i.customerName.name || i.customerName.businessName || '';
        changed = true;
      }
      // Fix customer stored as object
      if (i.customer !== null && typeof i.customer === 'object') {
        const cn = i.customer.name || i.customer.businessName || '';
        if (!i.customerName) i.customerName = cn;
        i.customer = cn;
        changed = true;
      }
      // Normalise date fields
      if (!i.date && i.invoiceDate) { i.date = i.invoiceDate; changed = true; }
      if (!i.invoiceDate && i.date) { i.invoiceDate = i.date; changed = true; }
      if (!i.subtotal && i.taxable) { i.subtotal = i.taxable; changed = true; }
      return i;
    });
    if (changed) dbWrite('al_invoices', fixed);
  } catch(e) {}
})();

const profileDB = {
  get: () => dbRead('al_profile'),
  save: p => { const d = {...p, updatedAt: new Date().toISOString()}; dbWrite('al_profile', d); return d; }
};

// ── AUTH DB ──────────────────────────────────────────────────
const customerDB = {
  getAll: () => dbRead('al_customers') || [],
  getActive: () => (dbRead('al_customers') || []).filter(c => c.isActive !== false),
  save: c => {
    const all = dbRead('al_customers') || [];
    if (c.id) {
      const updated = all.map(x => x.id === c.id ? {...c, updatedAt: new Date().toISOString()} : x);
      dbWrite('al_customers', updated);
      return updated.find(x => x.id === c.id);
    }
    const n = {...c, id: genId(), isActive: true, createdAt: new Date().toISOString()};
    dbWrite('al_customers', [...all, n]);
    return n;
  },
  dupGSTN: (gstn, excl) => {
    if (!gstn) return false;
    return (dbRead('al_customers') || []).some(c => c.gstn === gstn && c.id !== excl && c.isActive !== false);
  },
  del: id => dbWrite('al_customers', (dbRead('al_customers') || []).map(
    c => c.id === id ? {...c, isActive: false} : c)),
};

const vendorDB = {
  getAll: () => dbRead('al_vendors') || [],
  getActive: () => (dbRead('al_vendors') || []).filter(v => v.isActive !== false),

    const all = dbRead('al_vendors') || [];
    if (v.id) {
      const updated = all.map(x => x.id === v.id ? {...v, updatedAt: new Date().toISOString()} : x);
      dbWrite('al_vendors', updated);
      return updated.find(x => x.id === v.id);

// Financial year range helper
function fyRange(fy) {
  const parts = (fy || '2025-26').split('-');
  const startYear = parseInt(parts[0]);
  const endYear   = startYear + 1;
  return [
    new Date(startYear, 3, 1),
    new Date(endYear, 2, 31, 23, 59, 59),
  ];
}

// FIREBASE DATA SYNC — saves/loads per user account
// ══════════════════════════════════════════════════════
const FRSYNC = {
  // Save ALL local data to Firebase under /users/{uid}/
  async push(uid) {
    if (!uid) return;
    const payload = {
      profile:       dbRead('al_profile')       || null,
      customers:     dbRead('al_customers')     || [],
      vendors:       dbRead('al_vendors')       || [],
      invoices:      dbRead('al_invoices')      || [],
      counters:      dbRead('al_counters')      || {},
      expenses:      dbRead('al_expenses')      || [],
      inventory:     dbRead('al_inventory')     || [],
      purchases:     dbRead('al_purchases')     || [],
      credit_notes:  dbRead('al_credit_notes')  || [],
      debit_notes:   dbRead('al_debit_notes')   || [],
      bank_entries:  dbRead('al_bank_entries')  || [],
      bizLogo:       dbRead('al_biz_logo')      || null,
      bizSign:       dbRead('al_biz_sign')      || null,
      savedAt:       new Date().toISOString(),
    };
    await fbDB.ref('users/' + uid).set(payload);
    dbWrite('al_last_sync', new Date().toISOString());
  },

  // Load user data from Firebase into localStorage
  async pull(uid) {
    if (!uid) return;
    const snap = await fbDB.ref('users/' + uid).get();
    if (!snap.exists()) {
      // Brand new user — no data in Firebase yet. Clear any stale local data.
      // (Data is already scoped to UID so this is just a safety clear)
      return false;
    }
    const data = snap.val();
    if (data.profile)                 dbWrite('al_profile',      data.profile);
    if (data.customers?.length)       dbWrite('al_customers',    data.customers);
    if (data.vendors?.length)         dbWrite('al_vendors',      data.vendors);
    if (data.invoices?.length)        dbWrite('al_invoices',     data.invoices);
    if (data.counters)                dbWrite('al_counters',     data.counters);
    if (data.expenses?.length)        dbWrite('al_expenses',     data.expenses);
    if (data.inventory?.length)       dbWrite('al_inventory',    data.inventory);
    if (data.purchases?.length)       dbWrite('al_purchases',    data.purchases);
    if (data.credit_notes?.length)    dbWrite('al_credit_notes', data.credit_notes);
    if (data.debit_notes?.length)     dbWrite('al_debit_notes',  data.debit_notes);
    if (data.bank_entries?.length)    dbWrite('al_bank_entries', data.bank_entries);
    if (data.bizLogo)                 dbWrite('al_biz_logo',     data.bizLogo);
    if (data.bizSign)                 dbWrite('al_biz_sign',     data.bizSign);
    dbWrite('al_last_sync', new Date().toISOString());
    return true;
  },

  getLastSync() {
    const s = dbRead('al_last_sync');
    if (!s) return null;
    return new Date(s).toLocaleString('en-IN', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  },

  // Auto-save with 3s debounce — call this after any data change
  _timer: null,
  autoSave(uid) {
    if (!uid) return;
    clearTimeout(FRSYNC._timer);
    FRSYNC._timer = setTimeout(() => FRSYNC.push(uid).catch(()=>{}), 3000);
  },
};

// GST LOGIC
// ═══════════════════════════════════════
function getGSTINState(gstin) {
  if (!gstin || !GSTIN_RE.test(gstin)) return null;
  return gstin.substring(0, 2);
}

function isIntraState(supplierGSTIN, customerGSTIN, customerState) {
  if (!supplierGSTIN) return true;
  const supCode = getGSTINState(supplierGSTIN);
  if (!supCode) return true;
  if (customerGSTIN) {
    const cusCode = getGSTINState(customerGSTIN);
    return supCode === cusCode;
  }
  const cusCode = STATE_CODES[customerState] || '00';
  return supCode === cusCode;
}

function calcTotals(items, intra, discount) {
  let taxable = 0, cgst = 0, sgst = 0, igst = 0;
  items.forEach(item => {
    const qty = parseFloat(item.quantity) || 0;
    const rate = parseFloat(item.rate) || 0;
    const gstRate = parseFloat(item.gstRate) || 0;
    const tv = qty * rate;
    const gst = tv * gstRate / 100;
    taxable += tv;
    if (intra) { cgst += gst / 2; sgst += gst / 2; } else { igst += gst; }
  });
  taxable = Math.round(taxable * 100) / 100;
  cgst = Math.round(cgst * 100) / 100;
  sgst = Math.round(sgst * 100) / 100;
  igst = Math.round(igst * 100) / 100;
  const disc = parseFloat(discount) || 0;
  const gross = taxable + cgst + sgst + igst - disc;
  const rounded = Math.round(gross);
  const roundOff = Math.round((rounded - gross) * 100) / 100;
  return { taxable, cgst, sgst, igst, discount: disc, roundOff, total: rounded };
}

function fmtINR(n) {
  return '₹' + (parseFloat(n) || 0).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function numWords(num) {
  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function h(n) {
    if (!n) return '';
    if (n < 20) return ones[n] + ' ';
    if (n < 100) return tens[Math.floor(n/10)] + (n%10 ? ' '+ones[n%10] : '') + ' ';
    return ones[Math.floor(n/100)] + ' Hundred ' + h(n%100);
  }
  if (!num) return 'Zero Rupees Only';
  const r = Math.floor(num), p = Math.round((num - r) * 100);
  let res = '';
  if (r >= 10000000) res += h(Math.floor(r/10000000)) + 'Crore ';
  if (r >= 100000) res += h(Math.floor((r%10000000)/100000)) + 'Lakh ';
  if (r >= 1000) res += h(Math.floor((r%100000)/1000)) + 'Thousand ';
  res += h(r % 1000) + 'Rupees';
  if (p > 0) res += ' and ' + h(p) + 'Paise';
  return res.trim().replace(/\s+/g,' ') + ' Only';
}

// PRINT / DOWNLOAD — IFRAME METHOD (works everywhere)
// ═══════════════════════════════════════
function printInvoiceHTML(html) {
  var old = document.getElementById('al-po');
  if (old) old.remove();

  var overlay = document.createElement('div');
  overlay.id = 'al-po';
  overlay.style.cssText = 'display:none;position:fixed;inset:0;background:white;z-index:99999;';

  var iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;height:100%;border:none;';

  // Use Blob URL instead of srcdoc — srcdoc fails silently when HTML is large
  // (e.g. when invoice contains base64 logo/signature images)
  var blob = new Blob([html], {type: 'text/html;charset=utf-8'});
  var blobUrl = URL.createObjectURL(blob);
  iframe.src = blobUrl;

  overlay.appendChild(iframe);
  document.body.appendChild(overlay);

  var printed = false;
  function doPrint() {
    if (printed) return;
    printed = true;
    overlay.style.display = 'block';
    setTimeout(function() {
      window.print();
      setTimeout(function() {
        overlay.style.display = 'none';
        if (overlay.parentNode) overlay.remove();
        URL.revokeObjectURL(blobUrl);
      }, 1500);
    }, 500);
  }

  iframe.addEventListener('load', doPrint);
  // Fallback if load doesn't fire within 3s
  setTimeout(doPrint, 3000);
}

function downloadInvoiceHTML(html, invoiceNumber) {
  var fname = (invoiceNumber || 'invoice').replace(/\//g, '-') + '.html';
  var blob = new Blob([html], {type: 'text/html;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = fname;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(function() { URL.revokeObjectURL(url); if (a.parentNode) a.remove(); }, 1000);
}

    + (inv.refNo ? '<strong>Ref / PO No:</strong> ' + inv.refNo + '<br>' : '')
    + '<strong>FY:</strong> ' + (inv.financialYear||'')
    + '</div></div></div>'
    + '<div class="bill">'
    + '<div class="bx"><h4>Bill To</h4>'
    + '<div class="cn">' + (inv.customer && inv.customer.name ? inv.customer.name : '') + '</div>'
    + '<p>'
    + (inv.customer && inv.customer.address ? inv.customer.address : '')
    + (inv.customer && inv.customer.city ? ', ' + inv.customer.city : '') + '<br>'
    + (inv.customer && inv.customer.state ? inv.customer.state : '')
    + (inv.customer && inv.customer.pincode ? ' - ' + inv.customer.pincode : '') + '<br>'
    + (inv.customer && inv.customer.gstn ? '<span class="gb">GSTIN: ' + inv.customer.gstn + '</span>' : '')
    + '</p></div>'
    + '<div class="bx"><h4>Invoice Details</h4>'
    + '<p><strong>Tax Type:</strong><br>' + taxTypeText + '<br><br>'
    + '<strong>Place of Supply:</strong><br>'
    + (inv.customer && inv.customer.state ? inv.customer.state : '')
    + (inv.creditPeriod ? '<br><br><strong>Credit Period:</strong><br>' + inv.creditPeriod : '')
    + '</p></div></div>'
    + '<table><thead><tr>'
    + '<th style="width:28px">#</th><th>Description</th>'
    + (isService ? '' : '<th style="width:42px;text-align:center">Unit</th>')
    + (isService ? '' : '<th style="width:52px;text-align:right">Qty</th>')
    + (isService ? '' : '<th style="width:70px;text-align:right">Rate</th>')
    + (isService ? '<th style="width:90px;text-align:right">Amount</th>' : '')
    + (hasGST ? '<th style="width:48px;text-align:right">GST%</th>' : '')
    + '<th style="width:80px;text-align:right">' + (isService ? 'Total' : 'Amount') + '</th>'
    + '</tr></thead><tbody>' + rows + '</tbody></table>'
    + '<div class="sw"><table class="st">'
    + '<tr><td>' + (hasGST ? 'Taxable Value' : 'Sub Total') + '</td><td style="text-align:right">&#8377;' + (inv.taxable||inv.taxableValue||0).toLocaleString('en-IN',{minimumFractionDigits:2}) + '</td></tr>'
    + taxRows + discRow + roRow
    + '<tr class="tot"><td>TOTAL AMOUNT</td><td style="text-align:right" class="a">&#8377;' + (inv.total||inv.totalAmount||0).toLocaleString('en-IN',{minimumFractionDigits:2}) + '</td></tr>'
    + '</table></div>'
    + '<div class="words"><strong>Amount in Words:</strong> ' + numWords(inv.total||inv.totalAmount||0) + '</div>'
    + bankSection
    + '<div class="footer">'
    + '<div class="terms"><strong>Terms &amp; Conditions:</strong><br>1. Goods once sold will not be taken back.<br>2. Payment due within 30 days.<br>3. Subject to local jurisdiction only.</div>'
    + '<div class="sig">'
    + (bizSign ? '<img src="' + bizSign + '" style="height:45px;object-fit:contain;display:block;margin:0 auto 4px"/>' : '<div style="height:50px"></div>')
    + '<div class="sig-line">For ' + (profile && profile.businessName ? profile.businessName : '') + '<br><span style="font-weight:400;color:#666">Authorized Signatory</span></div></div>'
    + '</div></div></body></html>';
}

function Toasts({list}) {
  return (
    <div className="toast-wrap">
      {list.map(t => (
        <div key={t.id} className={'toast ' + t.type}>
          <span>{t.type==='ok' ? '✓' : '✕'}</span>{t.msg}
        </div>
      ))}
    </div>
  );
}

function Dashboard({nav}) {
  const {profile} = useApp();
  const invs  = invoiceDB.getAll();

  // ── Monthly revenue for last 6 months ──────────────────────────────
  const monthlyData = React.useMemo(() => {
    const map = {};
    const now = new Date();
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = d.toLocaleString('en-IN', { month:'short', year:'2-digit' });
      map[key] = { name: key, revenue: 0, gst: 0 };
    }
    invs.forEach(inv => {
      const d = new Date(inv.date || inv.invoiceDate);
      const key = d.toLocaleString('en-IN', { month:'short', year:'2-digit' });
      if (map[key]) {
        map[key].revenue += (inv.total || 0);
        map[key].gst     += ((inv.cgst||0)+(inv.sgst||0)+(inv.igst||0));
      }
    });
    return Object.values(map);
  }, [invs]);

  const thisMonth = (() => {
    const now = new Date();
    return invs.filter(i => {
      const d = new Date(i.date||i.invoiceDate);
      return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    }).reduce((s,i) => s+(i.total||0), 0);
  })();

  const pendingAmt = React.useMemo(() => {
    const allCNs = creditNoteDB.getAll();
    return invs.filter(i=>(i.paymentStatus||'Unpaid')!=='Paid').reduce((s,i)=>{
      const knocked = allCNs.filter(c=>c.againstInvoice===i.invoiceNumber).reduce((a,c)=>a+(c.total||0),0);
      return s + Math.max(0,(i.total||0)-(i.amountPaid||0)-knocked);
    },0);
  }, [invs]);

  // Recent 5 invoices
  const recent = [...invs].reverse().slice(0, 5);

  const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } =
    window.Recharts || {};

  return (
    <div className="page">
      {/* Greeting header */}
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:'Playfair Display,serif',fontSize:22,fontWeight:800,color:'#0d0f1a'}}>

        </div>
        <div style={{fontSize:13,color:'var(--ink2)',marginTop:3}}>
          {new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}

      </div>

      {/* Stat cards — This Month + Pending Bills */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12,marginBottom:20}}>
        {[
          {label:'This Month Sales',value:fmtINR(thisMonth),icon:'📈',color:'#e85d04',bg:'#fff8f0',page:null},
          {label:'Pending Bills',value:fmtINR(pendingAmt),icon:'⏳',color:'#dc2626',bg:'#fef2f2',page:'pending-bills'},

          </div>
        ))}
      </div>

      {/* Revenue Chart */}
      {BarChart && monthlyData.some(d=>d.revenue>0) && (

          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={monthlyData} margin={{top:0,right:10,left:-10,bottom:0}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f0ede8"/>

              />

              <Bar dataKey="gst"     fill="#fbbf24" radius={[4,4,0,0]} name="gst"/>
            </BarChart>
          </ResponsiveContainer>
          <div style={{display:'flex',gap:16,marginTop:8,fontSize:11,color:'#6b7280'}}>
            <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,borderRadius:2,background:'#e85d04',display:'inline-block'}}></span>Revenue</span>

        </div>

      {/* Quick Actions */}
      <div style={{background:'white',border:'1px solid #e2ddd6',borderRadius:12,padding:'16px',marginBottom:20}}>

              <div style={{fontSize:12,fontWeight:600,color:a.color}}>{a.label}</div>

        </div>
      </div>

      {/* Cloud sync banner */}
      {!true ? (
        <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:12,padding:'14px 16px',marginBottom:20,display:'flex',alignItems:'flex-start',gap:12}}>
          <span style={{fontSize:24}}>☁️</span>
          <div>
            <div style={{fontWeight:700,fontSize:13,color:'#92400e',marginBottom:3}}>Enable Free Cloud Sync</div>
            <div style={{fontSize:12,color:'#78350f',marginBottom:8,lineHeight:1.6}}>Sync across all devices for free — no credit card needed</div>
            <button onClick={()=>toast('Sync is automatic — just sign in on any device! ✅')}
              style={{padding:'6px 14px',borderRadius:6,border:'none',background:'#e85d04',color:'white',fontFamily:'DM Sans,sans-serif',fontWeight:700,fontSize:12,cursor:'pointer'}}>
              Setup Free Sync →

          <div style={{display:'flex',alignItems:'center',gap:10}}>

function Profile() {
  const {profile, setProfile, toast} = useApp();
  const [f, setF] = useState(profile || {businessName:'',ownerName:'',gstn:'',state:'Maharashtra',address:'',email:'',mobile:'',bankName:'',bankAccount:'',ifsc:'',invoicePrefix:'AR',financialYear:'2025-26',businessType:'Trader'});
  const [errs, setErrs] = useState({});
  const [saving, setSaving] = useState(false);

  // Logo & signature state — stored as base64 data URLs
  const [bizLogo, setBizLogo]   = useState(() => dbRead('al_biz_logo')   || null);
  const [bizSign, setBizSign]   = useState(() => dbRead('al_biz_sign')   || null);

  function set(k,v){ setF(p=>({...p,[k]:v})); setErrs(e=>({...e,[k]:''})); }

  function handleImageUpload(e, type) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 500*1024) { toast('❌ Image must be under 500KB','er'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      const dataUrl = ev.target.result;
      if (type === 'logo') { setBizLogo(dataUrl); dbWrite('al_biz_logo', dataUrl); }
      else                 { setBizSign(dataUrl); dbWrite('al_biz_sign', dataUrl); }
      toast('✅ Image saved!','ok');
    };
    reader.readAsDataURL(file);
  }

  function validate(){
    const e={};
    if(!f.businessName?.trim()) e.businessName='Business name required';
    if(f.gstn && !/^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$/.test(f.gstn.toUpperCase()))
      e.gstn='Invalid GSTIN format';
    setErrs(e);
    return !Object.keys(e).length;
  }

  async function save(){
    if(!validate()) return;
    setSaving(true);
    const saved = profileDB.save({...f, gstn: f.gstn?.toUpperCase()});
    setProfile(saved);
    setTimeout(()=>setSaving(false), 600);
    toast('✅ Profile saved!','ok');
  }

  const inp = {width:'100%',padding:'10px 13px',borderRadius:8,border:'1.5px solid var(--border)',
    fontFamily:'DM Sans,sans-serif',fontSize:14,background:'white',outline:'none',boxSizing:'border-box'};

    textTransform:'uppercase',letterSpacing:.6,marginBottom:5};
  const err = k => errs[k] && <div style={{fontSize:12,color:'var(--red)',marginTop:3}}>{errs[k]}</div>;

  const states = ['Andhra Pradesh','Arunachal Pradesh','Assam','Bihar','Chhattisgarh','Goa','Gujarat',
    'Haryana','Himachal Pradesh','Jharkhand','Karnataka','Kerala','Madhya Pradesh','Maharashtra',

    <div style={{maxWidth:760,margin:'0 auto'}}>

      {/* ── LOGO & SIGNATURE UPLOAD CARD ── */}

        padding:24,marginBottom:24,boxShadow:'0 2px 12px rgba(15,17,35,0.06)'}}>
        <div style={{fontFamily:'Playfair Display,serif',fontSize:17,fontWeight:800,
          color:'var(--text)',marginBottom:4}}>Brand Assets</div>
        <div style={{fontSize:13,color:'var(--muted)',marginBottom:20}}>
          Your logo and signature will appear on all invoices
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
          {/* Business Logo */}
          <div>
            <label style={lbl}>Business Logo</label>
            <div style={{border:'2px dashed var(--border)',borderRadius:10,padding:16,
              textAlign:'center',background:'var(--bg)',minHeight:100,
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,
              cursor:'pointer',transition:'border-color 0.2s',position:'relative'}}
              onClick={()=>document.getElementById('logo-upload').click()}
              onMouseEnter={e=>e.currentTarget.style.borderColor='var(--saffron)'}
              onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
              {bizLogo
                ? <img src={bizLogo} style={{maxHeight:70,maxWidth:'100%',objectFit:'contain',borderRadius:6}} alt="logo"/>
                : <><div style={{fontSize:32}}>🏢</div>
                   <div style={{fontSize:12,color:'var(--muted)',fontWeight:500}}>Click to upload logo<br/>
                   <span style={{fontSize:11,color:'#aaa'}}>PNG, JPG · max 500KB</span></div></>}
              <input id="logo-upload" type="file" accept="image/*" style={{display:'none'}}
                onChange={e=>handleImageUpload(e,'logo')}/>

function CustomerModal({initial, onSave, onClose, title='Add Customer'}) {
  const {toast} = useApp();
  const [f, setF] = useState(initial || {name:'',gstn:'',address:'',city:'',state:'Maharashtra',pincode:''});
  const [errs, setErrs] = useState({});
  function set(k,v) { setF(x=>({...x,[k]:v})); if(errs[k]) setErrs(e=>({...e,[k]:''})); }
  function save() {
    const e = {};
    if (!f.name.trim()) e.name='Name required';
    if (f.gstn && !GSTIN_RE.test(f.gstn)) e.gstn='Invalid GSTIN format';
    if (f.gstn && customerDB.dupGSTN(f.gstn, f.id)) e.gstn='GSTN already exists with another customer';
    setErrs(e);
    if (Object.keys(e).length) return;
    const saved = customerDB.save(f);
    toast('Customer saved!','ok');
    onSave(saved);
  }
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-hdr"><div className="modal-title">👤 {title}</div><button className="modal-x" onClick={onClose}>×</button></div>

const newItem = () => ({id:genId(),description:'',quantity:'1',rate:'',gstRate:'18',unit:'NOS'});

function CreateInvoice({nav}) {
  const {profile, toast} = useApp();
  const [custs, setCusts] = useState(customerDB.getActive());
  const [cust, setCust] = useState(null);
  const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
  const [refNo, setRefNo] = useState('');
  const [challanNo, setChallanNo] = useState('');
  const [creditPeriod, setCreditPeriod] = useState('');
  const nextInvNum = counterDB.peek(prefix, fy);
  const [items, setItems] = useState([newItem()]);
  const [discount, setDiscount] = useState('');
  const [custModal, setCustModal] = useState(false);
  const [errs, setErrs] = useState({});
  const [saved, setSaved] = useState(null);
  const fy = profile && profile.financialYear ? profile.financialYear : '2025-26';
  const prefix = profile && profile.invoicePrefix ? profile.invoicePrefix : 'AR';
  // GST is automatic: calculated only if supplier has GSTIN in Business Profile
  const applyGST = !!(profile && profile.gstn);
  const intra = isIntraState(profile && profile.gstn, cust && cust.gstn, cust && cust.state);
  const isServiceProvider = (profile && profile.businessType) === 'Service Provider';
  const calcItems = applyGST ? items : items.map(i => ({...i, gstRate: 0}));
  // For service providers, qty=1 so rate = amount directly
  const calcItemsForTotal = isServiceProvider
    ? calcItems.map(i => ({...i, quantity: 1}))
    : calcItems;
  const totals = calcTotals(calcItemsForTotal, intra, discount);

  // Inventory autocomplete state
  const [invSearch, setInvSearch] = useState({}); // {itemId: searchText}
  const [invDropdown, setInvDropdown] = useState(null); // itemId with open dropdown
  const allInvItems = inventoryDB.getAll();

  function addItem() { setItems(prev=>[...prev,newItem()]); }
  function removeItem(id) { setItems(prev=>prev.filter(i=>i.id!==id)); setInvDropdown(null); }
  function updateItem(id,k,v) { setItems(prev=>prev.map(i=>i.id===id?{...i,[k]:v}:i)); }

  function pickInventoryItem(itemId, invItem) {
    setItems(prev=>prev.map(i=>i.id===itemId ? {
      ...i,
      description: invItem.name,
      rate: String(invItem.saleRate||''),
      unit: invItem.unit||'NOS',
      gstRate: String(invItem.gstPercent||invItem.gstRate||'18'),
      quantity: '1',
    } : i));
    setInvDropdown(null);
    setInvSearch(s=>({...s,[itemId]:''}));
  }

  function getInvSuggestions(searchText) {
    if (!searchText || searchText.length < 1) return allInvItems.slice(0,8);
    const t = searchText.toLowerCase();
    return allInvItems.filter(i=>
      (i.name||'').toLowerCase().includes(t) ||
      (i.code||'').toLowerCase().includes(t) ||
      (i.hsnCode||'').includes(t)
    ).slice(0,8);
  }

  function validate() {
    const e = {};
    if (!cust) e.cust='Select a customer';
    if (!items.length) e.items='Add at least one item';
    items.forEach((item,idx) => {
      if (!item.description.trim()) e['d'+idx]='Description required';
      if (isServiceProvider) {
        if (!(parseFloat(item.rate)>0)) e['r'+idx]='Enter valid amount';
      } else {
        if (!(parseFloat(item.rate)>0)) e['r'+idx]='Enter valid rate';
        if (!(parseFloat(item.quantity)>0)) e['q'+idx]='Enter valid qty';
      }
    });
    setErrs(e);
    return !Object.keys(e).length;
  }

  function save() {
    if (!validate()) { toast('Fix errors before saving','er'); return; }
    if (!profile) { toast('Set up Business Profile first','er'); return; }
    const invNum = counterDB.next(prefix, fy);
    const inv = {
      invoiceNumber: invNum,
      invoiceDate: date,
      refNo: refNo.trim(),
      challanNo: challanNo.trim(),
      creditPeriod: creditPeriod.trim(),
      customer: cust,
      items: calcItemsForTotal.map(i=>({...i,quantity:parseFloat(i.quantity)||1,rate:parseFloat(i.rate),gstRate:parseFloat(i.gstRate)})),
      taxable: totals.taxable,
      taxableValue: totals.taxable,
      cgst: totals.cgst,
      sgst: totals.sgst,
      igst: totals.igst,
      discount: totals.discount,
      roundOff: totals.roundOff,
      total: totals.total,
      totalAmount: totals.total,
      financialYear: fy,
      isIntra: intra,
      applyGST,
      paymentStatus: 'Unpaid',
      amountPaid: 0,
    };
    const s = invoiceDB.save(inv);
    setSaved(s);
    toast('Invoice '+s.invoiceNumber+' created!','ok');
  }

  if (saved) return <InvoicePreview invoice={saved} onBack={()=>nav('history')}/>;

  return (
    <div>
      <div className="sec-hdr">
        <div><div className="sec-title">Create Invoice</div><div className="sec-sub">FY: {fy}</div></div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-outline" onClick={()=>nav('dashboard')}>← Back</button>
          <button className="btn btn-primary" onClick={save}>💾 Save Invoice</button>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:20,alignItems:'start'}}>
        <div>
          <div className="card mb16" style={{marginBottom:16}}>
            <div className="card-title">📄 Invoice Details</div>
            <div className="fr2">
              <div className="fg"><label className="fl">Invoice Date</label><input type="date" className="fc" value={date} onChange={e=>setDate(e.target.value)}/></div>
              <div className="fg"><label className="fl">Invoice Number <span style={{fontSize:10,color:'#888'}}>(auto)</span></label><input className="fc mono" value={nextInvNum} readOnly style={{background:'#f8f6f2',color:'#0d0f1a',fontWeight:700,letterSpacing:'.5px'}}/></div>
              <div className="fg"><label className="fl">PO / Reference No <span style={{fontSize:10,color:'#888'}}>(optional)</span></label><input className="fc" value={refNo} onChange={e=>setRefNo(e.target.value)} placeholder="e.g. PO-2025-001"/></div>
              <div className="fg"><label className="fl">Challan No <span style={{fontSize:10,color:'#888'}}>(optional)</span></label><input className="fc" value={challanNo} onChange={e=>setChallanNo(e.target.value)} placeholder="e.g. CH-001"/></div>
              <div className="fg"><label className="fl">Credit Period</label>
                <select className="fc" value={creditPeriod} onChange={e=>setCreditPeriod(e.target.value)}>
                  <option value="">— Select / None —</option>
                  <option value="Immediate">Immediate</option>
                  <option value="7 days">7 Days</option>
                  <option value="15 days">15 Days</option>
                  <option value="30 days">30 Days</option>
                  <option value="45 days">45 Days</option>
                  <option value="60 days">60 Days</option>
                  <option value="90 days">90 Days</option>
                  <option value="120 days">120 Days</option>
                </select>
              </div>
            </div>
            <div className="fg">
              <label className="fl">Customer <span className="req">*</span></label>
              <div style={{display:'flex',gap:8}}>
                <select className={'fc'+(errs.cust?' err':'')} value={cust&&cust.id||''} onChange={e=>{ const c=custs.find(x=>x.id===e.target.value); setCust(c||null); setErrs(er=>({...er,cust:''})); }}>
                  <option value="">— Select Customer —</option>
                  {custs.map(c=><option key={c.id} value={c.id}>{c.name}{c.gstn?' ('+c.gstn+')':''}</option>)}
                </select>
                <button className="btn btn-secondary" style={{whiteSpace:'nowrap'}} onClick={()=>setCustModal(true)}>+ New</button>
              </div>
              {errs.cust&&<div className="fe">{errs.cust}</div>}
              {cust && (
                <div style={{marginTop:8,padding:'8px 12px',background:'var(--dim)',borderRadius:'var(--r2)',fontSize:12}}>
                  📍 {cust.address&&cust.address+', '}{cust.city} · {cust.state}
                  {cust.gstn&&<> · <span className="gst-badge">{cust.gstn}</span></>}
                  <span style={{marginLeft:8}} className={'badge '+(intra?'b-green':'b-blue')}>{intra?'CGST+SGST':'IGST'}</span>
                </div>
              )}
            </div>
          </div>

          <div className="card mb16" style={{marginBottom:16}}>
            <div className="flex-b mb16">
              <div className="card-title" style={{marginBottom:0}}>📦 Items</div>
              <button className="btn btn-outline btn-sm" onClick={addItem}>+ Add Item</button>
            </div>
            {errs.items&&<div className="fe" style={{marginBottom:12}}>{errs.items}</div>}
            <div className="tw">
              <table className="it">
                <thead><tr>
                  <th style={{width:28}}>#</th>
                  <th>Description</th>
                  {!isServiceProvider && <th style={{width:58}}>Unit</th>}
                  {!isServiceProvider && <th style={{width:64}}>Qty</th>}
                  <th style={{width:84}}>{isServiceProvider?'Amount (₹)':'Rate (₹)'}</th>
                  <th style={{width:72}}>GST%</th>
                  <th style={{width:80,textAlign:'right'}}>Taxable</th>
                  <th style={{width:30}}></th>
                </tr></thead>
                <tbody>
                  {items.map((item,idx)=>{
                    const qty = isServiceProvider ? 1 : (parseFloat(item.quantity)||0);
                    const tv = qty * (parseFloat(item.rate)||0);
                    const suggestions = getInvSuggestions(invSearch[item.id]!==undefined ? invSearch[item.id] : item.description);
                    return (
                      <tr key={item.id}>
                        <td style={{textAlign:'center',color:'var(--ink2)',fontSize:11}}>{idx+1}</td>
                        <td style={{position:'relative'}}>
                          <input
                            value={item.description}
                            onChange={e=>{
                              updateItem(item.id,'description',e.target.value);
                              setInvSearch(s=>({...s,[item.id]:e.target.value}));
                              if (!isServiceProvider) setInvDropdown(item.id);
                            }}
                            onFocus={()=>{ if(!isServiceProvider) setInvDropdown(item.id); }}
                            onBlur={()=>setTimeout(()=>setInvDropdown(null),200)}
                            placeholder={isServiceProvider?"Service description e.g. Consultation fees":"Item description or search inventory"}
                            style={{borderColor:errs['d'+idx]?'var(--red)':'transparent', width:'100%'}}
                          />
                          {errs['d'+idx]&&<div style={{fontSize:9,color:'var(--red)'}}>{errs['d'+idx]}</div>}
                          {/* Inventory dropdown - only for traders */}
                          {!isServiceProvider && invDropdown===item.id && suggestions.length>0 && (
                            <div style={{position:'absolute',top:'100%',left:0,right:0,background:'white',
                              border:'1.5px solid var(--saffron)',borderRadius:8,boxShadow:'0 8px 24px rgba(0,0,0,0.12)',
                              zIndex:999,maxHeight:200,overflowY:'auto'}}>
                              {suggestions.map(inv=>(
                                <div key={inv.id}
                                  onMouseDown={()=>pickInventoryItem(item.id, inv)}
                                  style={{padding:'8px 12px',cursor:'pointer',display:'flex',
                                    justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid #f5f5f5',
                                    fontSize:13,fontFamily:'DM Sans,sans-serif'}}
                                  onMouseEnter={e=>e.currentTarget.style.background='#fff8f0'}
                                  onMouseLeave={e=>e.currentTarget.style.background='white'}>
                                  <div>
                                    <div style={{fontWeight:600,color:'#0d0f1a'}}>{inv.name}</div>
                                    <div style={{fontSize:11,color:'#888'}}>{inv.code?'Code: '+inv.code+' · ':''}{inv.hsnCode?'HSN: '+inv.hsnCode+' · ':''}{inv.unit}</div>
                                  </div>
                                  <div style={{textAlign:'right',flexShrink:0,marginLeft:8}}>
                                    <div style={{fontWeight:700,color:'var(--saffron)',fontSize:12}}>{fmtINR(inv.saleRate||0)}</div>
                                    <div style={{fontSize:10,color:(inv.currentStock||0)>0?'#166534':'#dc2626'}}>
                                      Stock: {inv.currentStock||0} {inv.unit}
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          )}
                        </td>
                        {!isServiceProvider && <td><select value={item.unit} onChange={e=>updateItem(item.id,'unit',e.target.value)}>{UNITS.map(u=><option key={u}>{u}</option>)}</select></td>}
                        {!isServiceProvider && <td><input type="number" value={item.quantity} onChange={e=>updateItem(item.id,'quantity',e.target.value)} min="0" step="0.01" style={{borderColor:errs['q'+idx]?'var(--red)':'transparent'}}/>{errs['q'+idx]&&<div style={{fontSize:9,color:'var(--red)'}}>{errs['q'+idx]}</div>}</td>}
                        <td><input type="number" value={item.rate} onChange={e=>updateItem(item.id,'rate',e.target.value)} min="0" step="0.01" style={{borderColor:errs['r'+idx]?'var(--red)':'transparent'}}/>{errs['r'+idx]&&<div style={{fontSize:9,color:'var(--red)'}}>{errs['r'+idx]}</div>}</td>
                        <td><select value={item.gstRate} onChange={e=>updateItem(item.id,'gstRate',e.target.value)}>{GST_RATES.map(r=><option key={r} value={r}>{r}%</option>)}</select></td>
                        <td style={{textAlign:'right',fontFamily:'DM Mono,monospace',fontSize:12,paddingRight:8}}>{fmtINR(tv)}</td>
                        <td>{items.length>1&&<button onClick={()=>removeItem(item.id)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:16,padding:'4px 6px',fontFamily:'inherit'}}>×</button>}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <button className="btn btn-outline btn-sm" style={{marginTop:10}} onClick={addItem}>+ Add Another Item</button>
          </div>

          <div className="card">
            <div className="card-title">🏷️ Adjustments</div>
            <div style={{maxWidth:220}}>
              <div className="fg"><label className="fl">Discount (₹)</label><input type="number" className="fc" value={discount} onChange={e=>setDiscount(e.target.value)} placeholder="0.00" min="0" step="0.01"/><div style={{fontSize:11,color:'var(--ink2)',marginTop:4}}>Applied after GST</div></div>
            </div>
          </div>
        </div>

        {/* Summary */}
        <div style={{position:'sticky',top:0}}>
          <div className="inv-sum">
            <div style={{fontFamily:'Playfair Display,serif',fontSize:15,fontWeight:700,marginBottom:14,opacity:.9}}>Invoice Summary</div>
            <div className="sum-row"><span className="lbl">Taxable Value</span><span className="amt">{fmtINR(totals.taxable)}</span></div>
            {applyGST && (intra ? (<>
              <div className="sum-row"><span className="lbl">CGST</span><span className="amt">{fmtINR(totals.cgst)}</span></div>
              <div className="sum-row"><span className="lbl">SGST</span><span className="amt">{fmtINR(totals.sgst)}</span></div>
            </>) : (
              <div className="sum-row"><span className="lbl">IGST</span><span className="amt">{fmtINR(totals.igst)}</span></div>
            ))}
            {totals.discount>0&&<div className="sum-row"><span className="lbl">Discount</span><span className="amt" style={{color:'#6ee7b7'}}>− {fmtINR(totals.discount)}</span></div>}
            {totals.roundOff!==0&&<div className="sum-row"><span className="lbl">Round Off</span><span className="amt" style={{fontSize:12}}>{totals.roundOff>0?'+':''}{totals.roundOff.toFixed(2)}</span></div>}
            <div className="sum-row tot"><span>Total Amount</span><span className="amt">{fmtINR(totals.total)}</span></div>
            <div style={{marginTop:14,padding:'10px 0',borderTop:'1px solid rgba(255,255,255,.15)',fontSize:11,opacity:.55,fontStyle:'italic',lineHeight:1.5}}>{numWords(totals.total)}</div>
            {cust&&<div style={{marginTop:12,padding:'8px 10px',background:'rgba(255,255,255,.08)',borderRadius:6,fontSize:11}}><div style={{opacity:.6,marginBottom:3}}>Tax Type</div><div style={{fontWeight:600}}>{!applyGST ? '⛔ No GST' : intra?'🏠 Intra-State (CGST+SGST)':'✈️ Inter-State (IGST)'}</div></div>}
          </div>
          <button className="btn btn-primary" style={{width:'100%',marginTop:12,justifyContent:'center',padding:'12px'}} onClick={save}>💾 Save & Preview Invoice</button>
          <button className="btn btn-outline" style={{width:'100%',marginTop:8,justifyContent:'center'}} onClick={()=>nav('dashboard')}>Cancel</button>
        </div>
      </div>

      {custModal && (
        <CustomerModal onSave={c=>{setCusts(customerDB.getActive());setCust(c);setCustModal(false);toast('Customer added and selected','ok');}} onClose={()=>setCustModal(false)}/>
      )}
    </div>
  );
}

  function doPrint() {
    const html = buildInvoiceHTML(invoice, profile);
    printInvoiceHTML(html);
  }

    const html = buildInvoiceHTML(invoice, profile);

    <div>

        <div>
          <div className="sec-title">Invoice Preview</div>

            const itms = (inv.items||[]).map((it,i)=>`  ${i+1}. ${it.description} × ${it.quantity} @ ₹${it.rate} = ₹${((it.quantity||0)*(it.rate||0)).toLocaleString('en-IN')}`).join('\n');
            const msg = encodeURIComponent(
              `🧾 *TAX INVOICE*\n`+

              `━━━━━━━━━━━━━━━━\n`+
              `*Taxable:* ₹${(inv.taxable||inv.taxableValue||0).toLocaleString('en-IN',{minimumFractionDigits:2})}\n`+
              ((inv.cgst||0)>0?`*CGST:* ₹${(inv.cgst||0).toLocaleString('en-IN',{minimumFractionDigits:2})}\n*SGST:* ₹${(inv.sgst||0).toLocaleString('en-IN',{minimumFractionDigits:2})}\n`:'')+
              ((inv.igst||0)>0?`*IGST:* ₹${(inv.igst||0).toLocaleString('en-IN',{minimumFractionDigits:2})}\n`:'')+
              `*💰 Total: ₹${(inv.total||inv.totalAmount||0).toLocaleString('en-IN',{minimumFractionDigits:2})}*\n`+
              `━━━━━━━━━━━━━━━━\n`+
              `_Thank you for your business! 🙏_`
            );
            window.open('https://api.whatsapp.com/send?text='+msg,'_blank');

            <div style={{fontSize:12,lineHeight:2}}>
              <div><strong>Tax Type:</strong> <span className={'badge '+(isIGST?'b-blue':'b-green')}>{isIGST?'IGST (Inter-State)':'CGST + SGST (Intra-State)'}</span></div>
              <div><strong>Place of Supply:</strong> {invoice.customer&&invoice.customer.state}</div>
            </div>
          </div>
        </div>

        <div className="tw">
          <table className="dt">
            <thead><tr>
              <th style={{paddingLeft:28,width:40}}>#</th>
              <th>Description</th>
              <th className="tc">Unit</th>
              <th className="tr">Qty</th>

        <div style={{padding:'12px 28px',background:'var(--dim)',borderTop:'1px solid var(--border)',fontSize:12,fontStyle:'italic',color:'var(--ink2)'}}>
          <strong style={{color:'var(--ink)'}}>Amount in Words:</strong> {numWords(invoice.total||invoice.totalAmount||0)}
        </div>

        {profile&&profile.bankName&&(
          <div style={{padding:'16px 28px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between'}}>
            <div>
              <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:1,color:'var(--ink2)',marginBottom:6}}>Bank Details</div>
              <div style={{fontSize:12,lineHeight:1.9}}>
                <div><strong>Bank:</strong> {profile.bankName}</div>
                {profile.bankAccount&&<div><strong>A/c No:</strong> <span className="mono">{profile.bankAccount}</span></div>}
                {profile.ifsc&&<div><strong>IFSC:</strong> <span className="mono">{profile.ifsc}</span></div>}
              </div>
            </div>
            <div style={{textAlign:'center',minWidth:140}}>
              <div style={{height:50}}></div>
              <div style={{borderTop:'1px solid var(--ink)',paddingTop:6,fontSize:11,fontWeight:700}}>
                For {profile.businessName}<br/><span style={{fontWeight:400,color:'var(--ink2)'}}>Authorized Signatory</span>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// EDIT INVOICE (Tally-style)
// ═══════════════════════════════════════
function EditInvoice({invoice, onSave, onCancel}) {
  const {profile, toast} = useApp();
  const [custs]   = useState(customerDB.getActive());
  const [cust,    setCust]     = useState(invoice.customer || null);
  const [date,    setDate]     = useState(invoice.invoiceDate || new Date().toISOString().split('T')[0]);
  const [refNo,   setRefNo]    = useState(invoice.refNo || '');
  const [creditPeriod, setCreditPeriod] = useState(invoice.creditPeriod || '');
  const [items,   setItems]    = useState(
    (invoice.items||[]).map(i=>({...i, id: i.id||genId(),
      quantity: String(i.quantity), rate: String(i.rate), gstRate: String(i.gstRate)
    }))
  );
  const [discount, setDiscount] = useState(String(invoice.discount||''));
  const [errs,    setErrs]     = useState({});
  const [preview, setPreview]  = useState(false);
  const [saved,   setSaved]    = useState(null);

  const intra   = isIntraState(profile&&profile.gstn, cust&&cust.gstn, cust&&cust.state);
  const totals  = calcTotals(items, intra, discount);

  function addItem()         { setItems(p=>[...p,newItem()]); }
  function removeItem(id)    { setItems(p=>p.filter(i=>i.id!==id)); }
  function upd(id,k,v)       { setItems(p=>p.map(i=>i.id===id?{...i,[k]:v}:i)); }

  function validate() {
    const e = {};
    if (!cust)  e.cust='Select a customer';
    items.forEach((it,idx)=>{
      if (!it.description.trim())       e['d'+idx]='Description required';
      if (!(parseFloat(it.rate)>0))     e['r'+idx]='Valid rate required';
      if (!(parseFloat(it.quantity)>0)) e['q'+idx]='Valid qty required';
    });
    setErrs(e); return !Object.keys(e).length;
  }

  function saveEdit() {
    if (!validate()) { toast('Fix errors before saving','er'); return; }
    const updated = {
      ...invoice,
      invoiceDate: date,
      refNo: refNo.trim(),
      creditPeriod: creditPeriod.trim(),
      customer: cust,
      items: items.map(i=>({...i, quantity:parseFloat(i.quantity), rate:parseFloat(i.rate), gstRate:parseFloat(i.gstRate)})),
      taxable: totals.taxable, taxableValue: totals.taxable,
      cgst: totals.cgst, sgst: totals.sgst, igst: totals.igst,
      discount: totals.discount, roundOff: totals.roundOff,
      total: totals.total, totalAmount: totals.total,
      isIntra: intra,
    };
    const s = invoiceDB.update(updated);
    toast('Invoice '+s.invoiceNumber+' updated!','ok');
    setSaved(s);
    onSave(s);
  }

  if (saved) return <InvoicePreview invoice={saved} onBack={onCancel}/>;

  return (
    <div>
      {/* Header */}
      <div className="sec-hdr">
        <div>
          <div className="sec-title">✏️ Edit Invoice</div>
          <div className="sec-sub">
            <span className="tag" style={{marginRight:6}}>{invoice.invoiceNumber}</span>
            Changes will replace the original invoice
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-outline" onClick={onCancel}>✕ Cancel</button>
          <button className="btn btn-secondary" onClick={()=>setPreview(true)}>👁 Preview</button>
          <button className="btn btn-primary" onClick={saveEdit}>💾 Save Changes</button>
        </div>
      </div>

      {/* Edit warning banner */}
      <div style={{background:'#fff8ed',border:'1px solid #fed7aa',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:12,color:'#92400e',display:'flex',gap:8,alignItems:'center'}}>
        <span style={{fontSize:16}}>⚠️</span>
        <div>You are editing a saved invoice. Invoice number <strong>{invoice.invoiceNumber}</strong> will remain the same. All changes are saved to your records.</div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:20,alignItems:'start'}}>
        <div>
          {/* Invoice Header */}
          <div className="card mb16" style={{marginBottom:16}}>
            <div className="card-title">📄 Invoice Details</div>
            <div className="fr2">
              <div className="fg">
                <label className="fl">Invoice Number</label>
                <input className="fc mono" value={invoice.invoiceNumber} readOnly style={{background:'var(--dim)',color:'var(--ink2)',fontWeight:700}}/>
              </div>
              <div className="fg">
                <label className="fl">Invoice Date</label>
                <input type="date" className="fc" value={date} onChange={e=>setDate(e.target.value)}/>
              </div>
              <div className="fg">
                <label className="fl">Reference / PO Number</label>
                <input className="fc" value={refNo} onChange={e=>setRefNo(e.target.value)} placeholder="e.g. PO-2025-001 (optional)"/>
              </div>
              <div className="fg"><label className="fl">Credit Period</label>
                <select className="fc" value={creditPeriod} onChange={e=>setCreditPeriod(e.target.value)}>
                  <option value="">— Select / None —</option>
                  <option value="Immediate">Immediate</option>
                  <option value="7 days">7 Days</option>
                  <option value="15 days">15 Days</option>
                  <option value="30 days">30 Days</option>
                  <option value="45 days">45 Days</option>
                  <option value="60 days">60 Days</option>
                  <option value="90 days">90 Days</option>
                  <option value="120 days">120 Days</option>
                </select>
              </div>
            </div>
            <div className="fg">
              <label className="fl">Customer <span className="req">*</span></label>
              <div style={{display:'flex',gap:8}}>
                <select className={'fc'+(errs.cust?' err':'')} value={cust&&cust.id||''}
                  onChange={e=>{ const c=custs.find(x=>x.id===e.target.value); setCust(c||null); setErrs(er=>({...er,cust:''})); }}>
                  <option value="">— Select Customer —</option>
                  {custs.map(c=><option key={c.id} value={c.id}>{c.name}{c.gstn?' ('+c.gstn+')':''}</option>)}
                </select>
              </div>
              {errs.cust && <div className="fe">{errs.cust}</div>}
              {cust && (
                <div style={{marginTop:8,padding:'8px 12px',background:'var(--dim)',borderRadius:'var(--r2)',fontSize:12}}>
                  📍 {cust.address&&cust.address+', '}{cust.city} · {cust.state}
                  {cust.gstn&&<> · <span className="gst-badge">{cust.gstn}</span></>}
                  <span style={{marginLeft:8}} className={'badge '+(intra?'b-green':'b-blue')}>{intra?'CGST+SGST':'IGST'}</span>
                </div>
              )}
            </div>
          </div>

          {/* Items */}
          <div className="card mb16" style={{marginBottom:16}}>
            <div className="flex-b mb16">
              <div className="card-title" style={{marginBottom:0}}>📦 Items</div>
              <button className="btn btn-outline btn-sm" onClick={addItem}>+ Add Item</button>
            </div>
            <div className="tw">
              <table className="it">
                <thead><tr>
                  <th style={{width:28}}>#</th>
                  <th>Description</th>
                  <th style={{width:58}}>Unit</th>
                  <th style={{width:64}}>Qty</th>
                  <th style={{width:84}}>Rate (₹)</th>
                  <th style={{width:72}}>GST%</th>

                  <th style={{width:30}}></th>

                <tbody>
                  {items.map((item,idx)=>{

                      <tr key={item.id}>
                        <td style={{textAlign:'center',color:'var(--ink2)',fontSize:12}}>{idx+1}</td>
                        <td><input value={item.description} onChange={e=>upd(item.id,'description',e.target.value)} placeholder="Item description" className={'it-inp'+(errs['d'+idx]?' err':'')}/></td>
                        <td><select value={item.unit||'NOS'} onChange={e=>upd(item.id,'unit',e.target.value)} className="it-inp">{UNITS.map(u=><option key={u}>{u}</option>)}</select></td>
                        <td><input type="number" value={item.quantity} onChange={e=>upd(item.id,'quantity',e.target.value)} placeholder="1" min="0" step="0.01" className={'it-inp'+(errs['q'+idx]?' err':'')}/></td>

              <div style={{display:'flex',justifyContent:'space-between',padding:'5px 0',fontSize:13}}><span style={{opacity:.7}}>SGST</span><span style={{fontFamily:'DM Mono,monospace'}}>{fmtINR(totals.sgst)}</span></div>

              <span>Total</span><span style={{fontFamily:'DM Mono,monospace'}}>{fmtINR(totals.total)}</span>

      {/* Preview Modal */}

function History({nav}) {
  const {profile, toast} = useApp();
  const [invs, setInvs]       = useState([...invoiceDB.getAll()].reverse());
  const [viewing, setViewing] = useState(null);   // invoice to preview
  const [editing, setEditing] = useState(null);   // invoice to edit
  const [q, setQ]             = useState('');
  const [fy, setFY]           = useState(profile&&profile.financialYear||'2025-26');
  const [delConfirm, setDelConfirm] = useState(null); // invoice pending delete

  function refresh() { setInvs([...invoiceDB.getAll()].reverse()); }

  function handleSaveEdit(updated) {
    refresh();
    setEditing(null);
    setViewing(updated);
  }

  function handleDelete(inv) {
    invoiceDB.del(inv.id);
    refresh();
    setDelConfirm(null);
    toast('Invoice '+inv.invoiceNumber+' deleted','ok');
  }

  // Show edit screen
  if (editing) return <EditInvoice invoice={editing} onSave={handleSaveEdit} onCancel={()=>setEditing(null)}/>;
  // Show preview screen
  if (viewing) return <InvoicePreview invoice={viewing} onBack={()=>setViewing(null)}
    onEdit={()=>{ setEditing(viewing); setViewing(null); }}/>;

  const filtered = invs
    .filter(i=>i.financialYear===fy)
    .filter(i=>!q
      || i.invoiceNumber.toLowerCase().includes(q.toLowerCase())
      || (i.customer&&i.customer.name||'').toLowerCase().includes(q.toLowerCase())
    );

  return (
    <div>

        ) : (
          <div className="tw">
            <table className="dt">
              <thead>
                <tr>
                  <th>Invoice No</th>

      </div>

      {/* Delete Confirmation Modal */}
      {delConfirm && (
        <div style={{position:'fixed',inset:0,background:'rgba(13,15,26,.6)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{background:'white',borderRadius:12,padding:28,maxWidth:400,width:'100%',boxShadow:'0 12px 40px rgba(0,0,0,.2)'}}>
            <div style={{fontSize:32,textAlign:'center',marginBottom:12}}>🗑️</div>
            <div style={{fontFamily:'Playfair Display,serif',fontSize:18,fontWeight:700,textAlign:'center',marginBottom:8}}>Delete Invoice?</div>
            <div style={{textAlign:'center',color:'#666',fontSize:13,marginBottom:20,lineHeight:1.6}}>
              This will permanently delete<br/>
              <strong>{delConfirm.invoiceNumber}</strong> — {delConfirm.customer&&delConfirm.customer.name}<br/>

// SALES REPORT

function Reports() {
  const {profile} = useApp();
  const fy = (profile && profile.financialYear) || '2025-26';
  const invs = React.useMemo(() => {
    if (!fy) return invoiceDB.getAll();
    const [s,e] = fyRange(fy);
    return invoiceDB.getAll().filter(i => { const d=new Date(i.date||i.invoiceDate); return d>=s && d<=e; });
  }, [fy]);
  const exps = expenseDB.getByFY(fy);

  const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer,
          CartesianGrid, PieChart, Pie, Cell, Legend } = window.Recharts || {};
  const PIE_COLORS = ['#e85d04','#fbbf24','#10b981','#3b82f6','#8b5cf6','#ef4444','#ec4899'];

  // Monthly revenue & expense
  const months = React.useMemo(()=>{
    const map = {};
    const [s,e] = fyRange(fy);
    let cur = new Date(s);
    while(cur<=e) {
      const key = cur.toLocaleString('en-IN',{month:'short',year:'2-digit'});
      map[key] = { name:key, revenue:0, expense:0, profit:0 };
      cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
    }
    invs.forEach(inv=>{
      const k = new Date(inv.date||inv.invoiceDate).toLocaleString('en-IN',{month:'short',year:'2-digit'});
      if(map[k]) map[k].revenue += (inv.subtotal||inv.total||0);
    });
    exps.forEach(exp=>{
      const k = new Date(exp.date).toLocaleString('en-IN',{month:'short',year:'2-digit'});
      if(map[k]) map[k].expense += (exp.total||exp.amount||0);
    });
    Object.values(map).forEach(m=>{ m.profit = m.revenue - m.expense; });
    return Object.values(map);
  }, [invs, exps, fy]);

  const totalRev  = invs.reduce((s,i)=>s+(i.subtotal||i.total||0),0);
  const totalExp  = exps.reduce((s,e)=>s+(e.total||e.amount||0),0);
  const totalGST  = invs.reduce((s,i)=>s+(i.cgst||0)+(i.sgst||0)+(i.igst||0),0);
  const netProfit = totalRev - totalExp;

  // GST breakdown for pie
  const gstData = [
    {name:'CGST', value: invs.reduce((s,i)=>s+(i.cgst||0),0)},
    {name:'SGST', value: invs.reduce((s,i)=>s+(i.sgst||0),0)},
    {name:'IGST', value: invs.reduce((s,i)=>s+(i.igst||0),0)},
  ].filter(d=>d.value>0);

  return (
    <div className="page">
      <div style={{fontFamily:'Playfair Display,serif',fontSize:20,fontWeight:800,marginBottom:6}}>📊 Sales Report</div>
      <div style={{fontSize:12,color:'var(--ink2)',marginBottom:20}}>FY {fy} · {invs.length} invoices · {exps.length} expenses</div>

      {/* Summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12,marginBottom:20}}>
        {[
          {label:'Total Sales',  value:fmtINR(totalRev),  color:'#e85d04', bg:'#fff8f0', icon:'💰'},
          {label:'Total GST',    value:fmtINR(totalGST),  color:'#065f46', bg:'#f0fdf4', icon:'🧾'},
          {label:'Expenses',     value:fmtINR(totalExp),  color:'#dc2626', bg:'#fef2f2', icon:'💸'},
          {label:'Net Profit',   value:fmtINR(netProfit), color: netProfit>=0?'#065f46':'#dc2626',
           bg: netProfit>=0?'#f0fdf4':'#fef2f2', icon: netProfit>=0?'📈':'📉'},
        ].map(c=>(

      {/* Invoice table */}
      {invs.length > 0 && (
        <div style={{background:'white',border:'1px solid #e2ddd6',borderRadius:12,overflow:'hidden',marginBottom:20}}>
          <div style={{padding:'14px 16px',borderBottom:'1px solid #f0ede8',fontWeight:700,fontSize:13,color:'#0d0f1a'}}>
            All Invoices — FY {fy}

          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>

                    <th key={h} style={{padding:'8px 10px',textAlign:'left',fontSize:10,fontWeight:700,color:'#6b7280',textTransform:'uppercase',letterSpacing:.5,whiteSpace:'nowrap'}}>{h}</th>

                {[...invs].reverse().map(inv=>(

                    <td style={{padding:'8px 10px',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{(inv.customerName || (typeof inv.customer==='string' ? inv.customer : (inv.customer&&(inv.customer&&inv.customer.name))) || '—')}</td>
                    <td style={{padding:'8px 10px',whiteSpace:'nowrap',color:'#6b7280'}}>{inv.date||inv.invoiceDate}</td>
                    <td style={{padding:'8px 10px',fontFamily:'DM Mono,monospace'}}>{fmtINR(inv.subtotal||0)}</td>
                    <td style={{padding:'8px 10px',fontFamily:'DM Mono,monospace',color:'#7c3aed'}}>{fmtINR((inv.cgst||0)+(inv.sgst||0)+(inv.igst||0))}</td>
                    <td style={{padding:'8px 10px',fontFamily:'DM Mono,monospace',fontWeight:700}}>{fmtINR(inv.total||0)}</td>
                  </tr>
                ))}
                <tr style={{background:'#fff8f0',fontWeight:700}}>
                  <td colSpan={3} style={{padding:'8px 10px',fontSize:12,color:'#e85d04'}}>TOTAL</td>
                  <td style={{padding:'8px 10px',fontFamily:'DM Mono,monospace',color:'#e85d04'}}>{fmtINR(totalRev)}</td>
                  <td style={{padding:'8px 10px',fontFamily:'DM Mono,monospace',color:'#7c3aed'}}>{fmtINR(totalGST)}</td>
                  <td style={{padding:'8px 10px',fontFamily:'DM Mono,monospace',color:'#0d0f1a'}}>{fmtINR(totalRev+totalGST)}</td>

      {invs.length === 0 && (
        <div style={{textAlign:'center',padding:'48px 20px',color:'#9ca3af'}}>

  );
}


function GSTSummary() {
  const {profile} = useApp();
  const [fy, setFY] = useState(profile&&profile.financialYear||'2025-26');
  const invs = invoiceDB.getAll().filter(i=>i.financialYear===fy);
  const totalCGST = invs.reduce((s,i)=>s+(i.cgst||0),0);
  const totalSGST = invs.reduce((s,i)=>s+(i.sgst||0),0);
  const totalIGST = invs.reduce((s,i)=>s+(i.igst||0),0);
  const b2b = invs.filter(i=>i.customer&&i.customer.gstn).length;
  const b2c = invs.filter(i=>!i.customer||!i.customer.gstn).length;
  const months = ['April','May','June','July','August','September','October','November','December','January','February','March'];
  const data = {};
  months.forEach(m=>{data[m]={taxable:0,cgst:0,sgst:0,igst:0,b2b:0,b2c:0};});
  invs.forEach(inv=>{
    const m = new Date(inv.invoiceDate).toLocaleString('default',{month:'long'});
    if (data[m]) { data[m].taxable+=inv.taxable||inv.taxableValue||0; data[m].cgst+=inv.cgst||0; data[m].sgst+=inv.sgst||0; data[m].igst+=inv.igst||0; if(inv.customer&&inv.customer.gstn)data[m].b2b++;else data[m].b2c++; }

  return (

      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:20}}>
        {[{label:'Total CGST',val:totalCGST,color:'var(--green)',icon:'🏠'},{label:'Total SGST',val:totalSGST,color:'var(--blue)',icon:'📍'},{label:'Total IGST',val:totalIGST,color:'var(--saffron)',icon:'✈️'}].map(s=>(
          <div key={s.label} className="card" style={{borderLeft:'4px solid '+s.color}}>
            <div className="flex-b"><div><div className="stat-label">{s.label}</div><div className="stat-val" style={{fontSize:20,color:s.color}}>{fmtINR(s.val)}</div></div><div style={{fontSize:26,opacity:.25}}>{s.icon}</div></div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
        <div className="card">
          <div className="card-title">📋 Invoice Classification</div>
          <div style={{display:'flex',gap:16}}>
            <div style={{flex:1,textAlign:'center',padding:'16px',background:'var(--dim)',borderRadius:'var(--r2)'}}>
              <div style={{fontSize:32,fontFamily:'Playfair Display,serif',fontWeight:700,color:'var(--blue)'}}>{b2b}</div>
              <div style={{fontSize:12,color:'var(--ink2)',marginTop:4}}>B2B Invoices</div>
            </div>
            <div style={{flex:1,textAlign:'center',padding:'16px',background:'var(--dim)',borderRadius:'var(--r2)'}}>
              <div style={{fontSize:32,fontFamily:'Playfair Display,serif',fontWeight:700,color:'var(--saffron)'}}>{b2c}</div>
              <div style={{fontSize:12,color:'var(--ink2)',marginTop:4}}>B2C Invoices</div>
            </div>
          </div>
        </div>
        <div className="card">
          <div className="card-title">💰 Total Tax Liability</div>
          <div style={{textAlign:'center',paddingTop:8}}>
            <div style={{fontSize:32,fontFamily:'Playfair Display,serif',fontWeight:800,color:'var(--saffron)'}}>{fmtINR(totalCGST+totalSGST+totalIGST)}</div>
            <div style={{fontSize:12,color:'var(--ink2)',marginTop:4}}>CGST + SGST + IGST</div>
          </div>
        </div>
      </div>
      <div className="card">
        <div className="card-title">📅 Monthly GST Breakdown</div>
        <div className="tw">
          <table className="dt">
            <thead><tr><th>Month</th><th className="tr">Taxable</th><th className="tr">CGST</th><th className="tr">SGST</th><th className="tr">IGST</th><th className="tr">Total GST</th><th className="tc">B2B</th><th className="tc">B2C</th></tr></thead>
            <tbody>
              {months.map(m=>{
                const d=data[m]; const tot=d.cgst+d.sgst+d.igst;
                return <tr key={m} style={{opacity:d.taxable?1:.35}}><td style={{fontWeight:d.taxable?600:400}}>{m}</td><td className="tr mono">{d.taxable>0?fmtINR(d.taxable):'—'}</td><td className="tr mono">{d.cgst>0?fmtINR(d.cgst):'—'}</td><td className="tr mono">{d.sgst>0?fmtINR(d.sgst):'—'}</td><td className="tr mono">{d.igst>0?fmtINR(d.igst):'—'}</td><td className="tr mono" style={{fontWeight:tot?700:400,color:tot?'var(--saffron)':'inherit'}}>{tot>0?fmtINR(tot):'—'}</td><td className="tc">{d.b2b||'—'}</td><td className="tc">{d.b2c||'—'}</td></tr>;
              })}
            </tbody>
            <tfoot><tr style={{background:'var(--ink)',color:'white'}}>
              <td style={{fontWeight:700,padding:'10px 12px'}}>Total</td>

      </div>
