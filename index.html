<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>ARTHALEKHA — GST Accounting</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ARTHALEKHA"/>
<meta name="theme-color" content="#0d0f1a"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════════════
   ARTHALEKHA DESIGN SYSTEM v2.0 — Premium SaaS UI
   ═══════════════════════════════════════════════════════════ */

/* ── Tokens ─────────────────────────────────────────────── */
:root {
  /* Brand */
  --brand:        #C9393B;
  --brand-dark:   #a82d2f;
  --brand-light:  #fdf2f2;
  --brand-glow:   rgba(201,57,59,.18);

  /* Semantic */
  --success:      #16a34a;
  --success-bg:   #f0fdf4;
  --success-bd:   #bbf7d0;
  --warning:      #d97706;
  --warning-bg:   #fffbeb;
  --warning-bd:   #fde68a;
  --info:         #2563eb;
  --info-bg:      #eff6ff;
  --info-bd:      #bfdbfe;
  --danger:       #dc2626;
  --danger-bg:    #fef2f2;
  --danger-bd:    #fecaca;

  /* Ink scale */
  --ink-900:  #0d0f1a;
  --ink-700:  #1e2030;
  --ink-500:  #4b5163;
  --ink-400:  #6b7280;
  --ink-300:  #9ca3af;
  --ink-200:  #d1d5db;
  --ink-100:  #f3f4f6;

  /* Surfaces */
  --surface:      #ffffff;
  --surface-2:    #f8fafc;
  --surface-3:    #f1f5f9;

  /* Sidebar */
  --sb-bg:        #0d0f1a;
  --sb-border:    rgba(255,255,255,.07);
  --sb-text:      rgba(255,255,255,.55);
  --sb-text-hover:rgba(255,255,255,.90);
  --sb-active-bg: rgba(201,57,59,.20);
  --sb-active-txt:#f87171;

  /* Borders */
  --border:   #e5e7eb;
  --border-2: #d1d5db;

  /* Shadows */
  --sh-xs: 0 1px 2px rgba(0,0,0,.04);
  --sh-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
  --sh-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
  --sh-lg: 0 10px 32px rgba(0,0,0,.10), 0 4px 8px rgba(0,0,0,.06);
  --sh-xl: 0 24px 64px rgba(0,0,0,.14), 0 8px 16px rgba(0,0,0,.08);

  /* Radii */
  --r-xs: 4px;
  --r-sm: 6px;
  --r:    10px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-full: 9999px;

  /* Typography */
  --font-ui:    'DM Sans', system-ui, sans-serif;
  --font-brand: 'Playfair Display', Georgia, serif;
  --font-mono:  'DM Mono', 'Courier New', monospace;

  /* Legacy aliases (backward compat) */
  --ink:    var(--ink-900);
  --ink2:   var(--ink-500);
  --saffron: var(--brand);
  --saffron2:var(--brand-dark);
  --green:  var(--success);
  --red:    var(--danger);
  --blue:   var(--info);
  --paper:  var(--surface-2);
  --warm:   #f4f1eb;
  --dim:    var(--surface-3);
  --sh:     var(--sh-sm);
  --sh2:    var(--sh-md);
  --sh3:    var(--sh-lg);
  --r2:     var(--r-sm);
}

/* ── Reset ───────────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body, #root { height: 100%; }
body {
  font-family: var(--font-ui);
  background: var(--surface-2);
  color: var(--ink-900);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── Splash ──────────────────────────────────────────────── */
#al-splash {
  position: fixed; inset: 0;
  background: #0d0f1a !important;
  display: flex !important;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  transition: opacity .5s;
  visibility: visible !important;
}
#al-splash.hide { opacity: 0; pointer-events: none; }
.al-logo-txt {
  font-family: var(--font-brand);
  font-size: 36px; font-weight: 800;
  color: #fff; letter-spacing: 2px; margin-bottom: 6px;
}
.al-logo-sub {
  font-size: 12px; color: rgba(255,255,255,.4);
  letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px;
}
.al-spinner {
  width: 36px; height: 36px;
  border: 2.5px solid rgba(255,255,255,.12);
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: alspin .75s linear infinite;
}
.al-load-txt {
  font-size: 11px; color: rgba(255,255,255,.28);
  margin-top: 16px; letter-spacing: 1px;
}
@keyframes alspin { to { transform: rotate(360deg); } }

/* ══════════════════════════════════════════════════════════
   SHELL LAYOUT
   ══════════════════════════════════════════════════════════ */
.shell {
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: var(--surface-2);
}

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar {
  width: 248px;
  min-width: 248px;
  background: var(--sb-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  border-right: 1px solid rgba(255,255,255,.04);
}
/* Subtle ambient glow top-right */
.sidebar::before {
  content: '';
  position: absolute;
  top: -80px; right: -80px;
  width: 240px; height: 240px;
  background: radial-gradient(circle, rgba(201,57,59,.12) 0%, transparent 70%);
  pointer-events: none;
}

/* Brand area */
.sb-brand {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--sb-border);
  flex-shrink: 0;
}
.sb-logo {
  font-family: var(--font-brand);
  font-size: 21px; font-weight: 800;
  color: #fff; letter-spacing: .5px;
}
.sb-logo span { color: var(--brand); }
.sb-tag {
  font-size: 9.5px; font-weight: 500;
  color: rgba(255,255,255,.28);
  letter-spacing: 2px; text-transform: uppercase;
  margin-top: 2px;
}

/* Nav sections */
.sb-section {
  flex: 1;
  overflow-y: auto;
  padding: 10px 10px 4px;
  scrollbar-width: none;
}
.sb-section::-webkit-scrollbar { display: none; }

.sb-section-label {
  font-size: 9px; font-weight: 700;
  color: rgba(255,255,255,.22);
  letter-spacing: 2px; text-transform: uppercase;
  padding: 12px 8px 4px;
}

/* Nav item */
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--r-sm);
  cursor: pointer;
  color: var(--sb-text);
  font-size: 13px; font-weight: 500;
  font-family: var(--font-ui);
  transition: background .14s, color .14s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  position: relative;
}
.nav-item:hover {
  background: rgba(255,255,255,.06);
  color: var(--sb-text-hover);
}
.nav-item.active {
  background: var(--sb-active-bg);
  color: var(--sb-active-txt);
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 6px; bottom: 6px;
  width: 3px;
  background: var(--brand);
  border-radius: 0 2px 2px 0;
}
.nav-item .ni {
  font-size: 15px;
  width: 20px; text-align: center;
  flex-shrink: 0;
  opacity: .85;
}
.nav-item.active .ni { opacity: 1; }

/* Sidebar footer */
.sb-footer {
  margin-top: auto;
  padding: 12px 14px;
  border-top: 1px solid var(--sb-border);
  flex-shrink: 0;
}

/* ── Main area ───────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ── Top bar ─────────────────────────────────────────────── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 12px;
  box-shadow: 0 1px 0 var(--border);
}
.topbar-title {
  font-family: var(--font-brand);
  font-size: 19px; font-weight: 700;
  color: var(--ink-900);
  white-space: nowrap;
}

/* Search bar */
.topbar-search {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: var(--r);
  border: 1.5px solid var(--border);
  background: var(--surface-2);
  cursor: pointer;
  color: var(--ink-400);
  font-family: var(--font-ui);
  font-size: 13px;
  min-width: 200px;
  transition: border-color .15s, box-shadow .15s;
}
.topbar-search:hover {
  border-color: var(--border-2);
  background: var(--surface);
}
.topbar-search kbd {
  background: var(--ink-100);
  border: 1px solid var(--border-2);
  border-radius: var(--r-xs);
  padding: 1px 5px;
  font-size: 10px;
  color: var(--ink-400);
  font-family: var(--font-ui);
}

/* Topbar action buttons */
.topbar-action {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 13px;
  border-radius: var(--r-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-family: var(--font-ui);
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  color: var(--ink-500);
  transition: all .14s;
  white-space: nowrap;
}
.topbar-action:hover {
  border-color: var(--border-2);
  background: var(--surface-2);
  color: var(--ink-900);
}

/* Avatar */
.topbar-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--brand), #e85d04);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: white;
  cursor: pointer;
  flex-shrink: 0;
  box-shadow: 0 2px 8px var(--brand-glow);
  transition: box-shadow .15s;
}
.topbar-avatar:hover {
  box-shadow: 0 3px 12px rgba(201,57,59,.3);
}

/* ── Page content area ───────────────────────────────────── */
.page {
  flex: 1;
  overflow-y: auto;
  padding: 28px 32px;
  background: var(--surface-2);
}

/* ══════════════════════════════════════════════════════════
   BUTTONS
   ══════════════════════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border-radius: var(--r-sm);
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .14s;
  text-decoration: none;
  white-space: nowrap;
  letter-spacing: .01em;
}
.btn-primary {
  background: var(--brand);
  color: white;
  box-shadow: 0 1px 3px var(--brand-glow);
}
.btn-primary:hover {
  background: var(--brand-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(201,57,59,.35);
}
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  background: var(--ink-900);
  color: white;
}
.btn-secondary:hover { background: var(--ink-700); }

.btn-outline {
  background: transparent;
  color: var(--ink-700);
  border: 1.5px solid var(--border-2);
}
.btn-outline:hover {
  border-color: var(--ink-500);
  background: var(--surface-3);
}
.btn-ghost {
  background: transparent;
  color: var(--ink-500);
  border: 1.5px solid transparent;
}
.btn-ghost:hover {
  background: var(--surface-3);
  color: var(--ink-900);
}
.btn-danger {
  background: var(--danger);
  color: white;
}
.btn-danger:hover { background: #b91c1c; }

.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-xs { padding: 4px 9px; font-size: 11px; }
.btn-icon {
  padding: 7px;
  border-radius: var(--r-sm);
}

/* ══════════════════════════════════════════════════════════
   CARDS
   ══════════════════════════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 22px;
  box-shadow: var(--sh-xs);
  transition: box-shadow .2s;
}
.card:hover { box-shadow: var(--sh-sm); }

.card-title {
  font-family: var(--font-brand);
  font-size: 16px; font-weight: 700;
  margin-bottom: 16px;
  color: var(--ink-900);
  display: flex; align-items: center; gap: 8px;
}

/* ── Section header ──────────────────────────────────────── */
.sec-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.sec-title {
  font-family: var(--font-brand);
  font-size: 20px; font-weight: 700;
  color: var(--ink-900);
}
.sec-sub {
  font-size: 12px;
  color: var(--ink-400);
  margin-top: 3px;
}

/* ══════════════════════════════════════════════════════════
   METRIC / STAT CARDS
   ══════════════════════════════════════════════════════════ */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 20px 22px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--sh-xs);
  transition: box-shadow .2s, transform .2s;
}
.stat-card:hover {
  box-shadow: var(--sh-md);
  transform: translateY(-1px);
}
/* Colored top-bar accent */
.stat-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: var(--r-md) var(--r-md) 0 0;
}
.sc-orange::after { background: linear-gradient(90deg, var(--brand), #f97316); }
.sc-green::after  { background: linear-gradient(90deg, var(--success), #22c55e); }
.sc-blue::after   { background: linear-gradient(90deg, var(--info), #60a5fa); }
.sc-gold::after   { background: linear-gradient(90deg, var(--warning), #fbbf24); }
.sc-red::after    { background: linear-gradient(90deg, var(--danger), #f87171); }

/* Stat card icon box */
.stat-icon {
  width: 38px; height: 38px;
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  margin-bottom: 12px;
  flex-shrink: 0;
}
.stat-icon.orange { background: #fff4ee; }
.stat-icon.green  { background: var(--success-bg); }
.stat-icon.blue   { background: var(--info-bg); }
.stat-icon.gold   { background: var(--warning-bg); }
.stat-icon.red    { background: var(--danger-bg); }

.stat-label {
  font-size: 11px; font-weight: 600;
  color: var(--ink-400);
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-bottom: 4px;
}
.stat-val {
  font-family: var(--font-brand);
  font-size: 26px; font-weight: 700;
  color: var(--ink-900);
  line-height: 1.1;
}
.stat-sub {
  font-size: 11px;
  color: var(--ink-400);
  margin-top: 4px;
}
.stat-trend {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 11px; font-weight: 600;
  padding: 2px 7px;
  border-radius: var(--r-full);
  margin-top: 6px;
}
.stat-trend.up   { background: var(--success-bg); color: var(--success); }
.stat-trend.down { background: var(--danger-bg);  color: var(--danger); }
.stat-trend.flat { background: var(--ink-100);    color: var(--ink-400); }

/* ══════════════════════════════════════════════════════════
   FORMS
   ══════════════════════════════════════════════════════════ */
.fg { margin-bottom: 18px; }

.fl {
  display: block;
  font-size: 11.5px; font-weight: 600;
  color: var(--ink-500);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.fl .req { color: var(--brand); }

.fc {
  width: 100%;
  padding: 10px 13px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  font-family: var(--font-ui);
  font-size: 13.5px;
  color: var(--ink-900);
  background: var(--surface);
  transition: border-color .15s, box-shadow .15s;
  outline: none;
  line-height: 1.4;
}
.fc::placeholder { color: var(--ink-300); }
.fc:hover  { border-color: var(--border-2); }
.fc:focus  {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(201,57,59,.10);
  background: var(--surface);
}
.fc.err { border-color: var(--danger); }
.fc.err:focus { box-shadow: 0 0 0 3px rgba(220,38,38,.10); }
.fc.ok  { border-color: var(--success); }
.fc.ok:focus  { box-shadow: 0 0 0 3px rgba(22,163,74,.10); }
select.fc { cursor: pointer; }

.fe {
  font-size: 11px; color: var(--danger);
  margin-top: 4px; display: flex; align-items: center; gap: 4px;
}
.fh {
  font-size: 11px; color: var(--ink-400);
  margin-top: 4px;
}

/* Grid helpers */
.fr2 { display: grid; grid-template-columns: 1fr 1fr;     gap: 16px; }
.fr3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.fr4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }

/* ══════════════════════════════════════════════════════════
   TABLES
   ══════════════════════════════════════════════════════════ */
.tw { overflow-x: auto; }

table.dt {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.dt thead th {
  position: sticky; top: 0; z-index: 1;
  background: var(--surface-2);
  color: var(--ink-400);
  font-size: 11px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  padding: 11px 14px;
  border-bottom: 1.5px solid var(--border);
  text-align: left;
  white-space: nowrap;
  user-select: none;
}
.dt thead th:first-child { border-radius: var(--r-xs) 0 0 0; }
.dt thead th:last-child  { border-radius: 0 var(--r-xs) 0 0; }

.dt tbody tr {
  border-bottom: 1px solid #f1f5f9;
  transition: background .1s;
}
.dt tbody tr:last-child { border-bottom: none; }
.dt tbody tr:hover { background: var(--surface-2); }

.dt tbody td {
  padding: 13px 14px;
  color: var(--ink-900);
  vertical-align: middle;
}

.tr { text-align: right; }
.tc { text-align: center; }

/* ── Items table (invoice line items) ────────────────────── */
.it { width: 100%; border-collapse: collapse; }
.it th {
  background: var(--ink-900);
  color: rgba(255,255,255,.75);
  font-size: 10px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  padding: 9px 10px;
  text-align: left;
}
.it td {
  padding: 4px;
  border-bottom: 1px solid var(--border);
}
.it input, .it select {
  width: 100%;
  padding: 8px 9px;
  border: 1.5px solid transparent;
  border-radius: var(--r-xs);
  font-family: var(--font-ui);
  font-size: 12.5px;
  background: var(--surface-2);
  outline: none;
  transition: border-color .15s, background .15s;
  color: var(--ink-900);
}
.it input:hover, .it select:hover { background: var(--surface-3); }
.it input:focus, .it select:focus {
  border-color: var(--brand);
  background: white;
  box-shadow: 0 0 0 2px rgba(201,57,59,.08);
}

/* ══════════════════════════════════════════════════════════
   BADGES & STATUS
   ══════════════════════════════════════════════════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: var(--r-full);
  font-size: 11px; font-weight: 600;
  letter-spacing: .02em;
  white-space: nowrap;
}
.badge::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.b-green  { background: var(--success-bg); color: #15803d; }
.b-green::before  { background: var(--success); }
.b-blue   { background: var(--info-bg);    color: #1d4ed8; }
.b-blue::before   { background: var(--info); }
.b-red    { background: var(--danger-bg);  color: #b91c1c; }
.b-red::before    { background: var(--danger); }
.b-gray   { background: var(--ink-100);    color: var(--ink-500); }
.b-gray::before   { background: var(--ink-300); }
.b-yellow { background: var(--warning-bg); color: #92400e; }
.b-yellow::before { background: var(--warning); }
.b-orange { background: #fff4ee; color: #c2410c; }
.b-orange::before { background: #f97316; }

/* ══════════════════════════════════════════════════════════
   MODAL / OVERLAY
   ══════════════════════════════════════════════════════════ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(13,15,26,.6);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  padding: 20px;
  animation: fadeIn .15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 28px 30px;
  max-width: 600px; width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--sh-xl);
  animation: slideUp .2s ease;
}
@keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-hdr {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.modal-title {
  font-family: var(--font-brand);
  font-size: 20px; font-weight: 700;
  color: var(--ink-900);
}
.modal-x {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  color: var(--ink-400);
  transition: all .14s;
  font-family: var(--font-ui);
  line-height: 1;
}
.modal-x:hover { background: var(--surface-3); color: var(--ink-900); }

/* ══════════════════════════════════════════════════════════
   INVOICE SUMMARY PANEL
   ══════════════════════════════════════════════════════════ */
.inv-sum {
  background: var(--ink-900);
  color: white;
  border-radius: var(--r-md);
  padding: 20px 22px;
}
.sum-row {
  display: flex; justify-content: space-between;
  padding: 6px 0; font-size: 13px;
}
.sum-row.tot {
  border-top: 1px solid rgba(255,255,255,.15);
  margin-top: 8px; padding-top: 12px;
  font-size: 17px; font-weight: 700;
}
.sum-row .lbl { color: rgba(255,255,255,.6); }
.sum-row .amt { font-family: var(--font-mono); }

/* ══════════════════════════════════════════════════════════
   TOAST NOTIFICATIONS
   ══════════════════════════════════════════════════════════ */
.toast-wrap {
  position: fixed; top: 20px; right: 20px;
  z-index: 9999;
  display: flex; flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--ink-900);
  color: white;
  padding: 13px 18px;
  border-radius: var(--r-sm);
  font-size: 13px;
  box-shadow: var(--sh-lg);
  display: flex; align-items: center; gap: 10px;
  min-width: 260px; max-width: 360px;
  animation: toastIn .22s cubic-bezier(.16,1,.3,1);
  pointer-events: auto;
  border-left: 3px solid rgba(255,255,255,.3);
}
.toast.ok {
  background: #064e3b;
  border-left-color: var(--success);
}
.toast.er {
  background: #7f1d1d;
  border-left-color: var(--danger);
}
@keyframes toastIn {
  from { transform: translateX(110%); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}

/* ══════════════════════════════════════════════════════════
   UTILITY / MISC
   ══════════════════════════════════════════════════════════ */
/* Empty state */
.empty {
  text-align: center;
  padding: 64px 24px;
  color: var(--ink-400);
}
.empty .ei {
  font-size: 48px;
  margin-bottom: 14px;
  display: block;
  opacity: .7;
}
.empty h3 {
  font-family: var(--font-brand);
  font-size: 18px; font-weight: 700;
  margin-bottom: 8px;
  color: var(--ink-700);
}
.empty p { font-size: 13px; line-height: 1.7; color: var(--ink-400); }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* Monospace tag */
.tag {
  display: inline-flex;
  padding: 2px 8px;
  background: var(--surface-3);
  border: 1px solid var(--border);
  border-radius: var(--r-xs);
  font-size: 11.5px;
  font-family: var(--font-mono);
  color: var(--ink-500);
}
.mono { font-family: var(--font-mono); }

/* GST badge */
.gst-badge {
  display: inline-flex; align-items: center;
  background: var(--success-bg);
  border: 1px solid var(--success-bd);
  border-radius: var(--r-xs);
  padding: 2px 9px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: #15803d;
  font-weight: 600;
}

/* Info box */
.info-box {
  background: var(--info-bg);
  border: 1px solid var(--info-bd);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  font-size: 12.5px;
  color: #1d4ed8;
  display: flex; align-items: flex-start; gap: 10px;
  line-height: 1.6;
}

/* Spacing helpers */
.mb8  { margin-bottom: 8px; }
.mb12 { margin-bottom: 12px; }
.mb16 { margin-bottom: 16px; }
.mb20 { margin-bottom: 20px; }
.mb24 { margin-bottom: 24px; }
.mt8  { margin-top: 8px; }
.mt12 { margin-top: 12px; }
.mt16 { margin-top: 16px; }

/* Flex helpers */
.flex-c { display: flex; align-items: center; gap: 8px; }
.flex-b { display: flex; align-items: center; justify-content: space-between; }
.flex-end { display: flex; justify-content: flex-end; }

/* Dashboard section card wrapper */
.dash-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 20px 22px;
  margin-bottom: 20px;
  box-shadow: var(--sh-xs);
}
.dash-section-hdr {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.dash-section-title {
  font-size: 14px; font-weight: 700;
  color: var(--ink-900);
  display: flex; align-items: center; gap: 7px;
}

/* Quick action buttons */
.quick-action {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px;
  padding: 14px 10px;
  border-radius: var(--r-md);
  border: 1.5px solid transparent;
  background: var(--surface-2);
  cursor: pointer;
  text-align: center;
  font-family: var(--font-ui);
  transition: all .16s;
}
.quick-action:hover {
  background: var(--surface);
  border-color: var(--border);
  box-shadow: var(--sh-sm);
  transform: translateY(-1px);
}
.quick-action-icon {
  width: 36px; height: 36px;
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.quick-action-label {
  font-size: 11.5px; font-weight: 600;
}

/* Activity feed */
.activity-item {
  display: flex; align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid #f1f5f9;
}
.activity-item:last-child { border-bottom: none; }
.activity-dot {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 1px;
}
.activity-text { font-size: 12.5px; color: var(--ink-700); line-height: 1.5; }
.activity-time { font-size: 11px; color: var(--ink-400); margin-top: 2px; }

/* Sync status pill */
.sync-pill {
  display: inline-flex; align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: var(--r-full);
  font-size: 12px; font-weight: 500;
  border: 1px solid;
}
.sync-pill.ok {
  background: var(--success-bg);
  border-color: var(--success-bd);
  color: #15803d;
}
.sync-pill.warn {
  background: var(--warning-bg);
  border-color: var(--warning-bd);
  color: #92400e;
}

/* ══════════════════════════════════════════════════════════
   MOBILE NAV
   ══════════════════════════════════════════════════════════ */
.mob-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--ink-900);
  border-top: 1px solid rgba(255,255,255,.08);
  z-index: 500;
  padding-bottom: env(safe-area-inset-bottom);
}
.mob-nav-inner {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
}
.mob-nav-inner::-webkit-scrollbar { display: none; }
.mob-btn {
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
  padding: 8px 14px;
  min-width: 58px;
  cursor: pointer;
  border: none;
  background: none;
  color: rgba(255,255,255,.4);
  font-family: var(--font-ui);
  font-size: 9px; font-weight: 600;
  transition: color .14s;
}
.mob-btn .mi, .mob-btn .ni { font-size: 19px; }
.mob-btn.active { color: var(--brand); }

/* ══════════════════════════════════════════════════════════
   AUTH LAYOUT
   ══════════════════════════════════════════════════════════ */
.auth-left-panel { display: flex !important; }
@media(max-width: 640px) {
  .auth-left-panel { display: none !important; }
  .auth-right-panel {
    width: 100% !important;
    min-height: 100vh !important;
    padding: 36px 24px !important;
  }
}

/* ══════════════════════════════════════════════════════════
   PRINT
   ══════════════════════════════════════════════════════════ */
@media print {
  body > * { display: none !important; }
  #al-po {
    display: block !important;
    position: fixed !important;
    inset: 0 !important;
    background: white !important;
    z-index: 99999 !important;
  }
  #al-po iframe { width: 100% !important; height: 100% !important; border: none !important; }
}

/* ══════════════════════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .mob-nav { display: block; }
  .mob-fab { display: flex !important; }
  .page { padding: 16px 14px 90px; }
  .topbar { padding: 0 14px; height: 54px; }
  .topbar-title { font-size: 16px; }
  .topbar-search { min-width: 130px; }
  .stat-grid { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-val { font-size: 20px !important; }
  .fr2, .fr3, .fr4 { grid-template-columns: 1fr; }
  .overlay { align-items: flex-end; padding: 0; }
  .modal {
    border-radius: var(--r-xl) var(--r-xl) 0 0;
    max-height: 92vh; max-width: 100vw;
    width: 100%; margin: 0;
    padding: 22px 18px 28px;
  }
  .sec-hdr { flex-direction: column; align-items: flex-start; gap: 10px; }
  .card { padding: 16px; }
  .dash-section { padding: 16px; }
  .topbar-action { display: none; }
}

@media (min-width: 769px) and (max-width: 920px) {
  .sidebar {
    width: 60px; min-width: 60px;
  }
  .sb-tag, .nav-item span, .sb-section-label, .sb-footer { display: none; }
  .sb-logo { font-size: 14px; }
  .nav-item {
    justify-content: center;
    padding: 11px 0;
  }
  .nav-item.active::before { display: none; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .fr2, .fr3 { grid-template-columns: 1fr; }
  .page { padding: 20px 20px; }
}

/* Animations */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-10px); }
}
@media(max-width: 600px) { .hide-sm { display: none !important; } }

/* ── Dashboard 2-col grid responsive ── */
@media (max-width: 900px) {
  .dash-2col { grid-template-columns: 1fr !important; }
}
@media (max-width: 768px) {
  .topbar-search { min-width: 120px; }
}

// ── Per-user localStorage scoping ─────────────────────────────────────
// All data keys are suffixed with the logged-in user's UID
// so two users on the same device never share data
let _currentUID = null;
function setCurrentUID(uid) { _currentUID = uid; }
function _scopedKey(k) {
  // Global keys (not user-specific)
  if (k === 'al_last_sync') return k;
  return _currentUID ? k + '__' + _currentUID : k;
}
const dbRead  = k => { try { const d = localStorage.getItem(_scopedKey(k)); return d ? JSON.parse(d) : null; } catch (e2) { return null; } };
const dbWrite = (k,v) => { try { localStorage.setItem(_scopedKey(k), JSON.stringify(v)); } catch(e) { console.error(e); } };
function clearUserData() {
  // Remove all scoped keys for current user
  if (!_currentUID) return;
  const suffix = '__' + _currentUID;
  Object.keys(localStorage).filter(k => k.endsWith(suffix)).forEach(k => localStorage.removeItem(k));
}

// ── One-time data migration — fixes objects stored as field values ────────
(function migrateData() {
  try {
    const invs = dbRead('al_invoices');
    if (!invs || !Array.isArray(invs)) return;
    let changed = false;
    const fixed = invs.map(function(inv) {
      const i = Object.assign({}, inv);
      // Fix customerName stored as object {name:'SBT',gstn:'...'}
      if (i.customerName !== null && typeof i.customerName === 'object') {
        i.customerName = i.customerName.name || i.customerName.businessName || '';
        changed = true;
      }
      // Fix customer stored as object
      if (i.customer !== null && typeof i.customer === 'object') {
        const cn = i.customer.name || i.customer.businessName || '';
        if (!i.customerName) i.customerName = cn;
        i.customer = cn;
        changed = true;
      }
      // Normalise date fields
      if (!i.date && i.invoiceDate) { i.date = i.invoiceDate; changed = true; }
      if (!i.invoiceDate && i.date) { i.invoiceDate = i.date; changed = true; }
      if (!i.subtotal && i.taxable) { i.subtotal = i.taxable; changed = true; }
      return i;
    });
    if (changed) dbWrite('al_invoices', fixed);
  } catch(e) {}
})();

const profileDB = {
  get: () => dbRead('al_profile'),
  save: p => { const d = {...p, updatedAt: new Date().toISOString()}; dbWrite('al_profile', d); return d; }
};

// ── AUTH DB ──────────────────────────────────────────────────
const customerDB = {
  getAll: () => dbRead('al_customers') || [],
  getActive: () => (dbRead('al_customers') || []).filter(c => c.isActive !== false),
  save: c => {
    const all = dbRead('al_customers') || [];
    if (c.id) {
      const updated = all.map(x => x.id === c.id ? {...c, updatedAt: new Date().toISOString()} : x);
      dbWrite('al_customers', updated);
      return updated.find(x => x.id === c.id);
    }
    const n = {...c, id: genId(), isActive: true, createdAt: new Date().toISOString()};
    dbWrite('al_customers', [...all, n]);
    return n;
  },
  dupGSTN: (gstn, excl) => {
    if (!gstn) return false;
    return (dbRead('al_customers') || []).some(c => c.gstn === gstn && c.id !== excl && c.isActive !== false);
  },
  del: id => dbWrite('al_customers', (dbRead('al_customers') || []).map(
    c => c.id === id ? {...c, isActive: false} : c)),
};

const vendorDB = {
  getAll: () => dbRead('al_vendors') || [],
  getActive: () => (dbRead('al_vendors') || []).filter(v => v.isActive !== false),
  save: v => {
    const all = dbRead('al_vendors') || [];
    if (v.id) {
      const updated = all.map(x => x.id === v.id ? {...v, updatedAt: new Date().toISOString()} : x);
      dbWrite('al_vendors', updated);
      return updated.find(x => x.id === v.id);

// Financial year range helper
function fyRange(fy) {
  const parts = (fy || '2025-26').split('-');
  const startYear = parseInt(parts[0]);
  const endYear   = startYear + 1;
  return [
    new Date(startYear, 3, 1),
    new Date(endYear, 2, 31, 23, 59, 59),
  ];
}

const FRSYNC = {
  // Save ALL local data to Firebase under /users/{uid}/
  async push(uid) {
    if (!uid) return;
    const payload = {
      profile:       dbRead('al_profile')       || null,
      customers:     dbRead('al_customers')     || [],
      vendors:       dbRead('al_vendors')       || [],
      invoices:      dbRead('al_invoices')      || [],
      counters:      dbRead('al_counters')      || {},
      expenses:      dbRead('al_expenses')      || [],
      inventory:     dbRead('al_inventory')     || [],
      purchases:     dbRead('al_purchases')     || [],
      credit_notes:  dbRead('al_credit_notes')  || [],
      debit_notes:   dbRead('al_debit_notes')   || [],
      bank_entries:  dbRead('al_bank_entries')  || [],
      bizLogo:       dbRead('al_biz_logo')      || null,
      bizSign:       dbRead('al_biz_sign')      || null,
      savedAt:       new Date().toISOString(),
    };
    await fbDB.ref('users/' + uid).set(payload);
    dbWrite('al_last_sync', new Date().toISOString());
  },

  // Load user data from Firebase into localStorage
  async pull(uid) {
    if (!uid) return;
    const snap = await fbDB.ref('users/' + uid).get();
    if (!snap.exists()) {
      // Brand new user — no data in Firebase yet. Clear any stale local data.
      // (Data is already scoped to UID so this is just a safety clear)
      return false;
    }
    const data = snap.val();
    if (data.profile)                 dbWrite('al_profile',      data.profile);
    if (_optionalChain([data, 'access', _2 => _2.customers, 'optionalAccess', _3 => _3.length]))       dbWrite('al_customers',    data.customers);
    if (_optionalChain([data, 'access', _4 => _4.vendors, 'optionalAccess', _5 => _5.length]))         dbWrite('al_vendors',      data.vendors);
    if (_optionalChain([data, 'access', _6 => _6.invoices, 'optionalAccess', _7 => _7.length]))        dbWrite('al_invoices',     data.invoices);
    if (data.counters)                dbWrite('al_counters',     data.counters);
    if (_optionalChain([data, 'access', _8 => _8.expenses, 'optionalAccess', _9 => _9.length]))        dbWrite('al_expenses',     data.expenses);
    if (_optionalChain([data, 'access', _10 => _10.inventory, 'optionalAccess', _11 => _11.length]))       dbWrite('al_inventory',    data.inventory);
    if (_optionalChain([data, 'access', _12 => _12.purchases, 'optionalAccess', _13 => _13.length]))       dbWrite('al_purchases',    data.purchases);
    if (_optionalChain([data, 'access', _14 => _14.credit_notes, 'optionalAccess', _15 => _15.length]))    dbWrite('al_credit_notes', data.credit_notes);
    if (_optionalChain([data, 'access', _16 => _16.debit_notes, 'optionalAccess', _17 => _17.length]))     dbWrite('al_debit_notes',  data.debit_notes);
    if (_optionalChain([data, 'access', _18 => _18.bank_entries, 'optionalAccess', _19 => _19.length]))    dbWrite('al_bank_entries', data.bank_entries);
    if (data.bizLogo)                 dbWrite('al_biz_logo',     data.bizLogo);
    if (data.bizSign)                 dbWrite('al_biz_sign',     data.bizSign);
    dbWrite('al_last_sync', new Date().toISOString());
    return true;
  },

  getLastSync() {
    const s = dbRead('al_last_sync');
    if (!s) return null;
    return new Date(s).toLocaleString('en-IN', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  },

  // Auto-save with 3s debounce — call this after any data change
  _timer: null,
  autoSave(uid) {
    if (!uid) return;
    clearTimeout(FRSYNC._timer);
    FRSYNC._timer = setTimeout(() => FRSYNC.push(uid).catch(()=>{}), 3000);
  },
};

// GST LOGIC

function getGSTINState(gstin) {
  if (!gstin || !GSTIN_RE.test(gstin)) return null;
  return gstin.substring(0, 2);
}

function isIntraState(supplierGSTIN, customerGSTIN, customerState) {
  if (!supplierGSTIN) return true;
  const supCode = getGSTINState(supplierGSTIN);
  if (!supCode) return true;
  if (customerGSTIN) {
    const cusCode = getGSTINState(customerGSTIN);
    return supCode === cusCode;
  }
  const cusCode = STATE_CODES[customerState] || '00';
  return supCode === cusCode;
}

function calcTotals(items, intra, discount) {
  let taxable = 0, cgst = 0, sgst = 0, igst = 0;
  items.forEach(item => {
    const qty = parseFloat(item.quantity) || 0;
    const rate = parseFloat(item.rate) || 0;
    const gstRate = parseFloat(item.gstRate) || 0;
    const tv = qty * rate;
    const gst = tv * gstRate / 100;
    taxable += tv;
    if (intra) { cgst += gst / 2; sgst += gst / 2; } else { igst += gst; }
  });
  taxable = Math.round(taxable * 100) / 100;
  cgst = Math.round(cgst * 100) / 100;
  sgst = Math.round(sgst * 100) / 100;
  igst = Math.round(igst * 100) / 100;
  const disc = parseFloat(discount) || 0;
  const gross = taxable + cgst + sgst + igst - disc;
  const rounded = Math.round(gross);
  const roundOff = Math.round((rounded - gross) * 100) / 100;
  return { taxable, cgst, sgst, igst, discount: disc, roundOff, total: rounded };
}

function fmtINR(n) {
  return '₹' + (parseFloat(n) || 0).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function numWords(num) {
  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function h(n) {
    if (!n) return '';
    if (n < 20) return ones[n] + ' ';
    if (n < 100) return tens[Math.floor(n/10)] + (n%10 ? ' '+ones[n%10] : '') + ' ';
    return ones[Math.floor(n/100)] + ' Hundred ' + h(n%100);
  }
  if (!num) return 'Zero Rupees Only';
  const r = Math.floor(num), p = Math.round((num - r) * 100);
  let res = '';
  if (r >= 10000000) res += h(Math.floor(r/10000000)) + 'Crore ';
  if (r >= 100000) res += h(Math.floor((r%10000000)/100000)) + 'Lakh ';
  if (r >= 1000) res += h(Math.floor((r%100000)/1000)) + 'Thousand ';
  res += h(r % 1000) + 'Rupees';
  if (p > 0) res += ' and ' + h(p) + 'Paise';
  return res.trim().replace(/\s+/g,' ') + ' Only';
}

// PRINT / DOWNLOAD — IFRAME METHOD (works everywhere)

function printInvoiceHTML(html) {
  var old = document.getElementById('al-po');
  if (old) old.remove();

  var overlay = document.createElement('div');
  overlay.id = 'al-po';
  overlay.style.cssText = 'display:none;position:fixed;inset:0;background:white;z-index:99999;';

  var iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;height:100%;border:none;';

  // Use Blob URL instead of srcdoc — srcdoc fails silently when HTML is large
  // (e.g. when invoice contains base64 logo/signature images)
  var blob = new Blob([html], {type: 'text/html;charset=utf-8'});
  var blobUrl = URL.createObjectURL(blob);
  iframe.src = blobUrl;

  overlay.appendChild(iframe);
  document.body.appendChild(overlay);

  var printed = false;
  function doPrint() {
    if (printed) return;
    printed = true;
    overlay.style.display = 'block';
    setTimeout(function() {
      window.print();
      setTimeout(function() {
        overlay.style.display = 'none';
        if (overlay.parentNode) overlay.remove();
        URL.revokeObjectURL(blobUrl);
      }, 1500);
    }, 500);
  }

  iframe.addEventListener('load', doPrint);
  // Fallback if load doesn't fire within 3s
  setTimeout(doPrint, 3000);
}

function downloadInvoiceHTML(html, invoiceNumber) {
  var fname = (invoiceNumber || 'invoice').replace(/\//g, '-') + '.html';
  var blob = new Blob([html], {type: 'text/html;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = fname;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(function() { URL.revokeObjectURL(url); if (a.parentNode) a.remove(); }, 1000);
}

function DateFilterBar({filterMode, setFilterMode, filterMonth, setFilterMonth,
                         filterYear, setFilterYear, dateFrom, setDateFrom, dateTo, setDateTo}) {

      )

              value:filterMonth, onChange:e=>setFilterMonth(parseInt(e.target.value))}

              value:filterYear, onChange:e=>setFilterYear(parseInt(e.target.value))}
            , years.map(y=>React.createElement('option',{key:y,value:y},y))
          )
        )
      )

        React.createElement(React.Fragment, {}
          , React.createElement('input', { className:'fc', type:'date', value:dateFrom, onChange:e=>setDateFrom(e.target.value),
              style:{width:'auto',padding:'5px 10px',fontSize:12}})
          , React.createElement('span', {style:{color:'var(--ink-400)',fontSize:12}}, 'to')
          , React.createElement('input', { className:'fc', type:'date', value:dateTo, onChange:e=>setDateTo(e.target.value),
              style:{width:'auto',padding:'5px 10px',fontSize:12}})
        )
      )
    )
  );
}

function applyDateFilter(items, getDate, filterMode, filterMonth, filterYear, dateFrom, dateTo) {
  if (filterMode === 'All') return items;
  return items.filter(item => {
    const d = new Date(getDate(item));
    if (isNaN(d)) return false;
    if (filterMode === 'Month') {
      return d.getMonth() === filterMonth && d.getFullYear() === filterYear;
    }
    if (filterMode === 'Custom') {
      const from = dateFrom ? new Date(dateFrom) : null;
      const to   = dateTo   ? new Date(dateTo+'T23:59:59') : null;
      if (from && d < from) return false;
      if (to   && d > to)   return false;
      return true;
    }
    return true;
  });
}

function Reports() {
  const {profile} = useApp();
  const fy = (profile && profile.financialYear) || '2025-26';
  const invs = React.useMemo(() => {
    if (!fy) return invoiceDB.getAll();
    const [s,e] = fyRange(fy);
    return invoiceDB.getAll().filter(i => { const d=new Date(i.date||i.invoiceDate); return d>=s && d<=e; });
  }, [fy]);
  const exps = expenseDB.getByFY(fy);

  const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer,
          CartesianGrid, PieChart, Pie, Cell, Legend } = window.Recharts || {};
  const PIE_COLORS = ['#e85d04','#fbbf24','#10b981','#3b82f6','#8b5cf6','#ef4444','#ec4899'];

  // Monthly revenue & expense
  const months = React.useMemo(()=>{
    const map = {};
    const [s,e] = fyRange(fy);
    let cur = new Date(s);
    while(cur<=e) {
      const key = cur.toLocaleString('en-IN',{month:'short',year:'2-digit'});
      map[key] = { name:key, revenue:0, expense:0, profit:0 };
      cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
    }
    invs.forEach(inv=>{
      const k = new Date(inv.date||inv.invoiceDate).toLocaleString('en-IN',{month:'short',year:'2-digit'});
      if(map[k]) map[k].revenue += (inv.subtotal||inv.total||0);
    });
    exps.forEach(exp=>{
      const k = new Date(exp.date).toLocaleString('en-IN',{month:'short',year:'2-digit'});
      if(map[k]) map[k].expense += (exp.total||exp.amount||0);
    });
    Object.values(map).forEach(m=>{ m.profit = m.revenue - m.expense; });
    return Object.values(map);
  }, [invs, exps, fy]);

  const totalRev  = invs.reduce((s,i)=>s+(i.subtotal||i.total||0),0);
  const totalExp  = exps.reduce((s,e)=>s+(e.total||e.amount||0),0);
  const totalGST  = invs.reduce((s,i)=>s+(i.cgst||0)+(i.sgst||0)+(i.igst||0),0);
  const netProfit = totalRev - totalExp;

  // GST breakdown for pie
  const gstData = [
    {name:'CGST', value: invs.reduce((s,i)=>s+(i.cgst||0),0)},
    {name:'SGST', value: invs.reduce((s,i)=>s+(i.sgst||0),0)},

    React.createElement('div', { className: "page"}

      /* Summary cards */
      , React.createElement('div', { style: {display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12,marginBottom:20}}
        , [
          {label:'Total Sales',  value:fmtINR(totalRev),  color:'#e85d04', bg:'#fff8f0', icon:'💰'},
          {label:'Total GST',    value:fmtINR(totalGST),  color:'#065f46', bg:'#f0fdf4', icon:'🧾'},
          {label:'Expenses',     value:fmtINR(totalExp),  color:'#dc2626', bg:'#fef2f2', icon:'💸'},
          {label:'Net Profit',   value:fmtINR(netProfit), color: netProfit>=0?'#065f46':'#dc2626',
           bg: netProfit>=0?'#f0fdf4':'#fef2f2', icon: netProfit>=0?'📈':'📉'},
        ].map(c=>(
          React.createElement('div', { key: c.label, style: {background:c.bg,border:`1.5px solid ${c.color}22`,borderRadius:12,padding:'14px 16px'}}
            , React.createElement('div', { style: {fontSize:20,marginBottom:4}}, c.icon)
            , React.createElement('div', { style: {fontSize:18,fontWeight:800,color:c.color,fontFamily:'DM Mono,monospace'}}, c.value)
            , React.createElement('div', { style: {fontSize:11,color:'#6b7280',marginTop:3}}, c.label)
          )
        ))
      )

      /* Monthly chart */

        React.createElement('div', { style: {background:'white',border:'1px solid #e2ddd6',borderRadius:12,padding:'16px',marginBottom:20}}
          , React.createElement('div', { style: {fontWeight:700,fontSize:14,marginBottom:14,color:'#0d0f1a'}}, "📅 Monthly Revenue vs Expense"    )
          , React.createElement(ResponsiveContainer, { width: "100%", height: 200}
            , React.createElement(BarChart, { data: months, margin: {top:0,right:10,left:-10,bottom:0}}

function BulkInventoryImport({onClose, onImported}) {
  const {toast} = useApp();
  const [rows, setRows] = useState([]);
  const [step, setStep] = useState(1); // 1=upload, 2=preview

  function handleFile(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(ev.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        if (data.length < 2) { toast('File is empty','er'); return; }
        const headers = data[0].map(h=>String(h).trim().toLowerCase());
        const parsed = data.slice(1).filter(r=>r.some(c=>c!=='')).map((r,i) => {
          const get = (...keys) => { for(const k of keys){ const idx=headers.findIndex(h=>h.includes(k)); if(idx>=0) return r[idx]||''; } return ''; };
          return {
            id: genId(),
            name: String(get('name','item','product')).trim(),
            code: String(get('code','sku','item code')).trim(),
            hsnCode: String(get('hsn')).trim(),
            category: String(get('category','cat')).trim() || 'Trading Goods',
            unit: String(get('unit')).trim().toUpperCase() || 'NOS',
            purchaseRate: parseFloat(get('purchase','buy','cost')) || 0,
            saleRate: parseFloat(get('sale','sell','price','rate')) || 0,
            gstRate: parseFloat(get('gst','tax')) || 18,
            openingStock: parseFloat(get('opening','stock','qty','quantity')) || 0,
            currentStock: parseFloat(get('current stock','current')) || parseFloat(get('opening','stock','qty','quantity')) || 0,
            minStock: parseFloat(get('min','minimum','reorder')) || 0,
            createdAt: new Date().toISOString(),
          };
        }).filter(r=>r.name);
        setRows(parsed); setStep(2);
      } catch(err) { toast('Could not read file. Use .xlsx or .xls','er'); }
    };
    reader.readAsBinaryString(file);
  }

  function doImport() {

function BulkSalesImport({onClose, onImported}) {
  const {profile, toast} = useApp();
  const fy  = (profile&&profile.financialYear)||'2025-26';
  const pfx = (profile&&profile.prefix)||'INV';
  const applyGST = !!(profile&&profile.gstn);
  const [rows, setRows] = useState([]);
  const [step, setStep] = useState(1);
  const [importing, setImporting] = useState(false);

  function handleFile(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(ev.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        if (data.length < 2) { toast('File is empty','er'); return; }
        const headers = data[0].map(h=>String(h).trim().toLowerCase());
        const get = (row,...keys) => { for(const k of keys){ const idx=headers.findIndex(h=>h.includes(k)); if(idx>=0&&row[idx]!==undefined&&row[idx]!=='') return row[idx]; } return ''; };
        const parsed = [];
        // Group by invoice number — each row is an item
        const grouped = {};
        data.slice(1).filter(r=>r.some(c=>c!=='')).forEach(row => {
          const invNo = String(get(row,'invoice','inv no','bill no','number')||'').trim() || ('AUTO-'+(Date.now()));
          if (!grouped[invNo]) {
            grouped[invNo] = {
              invoiceNumber: invNo,
              customerName: String(get(row,'customer','party','buyer','client')||'').trim(),
              customerGSTN: String(get(row,'gstin','gstn','customer gst')||'').trim(),
              date: String(get(row,'date','invoice date')||new Date().toISOString().split('T')[0]).trim(),
              items: [],
            };
          }
          const desc = String(get(row,'description','item','product','particulars','goods')||'').trim();
          const qty  = parseFloat(get(row,'qty','quantity','nos')||1)||1;
          const rate = parseFloat(get(row,'rate','price','unit price','amount')||0)||0;
          const gst  = parseFloat(get(row,'gst','gst%','gst rate','tax')||18)||18;
          if (desc) grouped[invNo].items.push({id:genId(),description:desc,quantity:qty,rate,gstRate:gst,unit:'NOS'});
        });
        const result = Object.values(grouped).filter(g=>g.items.length>0).map(g=>{
          const t = calcTotals(g.items.map(i=>({...i,gstRate:applyGST?i.gstRate:0})), true, 0);
          return {...g, ...t, applyGST, financialYear:fy};
        });
        setRows(result); setStep(2);
      } catch(err) { toast('Could not read file. Use .xlsx or .xls','er'); console.error(err); }
    };
    reader.readAsBinaryString(file);
  }

  function doImport() {
    setImporting(true);
    rows.forEach(row => {
      let invNum = row.invoiceNumber;
      if (!invNum || invNum.startsWith('AUTO-')) invNum = counterDB.next(pfx, fy);
      // Find or create customer
      let custId = '';
      if (row.customerName) {
        let cust = customerDB.getAll().find(c=>c.name.toLowerCase()===row.customerName.toLowerCase());
        if (!cust) cust = customerDB.save({name:row.customerName, gstn:row.customerGSTN||'', isActive:true});
        custId = cust.id;
      }
      invoiceDB.save({invoiceNumber:invNum, customerId:custId, customerName:row.customerName,
        customerGSTN:row.customerGSTN||'', date:row.date, items:row.items,
        taxable:row.taxable, cgst:row.cgst, sgst:row.sgst, igst:row.igst,
        total:row.total, applyGST, financialYear:fy, discount:0});
    });
    toast(`✅ ${rows.length} invoices imported`,'ok');
    setImporting(false); onImported(); onClose();
  }

  return (
    React.createElement('div', { style: {position:'fixed',inset:0,background:'rgba(13,15,26,0.65)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
      , React.createElement('div', { style: {background:'white',borderRadius:14,padding:24,maxWidth:780,width:'100%',maxHeight:'92vh',overflowY:'auto'}}
        , React.createElement('div', { style: {display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}
          , React.createElement('div', { style: {fontFamily:'Playfair Display,serif',fontSize:18,fontWeight:800}}, "📊 Bulk Sales Import"   )
          , React.createElement('button', { onClick: onClose, style: {background:'none',border:'1.5px solid #ddd',borderRadius:'50%',width:30,height:30,cursor:'pointer'}}, "×")
        )

        , step===1 && (
          React.createElement('div', {}
            , React.createElement('div', { style: {background:'#f0f9ff',border:'1px dashed #38bdf8',borderRadius:10,padding:20,marginBottom:14,textAlign:'center'}}
              , React.createElement('div', { style: {fontSize:32,marginBottom:8}}, "📤")
              , React.createElement('div', { style: {fontWeight:600,marginBottom:6}}, "Upload Sales Excel File"   )
              , React.createElement('div', { style: {fontSize:12,color:'#666',marginBottom:14}}, "Each row = one invoice line item"      )
              , React.createElement('input', { type: "file", accept: ".xlsx,.xls,.csv", onChange: handleFile, style: {display:'block',margin:'0 auto'}})
            )
            , React.createElement('div', { style: {background:'#fffbeb',border:'1px solid #fcd34d',borderRadius:8,padding:12,fontSize:12}}
              , React.createElement('strong', {}, "Expected columns (flexible — partial match):"     ), React.createElement('br', {}), "Invoice No | Date | Customer Name | GSTIN | Description | Qty | Rate | GST% | Unit"
                                , React.createElement('br', {})
              , React.createElement('span', { style: {color:'#92400e',marginTop:4,display:'block'}}, "Multiple rows with same Invoice No will be merged as items of one invoice."             )
            )
          )
        )

        , step===2 && (
          React.createElement('div', {}
            , React.createElement('div', { style: {marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}
              , React.createElement('span', { style: {fontWeight:600,color:'#166534'}}, "✅ " , rows.length, " invoices ready to import ("     , rows.reduce((s,r)=>s+r.items.length,0), " line items)"  )
              , React.createElement('button', { className: "btn btn-outline btn-sm"  , onClick: ()=>setStep(1)}, "← Change File"  )
            )
            , React.createElement('div', { style: {overflowX:'auto',maxHeight:380,border:'1px solid #eee',borderRadius:8}}
              , React.createElement('table', { style: {width:'100%',borderCollapse:'collapse',fontSize:12}}
                , React.createElement('thead', {}, React.createElement('tr', { style: {background:'#0d0f1a',color:'white',position:'sticky',top:0}}
                  , ['#','Inv No','Date','Customer','Items','Taxable','GST','Total'].map(h=>(
                    React.createElement('th', { key: h, style: {padding:'7px 10px',textAlign:['Taxable','GST','Total'].includes(h)?'right':'left',whiteSpace:'nowrap'}}, h)
                  ))
                ))
                , React.createElement('tbody', {}, rows.map((r,i)=>(
                  React.createElement('tr', { key: i, style: {borderBottom:'1px solid #eee',background:i%2?'#fafafa':'white'}}
                    , React.createElement('td', { style: {padding:'6px 10px',color:'#888'}}, i+1)
                    , React.createElement('td', { style: {padding:'6px 10px',fontFamily:'monospace',fontWeight:600}}, r.invoiceNumber.startsWith('AUTO-')?React.createElement('span', { style: {color:'#888',fontStyle:'italic'}}, "Auto"):r.invoiceNumber)
                    , React.createElement('td', { style: {padding:'6px 10px',whiteSpace:'nowrap'}}, r.date)
                    , React.createElement('td', { style: {padding:'6px 10px'}}, r.customerName||React.createElement('span', { style: {color:'#aaa'}}, "—"))
                    , React.createElement('td', { style: {padding:'6px 10px'}}, r.items.length, " item" , r.items.length!==1?'s':'')
                    , React.createElement('td', { style: {padding:'6px 10px',textAlign:'right'}}, fmtINR(r.taxable||0))
                    , React.createElement('td', { style: {padding:'6px 10px',textAlign:'right'}}, fmtINR((r.cgst||0)+(r.sgst||0)+(r.igst||0)))
                    , React.createElement('td', { style: {padding:'6px 10px',textAlign:'right',fontWeight:700}}, fmtINR(r.total||0))
                  )
                )))
              )
            )
            , React.createElement('div', { style: {display:'flex',gap:10,marginTop:16}}

              , React.createElement('button', { className: "btn", style: {flex:2,background:'#166534',color:'white',border:'none',opacity:importing?0.7:1}, onClick: doImport, disabled: importing}

  );

// LEDGER
// ═══════════════════════════════════════════════════════════════════════
function Ledger() {
  const {profile} = useApp();
  const fy = (profile&&profile.financialYear)||'2025-26';
  const [partyType, setPartyType] = useState('Customer');
  const [partyId, setPartyId]     = useState('');
  const [showImport, setShowImport] = useState(false);

  const custs = customerDB.getActive();
  const vends = vendorDB.getAll().filter(v=>v.isActive!==false);
  const parties = partyType==='Customer' ? custs : vends;

  const selectedParty = parties.find(p=>p.id===partyId);

  // Build ledger entries for selected party
  const entries = React.useMemo(() => {
    if (!partyId) return [];
    const [s,e] = fyRange(fy);
    // Parse date safely — treat YYYY-MM-DD as local date, not UTC
    const parseDate = d => {
      if (!d) return new Date(0);
      if (typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)) {
        const [y,m,day] = d.split('-').map(Number);
        return new Date(y, m-1, day);
      }
      return new Date(d);
    };
    const inRange = d => { const dt=parseDate(d); return dt>=s && dt<=e; };
    const rows = [];

    if (partyType==='Customer') {
      // Sales invoices — Debit (amount receivable)
      invoiceDB.getAll().filter(i=>{
        const dateOk = inRange(i.date||i.invoiceDate);
        const partyOk = i.customerId===partyId || i.customerName===_optionalChain([selectedParty, 'optionalAccess', _49 => _49.name]);
        return dateOk && partyOk;
      }).forEach(i=>{
        rows.push({date:i.date||i.invoiceDate,type:'Sales Invoice',ref:i.invoiceNumber,debit:i.total||0,credit:0,narration:'Sales Invoice — '+(i.customerName||'')});
      });
      // Credit notes
      creditNoteDB.getAll().filter(c=>c.customerId===partyId&&inRange(c.date)).forEach(cn=>{
        rows.push({date:cn.date,type:'Credit Note',ref:cn.creditNoteNumber,debit:0,credit:cn.total||0,narration:cn.reason});
      });
      // Bank receipts
      bankDB.getAll().filter(b=>b.partyId===partyId&&b.type==='Receipt'&&inRange(b.date)).forEach(b=>{
        rows.push({date:b.date,type:'Receipt',ref:b.refNo||b.chequeNo||'',debit:0,credit:b.amount||0,narration:b.narration});
      });
    } else {
      // Purchase invoices — Credit (amount payable)
      purchaseDB.getAll().filter(p=>(p.vendorId===partyId||p.vendorName===_optionalChain([selectedParty, 'optionalAccess', _50 => _50.name]))&&inRange(p.date)).forEach(p=>{
        rows.push({date:p.date,type:'Purchase',ref:p.purchaseNumber,debit:0,credit:p.total||0,narration:`Bill: ${p.vendorBillNo||'—'}`});
      });
      // Debit notes
      debitNoteDB.getAll().filter(d=>d.vendorId===partyId&&inRange(d.date)).forEach(dn=>{
        rows.push({date:dn.date,type:'Debit Note',ref:dn.debitNoteNumber,debit:dn.total||0,credit:0,narration:dn.reason});
      });
      // Bank payments
      bankDB.getAll().filter(b=>b.partyId===partyId&&b.type==='Payment'&&inRange(b.date)).forEach(b=>{
        rows.push({date:b.date,type:'Payment',ref:b.refNo||b.chequeNo||'',debit:b.amount||0,credit:0,narration:b.narration});
      });
    }

    rows.sort((a,b)=>parseDate(a.date)-parseDate(b.date));

    // Opening balance from master record
    const ob = parseFloat(selectedParty&&selectedParty.openingBalance)||0;
    const obType = (selectedParty&&selectedParty.openingBalanceType)||'Dr';
    // Dr means they owe us (positive), Cr means we owe them (negative)
    const openingAmt = obType==='Dr' ? ob : -ob;

    // Add opening balance row if set
    if (ob > 0) {
      rows.unshift({date:s.toISOString().split('T')[0], type:'Opening Balance',
        ref:'', debit: obType==='Dr'?ob:0, credit: obType==='Cr'?ob:0,
        narration:'Opening Balance (brought forward)'});
    }

    rows.sort((a,b)=> a.type==='Opening Balance' ? -1 : b.type==='Opening Balance' ? 1 : parseDate(a.date)-parseDate(b.date));

    // Add running balance
    let balance = 0;
    return rows.map(r => {
      balance += (r.debit||0) - (r.credit||0);
      return {...r, balance};
    });
  }, [partyId, partyType, fy, selectedParty]);

  const totalDebit  = entries.reduce((s,e)=>s+(e.debit||0),0);
  const totalCredit = entries.reduce((s,e)=>s+(e.credit||0),0);
  const closingBal  = totalDebit - totalCredit;

  function printLedger() {
    if (!selectedParty || entries.length===0) return;
    const biz = dbRead('al_profile')||{};
    const rows = entries.map(e=>`
      <tr>
        <td>${new Date(e.date).toLocaleDateString('en-IN')}</td>
        <td>${e.type}</td>
        <td>${e.ref||'—'}</td>
        <td>${e.narration||''}</td>
        <td style="text-align:right">${e.debit>0?'₹'+e.debit.toLocaleString('en-IN',{minimumFractionDigits:2}):''}</td>
        <td style="text-align:right">${e.credit>0?'₹'+e.credit.toLocaleString('en-IN',{minimumFractionDigits:2}):''}</td>
        <td style="text-align:right;font-weight:700;color:${e.balance>=0?'#166534':'#dc2626'}">₹${Math.abs(e.balance).toLocaleString('en-IN',{minimumFractionDigits:2})} ${e.balance>=0?'Dr':'Cr'}</td>
      </tr>`).join('');
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Ledger - ${selectedParty.name}</title>
      <style>body{font-family:Arial,sans-serif;font-size:12px;color:#0d0f1a;padding:20px}
      h2{margin:0 0 4px}p{margin:0 0 16px;color:#555;font-size:11px}
      table{width:100%;border-collapse:collapse}thead th{background:#0d0f1a;color:white;padding:8px;font-size:10px;text-transform:uppercase;text-align:left}
      tbody td{padding:7px;border-bottom:1px solid #eee;font-size:11px}
      tfoot td{padding:8px;font-weight:700;border-top:2px solid #0d0f1a}
      @page{size:A4;margin:10mm}@media print{body{padding:0}}</style></head>
      <body><h2>Account Ledger — ${selectedParty.name}</h2>
      <p>${biz.name||''} &nbsp;|&nbsp; FY ${fy} &nbsp;|&nbsp; ${partyType}</p>

// PENDING BILLS
// ═══════════════════════════════════════════════════════════════════════
function PendingBills({nav}) {
  const {profile, toast} = useApp();
  const fy = (profile&&profile.financialYear)||'2025-26';
  const [invs, setInvs] = useState(invoiceDB.getAll());
  const [filterStatus, setFilterStatus] = useState('All');
  const [receiveModal, setReceiveModal] = useState(null); // invoice object
  const [recAmt, setRecAmt] = useState('');
  const [recDate, setRecDate] = useState(new Date().toISOString().split('T')[0]);
  const [recMode, setRecMode] = useState('Bank');
  const allCNs = creditNoteDB.getAll();

  function getOutstanding(inv) {
    const knocked = allCNs.filter(c=>c.againstInvoice===inv.invoiceNumber).reduce((s,c)=>s+(c.total||0),0);
    return Math.max(0, (inv.total||0) - (inv.amountPaid||0) - knocked);
  }

  function getDueStatus(inv) {
    const os = getOutstanding(inv);
    if (os <= 0) return 'Paid';
    if (!inv.creditPeriod || inv.creditPeriod==='Immediate') return 'Due';
    const days = parseInt(inv.creditPeriod)||0;
    const invDate = new Date(inv.invoiceDate||inv.date);
    const dueDate = new Date(invDate);
    dueDate.setDate(dueDate.getDate() + days);
    const today = new Date();
    return dueDate < today ? 'Overdue' : 'Due';
  }

  const pending = React.useMemo(() => {
    return invs.filter(i => getOutstanding(i) > 0).sort((a,b)=>new Date(a.invoiceDate||a.date)-new Date(b.invoiceDate||b.date));
  }, [invs, allCNs]);

  const filtered = filterStatus==='All' ? pending : pending.filter(i=>getDueStatus(i)===filterStatus);
  const totalPending = pending.reduce((s,i)=>s+getOutstanding(i), 0);
  const totalOverdue = pending.filter(i=>getDueStatus(i)==='Overdue').reduce((s,i)=>s+getOutstanding(i), 0);

  function refresh() { setInvs(invoiceDB.getAll()); }

  function receivePayment() {
    const amt = parseFloat(recAmt);
    if (!amt || amt <= 0) { toast('Enter valid amount','er'); return; }
    const inv = receiveModal;
    const os  = getOutstanding(inv);
    const newPaid = (inv.amountPaid||0) + Math.min(amt, os);
    const newOS   = Math.max(0, os - amt);
    const newStatus = newOS <= 0 ? 'Paid' : newPaid > 0 ? 'Partial' : 'Unpaid';
    // Update invoice
    invoiceDB.update({...inv, amountPaid: newPaid, paymentStatus: newStatus});
    // Record bank entry
    bankDB.save({
      id: genId(), date: recDate, type:'Receipt', account: recMode,
      partyType:'Customer', partyId: inv.customerId||'',
      partyName: inv.customerName||(inv.customer&&inv.customer.name)||'',
      amount: Math.min(amt, os), refNo: inv.invoiceNumber,
      narration:`Receipt against ${inv.invoiceNumber}`, financialYear:fy,
    });
    toast('Payment of '+fmtINR(Math.min(amt,os))+' recorded ✅','ok');
    setReceiveModal(null); setRecAmt(''); refresh();
  }

  const statusColor = s => s==='Overdue'?{bg:'#fef2f2',c:'#dc2626'}:s==='Due'?{bg:'#fffbeb',c:'#d97706'}:{bg:'#f0fdf4',c:'#166534'};

  return (
    React.createElement('div', {}
      , React.createElement('div', { className: "sec-hdr"}
        , React.createElement('div', {}
          , React.createElement('div', { className: "sec-title"}, "⏳ Pending Bills"  )
          , React.createElement('div', { className: "sec-sub"}, pending.length, " bills · "   , fmtINR(totalPending), " outstanding" )
        )
        , React.createElement('button', { className: "btn btn-outline" , onClick: ()=>nav('create-invoice')}, "+ New Invoice"  )
      )

      /* Summary cards */

    const e = {};
    if (!form.name.trim())    e.name     = 'Full name is required';

    if (!form.email.trim())   e.email    = 'Email is required';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Enter a valid email';
    if (!form.password)       e.password = 'Password is required';
    else if (form.password.length < 6) e.password = 'Minimum 6 characters';
    if (form.password !== form.confirm) e.confirm = 'Passwords do not match';
    setErrors(e);
    if (Object.keys(e).length) return;

    setLoading(true);
    setStatus('Creating your account...');
    try {
      const cred = await fbAuth.createUserWithEmailAndPassword(form.email.trim(), form.password);
      await cred.user.updateProfile({ displayName: form.name.trim() });
      // Save initial profile to Firebase
      const uid = cred.user.uid;
      // ── Scope ALL writes to this new user's UID immediately ──
      setCurrentUID(uid);
      const profile = {
        businessName: form.biz.trim(), ownerName: form.name.trim(),
        email: form.email.trim().toLowerCase(), state: 'Maharashtra',
        invoicePrefix: 'AR', financialYear: '2025-26', mobile: ''
      };
      dbWrite('al_profile', profile);
      setStatus('Saving your data...');
      await FRSYNC.push(uid);
      onAuth({ uid, name: form.name.trim(), email: form.email.trim(), biz: form.biz.trim() });
    } catch(err) {
      setLoading(false);
      setStatus('');
      if (err.code === 'auth/email-already-in-use') setErrors({ email: 'An account with this email already exists.' });
      else if (err.code === 'auth/weak-password')   setErrors({ password: 'Password must be at least 6 characters.' });
      else if (err.code === 'auth/network-request-failed') setErrors({ email: 'No internet connection. Check your network.' });
      else setErrors({ email: err.message });
    }
  }

  // ── Sign In ────────────────────────────────────────

    const e = {};

    if (!form.password)       e.password = 'Password is required';

    setStatus('Signing in...');

      const name = cred.user.displayName || form.email.split('@')[0];

      setCurrentUID(uid);
      setStatus('Loading your data...');
      await FRSYNC.pull(uid);
      onAuth({ uid, name, email: cred.user.email });
    } catch(err) {
      setLoading(false);
      setStatus('');
      if (err.code === 'auth/user-not-found')        setErrors({ password: 'No account found with this email.' });
      else if (err.code === 'auth/wrong-password')   setErrors({ password: 'Incorrect password.' });
      else if (err.code === 'auth/invalid-credential') setErrors({ password: 'Incorrect email or password.' });
      else if (err.code === 'auth/too-many-requests') setErrors({ password: 'Too many attempts. Try again in a few minutes.' });

function App() {
  const [page,        setPage]        = useState('dashboard');
  const [profile,     setProfile]     = useState(null);
  const [toasts,      setToasts]      = useState([]);
  const [currentUser, setCurrentUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true); // show spinner while Firebase checks session

  function toast(msg, type='ok') {
    const id = genId();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  }

  // ── Firebase auth state observer — runs on every page load ──────────
  const [appError, setAppError] = useState(null);

  useEffect(() => {
    let unsub = () => {};
    try {
      unsub = fbAuth.onAuthStateChanged(async (fbUser) => {
        try {
          if (fbUser) {
            // ── Set UID FIRST so all dbRead/dbWrite use this user's scoped keys
            setCurrentUID(fbUser.uid);
            // Pull latest data from Firebase into this user's scoped localStorage
            try { await FRSYNC.pull(fbUser.uid); } catch(e) { console.warn('Pull skipped:', e.message); }
            const p = profileDB.get();
            setProfile(p);
            setCurrentUser({ uid: fbUser.uid, name: fbUser.displayName || fbUser.email.split('@')[0], email: fbUser.email });
          } else {
            // Clear UID on logout so no data leaks
            setCurrentUID(null);
            setCurrentUser(null);
            setProfile(null);
          }
        } catch(e) {
          console.error('Auth state error:', e);
          setAppError(e.message);
        } finally {
          setAuthLoading(false);
        }
      }, (err) => {
        console.error('Auth observer error:', err);
        setAppError(err.message);
        setAuthLoading(false);
      });
    } catch(e) {
      console.error('Firebase init error:', e);
      setAppError('Firebase initialization failed: ' + e.message);
      setAuthLoading(false);
    }
    return () => unsub();
  }, []);

  // ── Auto-save to Firebase 3s after any page change (data mutation) ──
  const [autoSaveUid, setAutoSaveUid] = useState(null);
  useEffect(() => {
    if (currentUser) setAutoSaveUid(currentUser.uid);
  }, [currentUser]);

  function triggerAutoSave() {
    if (autoSaveUid) FRSYNC.autoSave(autoSaveUid);
  }

  // Intercept nav to auto-save when leaving a data screen
  function nav(p) {
    if (['create-invoice','customers','vendors','expenses','profile'].includes(page)) {
      triggerAutoSave();
    }
    if (p === 'sync-push') { doManualSync('push'); return; }
    if (p === 'sync-pull') { doManualSync('pull'); return; }
    setPage(p);
  }

  async function doManualSync(direction) {
    if (!currentUser) return;
    toast(direction==='push'?'☁️ Uploading...':'☁️ Downloading...','ok');
    try {
      if (direction==='push') {
        await FRSYNC.push(currentUser.uid);
        toast('✅ Upload complete!','ok');
      } else {
        await FRSYNC.pull(currentUser.uid);
        setProfile(profileDB.get());
        toast('✅ Download complete!','ok');
      }
    } catch(e) {
      toast('❌ Sync failed: '+e.message,'er');
    }
  }

  function handleAuth(user) {
    // Set UID scope FIRST before reading/writing any data
    setCurrentUID(user.uid);
    setCurrentUser(user);
    setProfile(profileDB.get());
    // Set up profile from signup data if first time
    if (!profileDB.get() && user.biz) {
      const saved = profileDB.save({
        businessName: user.biz, ownerName: user.name, email: user.email,
        state: 'Maharashtra', invoicePrefix: 'AR', financialYear: '2025-26', mobile: ''
      });
      setProfile(saved);
      FRSYNC.autoSave(user.uid);
    }
  }

  const [showLogoutModal, setShowLogoutModal] = useState(false);
  const [showFAB, setShowFAB] = useState(false);
  const [showSearch, setShowSearch] = useState(false);

  // Global keyboard shortcut: Ctrl+K or Cmd+K opens search
  useEffect(() => {
    const handler = e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); setShowSearch(true); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);
  function doLogout() {
    // Push before logout
    if (currentUser) FRSYNC.push(currentUser.uid).catch(()=>{});
    fbAuth.signOut();
    setCurrentUser(null);
    setProfile(null);
    setPage('dashboard');
    setShowLogoutModal(false);
  }

  // ── Error state ──────────────────────────────────────────────────
  if (appError) return (
    React.createElement('div', { style: {minHeight:'100vh',background:'#fff5f5',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',padding:24,textAlign:'center'}}
      , React.createElement('div', { style: {fontSize:48,marginBottom:16}}, "⚠️")
      , React.createElement('div', { style: {fontFamily:'Playfair Display,serif',fontSize:22,fontWeight:800,color:'#dc2626',marginBottom:12}}, "Something went wrong"

      )
      , React.createElement('div', { style: {fontSize:14,color:'#666',marginBottom:8,maxWidth:360,lineHeight:1.7}}
        , appError
      )
      , React.createElement('div', { style: {fontSize:13,color:'#999',marginBottom:24,maxWidth:360,lineHeight:1.8,
        background:'#fff',border:'1px solid #fecaca',borderRadius:8,padding:'12px 16px'}}
        , React.createElement('strong', {}, "Common fix:" ), " Go to Firebase Console → Realtime Database → Rules tab → set both "              , React.createElement('code', {}, "read"), " and "  , React.createElement('code', {}, "write"), " to "  , React.createElement('code', {}, "true"), " → Publish"
      )
      , React.createElement('button', { onClick: ()=>window.location.reload(),
        className: "btn btn-primary", style: {padding:'12px 28px',fontSize:15}}, "🔄 Try Again"

      )
    )
  );

  // ── Loading spinner while Firebase checks session ───────────────────
  if (authLoading) return (
    React.createElement('div', { style: {minHeight:'100vh',background:'#0f1123',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',gap:20}}
      , React.createElement('img', { src: AL_LOGO, alt: "ArthaLekha",
        style: {width:260,objectFit:'contain',filter:'drop-shadow(0 8px 24px rgba(204,41,54,0.4))'}})
      , React.createElement('div', { style: {display:'flex',gap:6,marginTop:8}}
        , [0,1,2].map(i=>(
          React.createElement('div', { key: i, style: {width:8,height:8,borderRadius:'50%',background:'#e85d04',opacity:0.8,
            animation:`bounce 1.2s ease-in-out ${i*0.2}s infinite`}})
        ))
      )
      , React.createElement('style', {}, `@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-12px)}}`)
    )
  );

  // ── Not logged in → show auth screen ───────────────────────────────
  if (!currentUser) return React.createElement(AuthPage, { onAuth: handleAuth});

  // ── Logged in → show main app ───────────────────────────────────────

// Error Boundary — catches any render crash and shows helpful message
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(e) { return { hasError: true, error: e }; }
  componentDidCatch(e, info) { console.error('App crash:', e, info); }
  render() {
    if (this.state.hasError) return (
      React.createElement('div', { style: {minHeight:'100vh',background:'#fff5f5',display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',padding:24,textAlign:'center',fontFamily:'DM Sans,sans-serif'}}

        , React.createElement('div', { style: {fontSize:22,fontWeight:800,color:'#dc2626',marginBottom:12}}, "App crashed" )

          , React.createElement('strong', {}, "Error:"), " " , this.state.error && this.state.error.message, React.createElement('br', {}), React.createElement('br', {})
          , React.createElement('strong', {}, "Most common fix:"  ), React.createElement('br', {}), "Firebase Console → Realtime Database → "
                , React.createElement('strong', {}, "Rules"), " tab → change both "     , React.createElement('code', {}, "read"), " and "  , React.createElement('code', {}, "write"), " to "  , React.createElement('code', {}, "true"), " → click "   , React.createElement('strong', {}, "Publish")
        )
        , React.createElement('button', { onClick: ()=>window.location.reload(),

    return this.props.children;
  }
}

// Wait for React to truly paint before hiding splash
function hideSplash(){
  var s=document.getElementById('al-splash');
  var pr=document.getElementById('al-prog');
  if(window._splashIv) clearInterval(window._splashIv);
  if(pr) pr.style.width='100%';
  setTimeout(function(){
    if(s){s.classList.add('hide');setTimeout(function(){s.remove();},500);}
  },300);
}
// Try multiple times to ensure React has rendered
var _splashCheck=0;
function checkAndHide(){
  var root=document.getElementById('root');
  var hasContent=root&&root.children.length>0&&root.innerHTML.length>200;
  if(hasContent||_splashCheck>20){ hideSplash(); }
  else{ _splashCheck++; setTimeout(checkAndHide,500); }
}
setTimeout(checkAndHide,3000);
